            arc_opa: TRANSP
            arc_width: 16
            arc_rounded: true
            adjustable: true
            clickable: false
            x: 0
            y: 0
            indicator:
              arc_color: 0x72C7F2
              arc_width: 16
              arc_rounded: true
            knob:
              bg_color: 0xF7FBFD
              bg_opa: COVER
              border_color: 0x159DDD
              border_width: 2
              radius: 100%
              pad_all: 0

        - arc:
            id: arc_temperature_current
            align: CENTER
            width: 238
            height: 238
            min_value: 0
            max_value: 100
            value: 60
            start_angle: 135
            end_angle: 45
            rotation: 0
            arc_color: 0xDCE3E7
            arc_opa: TRANSP
            arc_width: 16
            arc_rounded: true
            adjustable: true
            clickable: false
            x: 0
            y: 0
            indicator:
