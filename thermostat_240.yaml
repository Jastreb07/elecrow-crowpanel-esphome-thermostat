            text_font: icons_18
            text_color: 0xFF5A2D
            align: CENTER
            x: -80
            y: 0
            hidden: true
        - label:
            id: label_current_temperature
            text: "20.5°"
            text_font: rajdhani_semibold_20
            text_color: 0xDADADA
            align: CENTER
            x: -58
            y: 0
            width: 55
            text_align: RIGHT
        - label:
            id: icon_hum_thermo
            text: ""
            text_font: icons_18
            text_color: 0x6EC6FF
            align: CENTER
            x: -80
            y: 25
            hidden: true
        - label:
            id: label_humidity_thermo
            text: "48%"
            text_font: rajdhani_semibold_20
            text_color: 0x9A9A9A
            align: CENTER
            x: -58
            y: 25
            width: 55
            text_align: RIGHT
            hidden: true

        - obj:
            id: divider_thermostat
            align: CENTER
            x: -26
            y: 2
            width: 2
            height: 80
            bg_color: 0x3A3A3A
            border_width: 0
            radius: 0

        - label:
            id: label_target_temperature
            text: "38"
            text_font: rajdhani_bold_84
            text_color: 0xFFFFFF
            align: CENTER
            x: 13
            y: 2
            width: 110
            text_align: RIGHT
        - label:
            id: label_target_unit
            text: "°C"
            text_font: rajdhani_semibold_28
            text_color: 0xB0B0B0
            align: CENTER
            x: 80
            y: -15
            width: 30
            text_align: LEFT
        - label:
            id: label_target_decimal
            text: ".0"
            text_font: rajdhani_semibold_28
            text_color: 0xFFFFFF
            align: CENTER
            x: 85
            y: 18
            width: 30
            text_align: LEFT
