  - id: update_settings_labels
    then:
      - lambda: |-
          bool de = false;
          char buf[64];
          if (id(ui_context) == 6) {
            int climates = (int) id(ha_climates).size();
            int lights = (int) id(ha_lights).size();
            int covers = (int) id(ha_covers).size();
            int timers = 1;  // Timer is always listed, running or not.
            int progresses = progress_is_running(id(progress_value_num).state) ? 1 : 0;
            int notifies = id(notify_finished) ? 1 : 0;
            int count = climates + lights + covers + timers + progresses + notifies + 2;
            auto entity_name = [climates, lights, covers, timers, progresses, notifies,
                                 count](int p) -> std::string {
              p = ((p % count) + count) % count;
              if (p < climates) return id(ha_climates).get(p).name;
              if (p < climates + lights) return id(ha_lights).get(p - climates).name;
              if (p < climates + lights + covers) return id(ha_covers).get(p - climates - lights).name;
              if (p < climates + lights + covers + timers)
                return id(timer_title_txt).state.empty() ? std::string("Timer") : id(timer_title_txt).state;
              if (p < climates + lights + covers + timers + progresses)
                return id(progress_title_txt).state.empty() ? std::string("Progress")
                                                              : id(progress_title_txt).state;
              if (p < climates + lights + covers + timers + progresses + notifies)
                return id(notify_title_txt).state.empty() ? std::string("Notify") : id(notify_title_txt).state;
              return p == climates + lights + covers + timers + progresses + notifies
                         ? std::string("Settings")
                         : std::string("Back");
            };
            auto m = menu_window(id(entity_menu_index), count, ${settings_extra_rows}, entity_name);
            id(set_title) = "Entities";
            id(set_prev2) = m.prev2;
            id(set_prev) = m.prev;
            id(set_cur) = m.cur;
            id(set_next) = m.next;
            id(set_next2) = m.next2;
            id(set_value) = m.value;
          } else if (id(ui_context) == 2) {
            auto m = menu_window(id(menu_index), SETTINGS_ROOT_COUNT, ${settings_extra_rows},
                                  [](int p) -> std::string { return settings_root_name(p); });
            id(set_title) = "Settings";
            id(set_prev2) = m.prev2;
            id(set_prev) = m.prev;
            id(set_cur) = m.cur;
            id(set_next) = m.next;
            id(set_next2) = m.next2;
            id(set_value) = m.value;
          } else if (id(ui_context) == 3) {
            int group = settings_group_wrap(id(menu_index));
            int count = settings_group_entry_count(group);
            int i = ((id(group_item_index) % count) + count) % count;
            int t = settings_group_entry_type_at(group, i);
            auto entry_name = [group, de](int position) -> std::string {
              int type = settings_group_entry_type_at(group, position);
              return type < 0 ? std::string("Back") : std::string(settings_menu_name(type, de));
            };
            auto m = menu_window(id(group_item_index), count, ${settings_extra_rows}, entry_name);
            id(set_title) = SETTINGS_GROUP_NAMES[group];
            id(set_prev2) = m.prev2;
            id(set_prev) = m.prev;
            id(set_cur) = m.cur;
            id(set_next) = m.next;
            id(set_next2) = m.next2;
            id(set_value) = m.value;
            std::string val;
            switch (t) {
              case 0: val = ha_hvac_mode_label(id(current_hvac_raw), de); break;
              case 1: val = ha_preset_label(id(current_preset_raw), de); break;
              case 2: snprintf(buf, sizeof(buf), "%d%%", id(brightness_pct)); val = buf; break;
              case 3: val = id(time_24h).state ? "24h" : "12h"; break;
              case 4: val = id(language_select).current_option(); break;
              case 7: val = id(unit_select).current_option() == "Fahrenheit" ? "°F" : "°C"; break;
              case 8: snprintf(buf, sizeof(buf), "%ds", (int) id(idle_home_num).state); val = buf; break;
              case 9: snprintf(buf, sizeof(buf), "%ds", (int) id(dim_delay_num).state); val = buf; break;
              case 10: snprintf(buf, sizeof(buf), "%d%%", (int) id(dim_level_num).state); val = buf; break;
              case 13: val = id(knob_step_select).current_option().str() + "°C"; break;
              case 14: val = id(wifi_ssid_txt).state; break;
              case 15: val = id(fw_version).state; break;
              case 16: val = ""; break;
              case 17: val = id(led_enabled).state ? "On" : "Off"; break;
              case 18: snprintf(buf, sizeof(buf), "%d%%", (int) id(led_brightness_num).state); val = buf; break;
              case 11: {
                int v = (int) id(timer_auto_home_num).state;
                if (v <= 0) { val = "Off"; } else { snprintf(buf, sizeof(buf), "%ds", v); val = buf; }
                break;
              }
              case 19: val = id(timer_finish_blink_switch).state ? "On" : "Off"; break;
              case 20: {
                int v = (int) id(progress_auto_home_num).state;
                if (v <= 0) { val = "Off"; } else { snprintf(buf, sizeof(buf), "%ds", v); val = buf; }
                break;
              }
              case 21: val = id(progress_finish_blink_switch).state ? "On" : "Off"; break;
              case 22: snprintf(buf, sizeof(buf), "%ds", (int) id(timer_knob_step_num).state); val = buf; break;
              case 23: val = id(timer_value_blink_switch).state ? "On" : "Off"; break;
              case 24: val = id(progress_value_blink_switch).state ? "On" : "Off"; break;
              case 25: val = id(timer_blink_led_color_select).state; break;
              case 26: val = id(timer_show_on_finish_switch).state ? "On" : "Off"; break;
              case 27: val = id(progress_show_on_finish_switch).state ? "On" : "Off"; break;
              case 28: val = id(progress_blink_led_color_select).state; break;
              case 29: snprintf(buf, sizeof(buf), "%d%%", (int) id(timer_blink_led_brightness_num).state); val = buf; break;
              case 30: snprintf(buf, sizeof(buf), "%d%%", (int) id(progress_blink_led_brightness_num).state); val = buf; break;
              case 31: {
                int v = (int) id(notify_auto_home_num).state;
                if (v <= 0) { val = "Off"; } else { snprintf(buf, sizeof(buf), "%ds", v); val = buf; }
                break;
              }
              case 32: val = id(notify_finish_blink_switch).state ? "On" : "Off"; break;
              case 33: val = id(notify_blink_led_color_select).state; break;
              case 34: snprintf(buf, sizeof(buf), "%d%%", (int) id(notify_blink_led_brightness_num).state); val = buf; break;
              case 35: val = id(notify_value_blink_switch).state ? "On" : "Off"; break;
              case 36: val = id(notify_show_on_finish_switch).state ? "On" : "Off"; break;
            }
            (void) val;
          } else {
            int t = id(submenu_type);
            id(set_title) = settings_menu_name(t, de);
            int group = settings_group_wrap(id(menu_index));
            int gcount = settings_group_entry_count(group);
            auto entry_name = [group, de](int position) -> std::string {
              int type = settings_group_entry_type_at(group, position);
              return type < 0 ? std::string("Back") : std::string(settings_menu_name(type, de));
            };
            auto gm = menu_window(id(group_item_index), gcount, ${settings_extra_rows}, entry_name);
            id(set_prev2) = gm.prev2;
            id(set_prev) = gm.prev;
            id(set_next) = gm.next;
            id(set_next2) = gm.next2;
            // Every case below overrides prev/cur/next with its own option
            // list (HA entity list, fixed choices, Off/On, or the number's
            // own step range) and val with that list's "i / n" position -
            // same scroll pattern everywhere, just over different lists.
            // Only case 14/15 (read-only WiFi/firmware info) have nothing to
            // scroll through and keep the group-sibling prev/next from above.
            std::string cur, val = gm.value;
            switch (t) {
              case 0:
              case 1: {
                std::vector<std::string> vec;
                if (t == 0) {
                  vec = ha_filter_modes(id(hvac_modes_raw));
                } else {
                  vec = ha_filter_presets(id(preset_modes_raw));
                }
                id(submenu_count) = (int) vec.size();
                if (vec.empty()) {
                  cur = t == 0 ? "No HVAC modes" : "No presets";
                  val = "Home Assistant unavailable";
                  break;
                }
                auto option_name = [t, &vec, de](int p) -> std::string {
                  int n = (int) vec.size();
                  p = ((p % n) + n) % n;
                  return t == 0 ? ha_hvac_mode_label(vec[p], de) : ha_preset_label(vec[p], de);
                };
                auto m = menu_window(id(submenu_index), (int) vec.size(), false, option_name);
                cur = m.cur;
                id(set_prev) = m.prev;
                id(set_next) = m.next;
                val = m.value;
                break;
              }
              case 2: {
                auto m = numeric_menu_window(id(brightness_pct), 5, 100, 5, [](int v) -> std::string {
                  char b[8]; snprintf(b, sizeof(b), "%d%%", v); return b;
                });
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 3: {
                auto m = bool_menu_window(id(submenu_index), "12h", "24h");
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 4: {
                auto m = bool_menu_window(id(submenu_index), "English", "Deutsch");
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 7: {
                auto m = bool_menu_window(id(submenu_index), "°C", "°F");
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 8:
              case 9: {
                auto m = numeric_menu_window(id(num_preview), 5, 300, 5, [](int v) -> std::string {
                  char b[8]; snprintf(b, sizeof(b), "%ds", v); return b;
                });
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 10: {
                auto m = numeric_menu_window(id(num_preview), 0, 100, 5, [](int v) -> std::string {
                  char b[8]; snprintf(b, sizeof(b), "%d%%", v); return b;
                });
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 13: {
                static const char *const opts[] = {"0.1", "0.2", "0.5", "1.0"};
                id(submenu_count) = 4;
                auto m = menu_window(id(submenu_index), 4, false, [](int p) -> std::string {
                  return std::string(opts[((p % 4) + 4) % 4]) + "°C";
                });
                cur = m.cur;
                id(set_prev) = m.prev;
                id(set_next) = m.next;
                val = m.value;
                break;
              }
              case 14:
                cur = id(wifi_ssid_txt).state;
                snprintf(buf, sizeof(buf), "%s  %.0f dBm", id(wifi_ip_txt).state.c_str(), id(wifi_rssi).state);
                val = buf;
                break;
              case 15: cur = id(fw_version).state; val = ""; break;
              case 16: {
                auto m = bool_menu_window(id(submenu_index), "No", "Yes, reset");
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next;
                val = "Press = confirm";
                break;
              }
              case 17: {
                auto m = bool_menu_window(id(submenu_index), "Off", "On");
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 18: {
                auto m = numeric_menu_window(id(num_preview), 5, 100, 5, [](int v) -> std::string {
                  char b[8]; snprintf(b, sizeof(b), "%d%%", v); return b;
                });
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 11:
              case 20:
              case 31: {
                auto m = numeric_menu_window(id(num_preview), 0, 300, 5, [](int v) -> std::string {
                  if (v <= 0) return "Off";
                  char b[8]; snprintf(b, sizeof(b), "%ds", v); return b;
                });
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 19:
              case 21: {
                auto m = bool_menu_window(id(submenu_index), "Off", "On");
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 22: {
                auto m = numeric_menu_window(id(num_preview), 5, 60, 5, [](int v) -> std::string {
                  char b[8]; snprintf(b, sizeof(b), "%ds", v); return b;
                });
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 23:
              case 24: {
                auto m = bool_menu_window(id(submenu_index), "Off", "On");
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 26:
              case 27:
              case 32:
              case 35:
              case 36: {
                auto m = bool_menu_window(id(submenu_index), "Off", "On");
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 29:
              case 30:
              case 34: {
                auto m = numeric_menu_window(id(num_preview), 0, 100, 5, [](int v) -> std::string {
                  char b[8]; snprintf(b, sizeof(b), "%d%%", v); return b;
                });
                cur = m.cur; id(set_prev) = m.prev; id(set_next) = m.next; val = m.value;
                break;
              }
              case 25:
              case 28:
              case 33: {
                auto m = menu_window(id(submenu_index), BLINK_LED_COLOR_COUNT, false,
                                      [](int p) -> std::string { return blink_led_color_name(p); });
                cur = m.cur;
                id(set_prev) = m.prev;
                id(set_next) = m.next;
                val = m.value;
                break;
              }
            }
            id(set_cur) = cur;
            id(set_value) = val;
          }
      - lvgl.label.update:
          id: label_settings_title
          text: !lambda 'return id(set_title);'
      - lvgl.label.update:
          id: label_menu_icon_prev2
          text: !lambda |-
            if (id(ui_context) == 6)
              return std::string(entity_menu_icon(id(entity_menu_index) - 2,
                  (int) id(ha_climates).size(), (int) id(ha_lights).size(), (int) id(ha_covers).size(),
                  1,  // Timer is always listed, running or not.
                  progress_is_running(id(progress_value_num).state) ? 1 : 0,
                  id(notify_finished) ? 1 : 0));
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index) - 2));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index) - 2);
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - lvgl.label.update:
          id: label_menu_icon_prev
          text: !lambda |-
            if (id(ui_context) == 6)
              return std::string(entity_menu_icon(id(entity_menu_index) - 1,
                  (int) id(ha_climates).size(), (int) id(ha_lights).size(), (int) id(ha_covers).size(),
                  1,  // Timer is always listed, running or not.
                  progress_is_running(id(progress_value_num).state) ? 1 : 0,
                  id(notify_finished) ? 1 : 0));
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index) - 1));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index) - 1);
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - lvgl.label.update:
          id: label_menu_icon
          text: !lambda |-
            if (id(ui_context) == 6)
              return std::string(entity_menu_icon(id(entity_menu_index),
                  (int) id(ha_climates).size(), (int) id(ha_lights).size(), (int) id(ha_covers).size(),
                  1,  // Timer is always listed, running or not.
                  progress_is_running(id(progress_value_num).state) ? 1 : 0,
                  id(notify_finished) ? 1 : 0));
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index)));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index));
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - lvgl.label.update:
          id: label_menu_icon_next
          text: !lambda |-
            if (id(ui_context) == 6)
              return std::string(entity_menu_icon(id(entity_menu_index) + 1,
                  (int) id(ha_climates).size(), (int) id(ha_lights).size(), (int) id(ha_covers).size(),
                  1,  // Timer is always listed, running or not.
                  progress_is_running(id(progress_value_num).state) ? 1 : 0,
                  id(notify_finished) ? 1 : 0));
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index) + 1));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index) + 1);
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - lvgl.label.update:
          id: label_menu_icon_next2
          text: !lambda |-
            if (id(ui_context) == 6)
              return std::string(entity_menu_icon(id(entity_menu_index) + 2,
                  (int) id(ha_climates).size(), (int) id(ha_lights).size(), (int) id(ha_covers).size(),
                  1,  // Timer is always listed, running or not.
                  progress_is_running(id(progress_value_num).state) ? 1 : 0,
                  id(notify_finished) ? 1 : 0));
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index) + 2));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index) + 2);
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - lvgl.widget.show: label_menu_icon
      - if:
          condition: {lambda: 'return !id(set_prev2).empty();'}
          then: [lvgl.widget.show: label_menu_icon_prev2]
          else: [lvgl.widget.hide: label_menu_icon_prev2]
      - if:
          condition: {lambda: 'return !id(set_prev).empty();'}
          then: [lvgl.widget.show: label_menu_icon_prev]
          else: [lvgl.widget.hide: label_menu_icon_prev]
      - if:
          condition: {lambda: 'return !id(set_next).empty();'}
          then: [lvgl.widget.show: label_menu_icon_next]
          else: [lvgl.widget.hide: label_menu_icon_next]
      - if:
          condition: {lambda: 'return !id(set_next2).empty();'}
          then: [lvgl.widget.show: label_menu_icon_next2]
          else: [lvgl.widget.hide: label_menu_icon_next2]
      - lvgl.label.update: {id: label_menu_prev2, text: !lambda 'return id(set_prev2);'}
      - lvgl.label.update: {id: label_menu_prev, text: !lambda 'return id(set_prev);'}
      - lvgl.label.update: {id: label_menu_current, text: !lambda 'return id(set_cur);'}
      - lvgl.label.update: {id: label_menu_next, text: !lambda 'return id(set_next);'}
      - lvgl.label.update: {id: label_menu_next2, text: !lambda 'return id(set_next2);'}
      - lvgl.label.update: {id: label_menu_value, text: !lambda 'return id(set_value);'}

  - id: update_clock_labels
    then:
      - lambda: |-
          auto now = id(ha_time).now();
          if (!now.is_valid()) return;
          bool de = false;
          static const char* const day_en[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
          static const char* const mon_en[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
          const char* day = day_en[(now.day_of_week - 1) % 7];
          const char* month = mon_en[(now.month - 1) % 12];
          char time_buf[12];
          if (id(time_24h).state) {
            snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
          } else {
            int h12 = now.hour % 12; if (h12 == 0) h12 = 12;
            snprintf(time_buf, sizeof(time_buf), "%d:%02d %s", h12, now.minute,
                     now.hour < 12 ? "AM" : "PM");
          }
          char date_buf[24];
          snprintf(date_buf, sizeof(date_buf), "%02d %s", now.day_of_month, month);
          id(pending_clock_time) = time_buf;
          id(pending_clock_day) = day;
          id(pending_home_date) = date_buf;
      - lvgl.label.update: {id: label_home_time, text: !lambda 'return id(pending_clock_time);'}
      - lvgl.label.update: {id: label_home_weekday, text: !lambda 'return id(pending_clock_day);'}
      - lvgl.label.update: {id: label_home_date, text: !lambda 'return id(pending_home_date);'}


# ------------------------------------------------------------------
# Uhrzeit
# ------------------------------------------------------------------
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      - script.execute: update_clock_labels
    on_time:
      - minutes: "*"
        seconds: 0
        then:
          - script.execute: update_clock_labels
