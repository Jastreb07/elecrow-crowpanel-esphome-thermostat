            text_font: icons_34
            text_color: 0x9A9A9A
            align: CENTER
            x: -94

        - label:
            id: label_home_humidity
            text: "43%"
            text_font: rajdhani_semibold_26
            text_color: 0x9A9A9A
            align: CENTER
            y: 58
