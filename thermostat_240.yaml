      on_swipe_up:
        - script.execute: open_entity_overview
      on_swipe_left:
        - script.execute: cycle_light_mode
      on_swipe_right:
        - script.execute: cycle_light_mode
      widgets:
        - button:
            id: button_light_background
            align: CENTER
            width: 238
            height: 238
            radius: 0
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            on_click:
              - script.execute: wake_display

        - arc:
            id: arc_light_track
            align: CENTER
            width: 238
            height: 238
            min_value: 0
            max_value: 100
            value: 0
            start_angle: 135
            end_angle: 45
            arc_color: 0xDCE3E7
            arc_width: 16
            arc_rounded: true
            adjustable: false
            clickable: false
            hidden: true
            indicator:
              arc_opa: TRANSP

        # Twelve static segments form the full color/Kelvin background. The
        # shared refresh script recolors and shows them only in those modes.
        - arc: &light_gradient_segment_240
            id: arc_light_gradient_0
            align: CENTER
            width: 238
            height: 238
            min_value: 0
            max_value: 100
            value: 0
            start_angle: 135
            end_angle: 158
            arc_color: 0xFFFFFF
            arc_width: 16
            arc_rounded: false
            adjustable: false
            clickable: false
            hidden: true
            indicator:
              arc_opa: TRANSP
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_1
            start_angle: 158
            end_angle: 180
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_2
            start_angle: 180
            end_angle: 203
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_3
            start_angle: 203
            end_angle: 225
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_4
            start_angle: 225
            end_angle: 248
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_5
            start_angle: 248
            end_angle: 270
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_6
            start_angle: 270
            end_angle: 293
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_7
            start_angle: 293
            end_angle: 315
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_8
            start_angle: 315
            end_angle: 338
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_9
            start_angle: 338
            end_angle: 360
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_10
            start_angle: 0
            end_angle: 23
        - arc:
            <<: *light_gradient_segment_240
            id: arc_light_gradient_11
            start_angle: 23
            end_angle: 45

        - arc:
            id: arc_light_control
            align: CENTER
            width: 238
            height: 238
            min_value: 0
            max_value: 100
            value: 50
            start_angle: 135
            end_angle: 45
            arc_color: 0xDCE3E7
            arc_opa: TRANSP
            arc_width: 16
            arc_rounded: true
            adjustable: true
            clickable: false
            hidden: true
            indicator:
              arc_color: 0xF7FBFD
              arc_width: 16
              arc_rounded: true
            knob:
              bg_color: 0xF7FBFD
