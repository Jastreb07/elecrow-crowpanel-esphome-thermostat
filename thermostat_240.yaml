            id: button_home_background
            align: CENTER
            width: 240
            height: 240
            radius: 0
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            on_click:
              - script.execute: wake_display

        - label:
            id: label_home_hvac_mode
