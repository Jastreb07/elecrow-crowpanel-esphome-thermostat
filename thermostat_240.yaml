            text_font: rajdhani_medium_16
            text_color: 0x9A9A9A
            align: TOP_MID
            y: 55
            width: 210
            text_align: CENTER
            long_mode: SCROLL_CIRCULAR
            hidden: true

        - label:
            id: icon_mode_thermo
            text: ""
