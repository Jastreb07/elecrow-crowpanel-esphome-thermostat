########################################################################
# thermostat_common.yaml
#
# Shared package for CrowPanel ESP32-S3 rotary displays (2.1"/480x480 and
# 1.28"/240x240). Board-specific hardware and each native LVGL layout live in
# thermostat_480.yaml and thermostat_240.yaml, which include this file through
# `packages:`. There is no automatic scaling; every board has its own layout.
#
# A single Home Assistant climate entity drives the UI. It can represent a
# thermostat-only setup, an AC-only setup, or a combined heat/cool entity. The
# available hvac_modes and preset_modes are read at runtime. Mode icons and ring
# colors follow the current HVAC mode.
#
# Screens: screen_home (default) -> screen_thermostat -> screen_settings
#
# Knob controls:
#   Home:        rotate or short-press -> thermostat screen
#   Thermostat:  rotate -> target temperature +/- configured step
#                short-press -> settings menu
#   Settings:    rotate = scroll/change value, short-press = select/OK
#   Everywhere:  1 s press -> back, 3 s press -> HVAC/preset submenu
#                Idle -> dim display and return home after configured delays
#
# Home Assistant must allow this ESPHome device to perform Home Assistant
# actions, otherwise climate.set_temperature and related service calls will not
# run.
#
# ESPHome limitation: homeassistant sensors are bound at compile time. Live
# state comes from climate_default_entity. The editable Climate Entity text
# field controls outgoing service calls.
#
# Hardware-Details siehe jeweilige Board-Datei:
#   thermostat_480.yaml: ST7701S RGB-Panel, CST826-Touch (extern gepatcht),
#                         PCF8574-Expander, Encoder GPIO4/42.
#   thermostat_240.yaml: GC9A01A SPI-Panel, CST816-Touch, Encoder GPIO45/42.
# encoder_button and temperature_encoder define 480x480 defaults below.
# thermostat_240.yaml overrides them with `!extend`.
########################################################################

substitutions:
  device_name: thermostat
  friendly_name: "Thermostat Knob"

  # ---- Single climate entity used as live-state source at compile time.
  # It can control a TRV, an AC unit, or a combined heat/cool setup. ----
  climate_default_entity: "climate.wohnzimmer_better_thermostat"

  # ---- Behavior ----
  temperature_step: "0.5"       # Celsius per encoder detent; internal values stay Celsius
  temperature_min: "5.0"
  temperature_max: "30.0"
  setpoint_min_gap: "0.5"       # Minimum TRV(low) <-> AC(high) gap in Celsius
  debounce_ms: "500ms"          # Quiet time before climate.set_temperature
  settings_row_gap: "82"        # Overridden by the 240x240 board
  settings_extra_rows: "false"  # 480x480 overrides this to show five rows

esphome:
  name: ${device_name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  comment: "ESPHome CrowPanel Thermostat Knob"
  includes:
    - thermostat_helpers.h
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            // Initialize the dual-setpoint cache from Home Assistant sensors.
            id(target_low_v) = id(target_low_ha).state;
            id(target_high_v) = id(target_high_ha).state;
            // Prefer the active dual setpoint before the single setpoint.
            if (!std::isnan(id(target_low_v))) {
              id(target_temperature) = id(adjust_target) == 1 && !std::isnan(id(target_high_v))
                                           ? id(target_high_v) : id(target_low_v);
            } else if (!std::isnan(id(target_temperature_ha).state)) {
              id(target_temperature) = id(target_temperature_ha).state;
            }
            int b = (int) roundf(id(brightness_num).state);
            id(brightness_pct) = clamp(b > 0 ? b : 50, 5, 100);
        - light.turn_on:
            id: display_backlight
            brightness: !lambda 'return id(brightness_pct) / 100.0f;'
        - lvgl.page.show: screen_home
        - lambda: 'id(app_booted) = true;'
        - script.execute: refresh_temps
        - script.execute: refresh_status
        - script.execute: refresh_connection
        - script.execute: update_clock_labels
        - script.execute: update_status_led

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

# ------------------------------------------------------------------
# Network
# ------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - script.execute: refresh_connection
  on_disconnect:
    - script.execute: refresh_connection
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_ap_password

captive_portal:

logger:
  level: INFO

# API without encryption lets Home Assistant add the device without a key.
api:
  on_client_connected:
    - lambda: |-
        // Ignore ESPHome Logs/CLI clients; only a real Home Assistant API
        // session may mark HA as reachable.
        if (client_info.find("Home Assistant") == std::string::npos) return;
        id(ha_connected) = true;
        id(ha_connected_since_ms) = millis();
    - script.execute: refresh_connection
    - script.execute: sync_ha_states
  on_client_disconnected:
    - lambda: |-
        if (client_info.find("Home Assistant") == std::string::npos) return;
        id(ha_connected) = false;
        id(ha_connected_since_ms) = 0;
    - script.execute: refresh_connection

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

# Refresh staged connection diagnostics while WiFi, Home Assistant, or the
# configured climate entity is still becoming available.
interval:
  - interval: 2s
    then:
      - if:
          condition:
            lambda: 'return id(app_booted);'
          then:
            - script.execute: refresh_connection

# ------------------------------------------------------------------
# Global state
# ------------------------------------------------------------------
globals:

  - id: target_temperature
    type: float
    restore_value: false
    initial_value: "21.0"

  - id: pending_temperature_change
    type: bool
    restore_value: false
    initial_value: "false"

  - id: ha_connected
    type: bool
    restore_value: false
    initial_value: "false"

  - id: ha_connected_since_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: connection_ready
    type: bool
    restore_value: false
    initial_value: "false"

  - id: connection_message
    type: std::string
    restore_value: false

  # Becomes true only at the end of the on_boot(-100) sequence. This prevents
  # select components from restoring values and triggering refresh_status ->
  # update_status_led before WS2812/RMT hardware is initialized.
  - id: app_booted
    type: bool
    restore_value: false
    initial_value: "false"

  # Raw coordinate tracking for swipe detection. LVGL on_swipe_* events were
  # unreliable on the full-screen button, so the board files feed raw touch
  # start/end coordinates into handle_swipe_release.
  - id: swipe_start_x
    type: int
    restore_value: false
    initial_value: "0"
  - id: swipe_last_x
    type: int
    restore_value: false
    initial_value: "0"
  - id: swipe_start_y
    type: int
    restore_value: false
    initial_value: "0"
  - id: swipe_last_y
    type: int
    restore_value: false
    initial_value: "0"

  # UI navigation: 0 Home, 1 Thermostat, 2 groups, 3 group items, 4 editor
  - id: ui_context
    type: int
    restore_value: false
    initial_value: "0"

  - id: menu_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: group_item_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: settings_scroll_dir
    type: int
    restore_value: false
    initial_value: "0"

  - id: submenu_type
    type: int
    restore_value: false
    initial_value: "0"

  - id: submenu_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: submenu_count
    type: int
    restore_value: false
    initial_value: "1"

  - id: num_preview
    type: int
    restore_value: false
    initial_value: "0"

  - id: encoder_delta
    type: int
    restore_value: false
    initial_value: "0"

  - id: brightness_pct
    type: int
    restore_value: false
    initial_value: "50"

  - id: display_dimmed
    type: bool
    restore_value: false
    initial_value: "false"

  - id: apply_service
    type: int
    restore_value: false
    initial_value: "0"

  # Raw data from Home Assistant attributes
  - id: hvac_modes_raw
    type: std::string
    restore_value: false
  - id: preset_modes_raw
    type: std::string
    restore_value: false
  - id: current_hvac_raw
    type: std::string
    restore_value: false
  - id: current_action_raw
    type: std::string
    restore_value: false
  - id: current_preset_raw
    type: std::string
    restore_value: false

  # Service-Call-Parameter
  - id: pending_entity_id_holder
    type: std::string
    restore_value: false
  - id: pending_mode_holder
    type: std::string
    restore_value: false

  # Clock and date
  - id: pending_clock_time
    type: std::string
    restore_value: false
  - id: pending_clock_day
    type: std::string
    restore_value: false
  - id: pending_home_date
    type: std::string
    restore_value: false

  # Dual setpoint (heat_cool): 0 = TRV/heat (target_temp_low),
  # 1 = AC/cool (target_temp_high). Double click switches target.
  - id: adjust_target
    type: int
    restore_value: false
    initial_value: "0"
  - id: target_low_v
    type: float
    restore_value: false
    initial_value: "NAN"
  - id: target_high_v
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: pending_current_temperature
    type: float
    restore_value: false
    initial_value: "20.0"
  - id: pending_humidity
    type: float
    restore_value: false
    initial_value: "NAN"

  # Settings render text
  - id: set_title
    type: std::string
    restore_value: false
  - id: set_prev
    type: std::string
    restore_value: false
  - id: set_prev2
    type: std::string
    restore_value: false
  - id: set_cur
    type: std::string
    restore_value: false
  - id: set_next
    type: std::string
    restore_value: false
  - id: set_next2
    type: std::string
    restore_value: false
  - id: set_value
    type: std::string
    restore_value: false

light:
  - platform: monochromatic
    name: "${friendly_name} Backlight"
    output: bl_pwm
    id: display_backlight
    default_transition_length: 0s
    # Do not restore the light's own brightness. brightness_num is the single
    # persisted source and is applied explicitly in on_boot(-100).
    restore_mode: ALWAYS_ON
    # Mirror brightness changes from Home Assistant or knob settings into
    # brightness_pct and the number entity. Do not synchronize while dimmed.
    on_state:
      - lambda: |-
          if (!id(display_dimmed)) {
            int b = (int) roundf(id(display_backlight).current_values.get_brightness() * 100.0f);
            if (id(display_backlight).current_values.is_on() && b > 0) {
              id(brightness_pct) = clamp(b, 5, 100);
              if ((int) roundf(id(brightness_num).state) != id(brightness_pct)) {
                auto call = id(brightness_num).make_call();
                call.set_value(id(brightness_pct));
                call.perform();
              }
            }
          }

# ------------------------------------------------------------------
# Persisted settings; all are also controllable from Home Assistant.
# ------------------------------------------------------------------
text:
  - platform: template
    name: "Climate Entity"
    id: climate_entity
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "${climate_default_entity}"

switch:
  - platform: template
    name: "24h Clock"
    id: time_24h
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: update_clock_labels
    on_turn_off:
      - script.execute: update_clock_labels

  - platform: template
    name: "Show Icons"
    id: icons_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: refresh_status
      - script.execute: refresh_temps
    on_turn_off:
      - script.execute: refresh_status
      - script.execute: refresh_temps

  # Disable the 240x240 status LED regardless of brightness or HVAC color.
  - platform: template
    name: "LED Enabled"
    id: led_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: update_status_led
    on_turn_off:
      - script.execute: update_status_led

select:
  - platform: template
    name: "Language"
    id: language_select
    optimistic: true
    restore_value: true
    options: ["English"]
    initial_option: "English"
    on_value:
      then:
        - script.execute: refresh_status
        - script.execute: refresh_connection
        - script.execute: update_clock_labels
        - script.execute: update_settings_labels

  - platform: template
    name: "Design"
    id: design_select
    optimistic: true
    restore_value: true
    options: ["Mono", "Color"]
    initial_option: "Mono"
    on_value:
      then:
        - script.execute: refresh_status
        - script.execute: refresh_temps

  - platform: template
    name: "Temperature Unit"
    id: unit_select
    optimistic: true
    restore_value: true
    options: ["Celsius", "Fahrenheit"]
    initial_option: "Celsius"
    on_value:
      then:
        - script.execute: refresh_temps

  - platform: template
    name: "Knob HVAC Modes"
    id: knob_hvac_modes
    optimistic: true
    restore_value: true
    options: ["Heat/Off", "All"]
    initial_option: "Heat/Off"

  # Rotary encoder sensitivity in Celsius per detent.
  - platform: template
    name: "Knob Step (°C)"
    id: knob_step_select
    optimistic: true
    restore_value: true
    options: ["0.1", "0.2", "0.5", "1.0"]
    initial_option: "0.5"
    icon: "mdi:rotate-right"

number:
  - platform: template
    name: "Idle To Home (s)"
    id: idle_home_num
    optimistic: true
    restore_value: true
    initial_value: 15
    min_value: 5
    max_value: 300
    step: 5
    unit_of_measurement: "s"
    mode: box

  - platform: template
    name: "Dim After (s)"
    id: dim_delay_num
    optimistic: true
    restore_value: true
    initial_value: 30
    min_value: 5
    max_value: 300
    step: 5
    unit_of_measurement: "s"
    mode: box

  - platform: template
    name: "Dim Level (%)"
    id: dim_level_num
    optimistic: true
    restore_value: true
    initial_value: 20
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider

  # Display brightness as a Home Assistant entity, synchronized with the
  # settings screen and the backlight.
  - platform: template
    name: "Brightness (%)"
    id: brightness_num
    optimistic: true
    restore_value: true
    initial_value: 50
    min_value: 5
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    icon: "mdi:brightness-6"
    on_value:
      then:
        - lambda: 'id(brightness_pct) = clamp((int) x, 5, 100);'
        - if:
            condition:
              lambda: 'return !id(display_dimmed);'
            then:
              - light.turn_on:
                  id: display_backlight
                  brightness: !lambda 'return id(brightness_pct) / 100.0f;'
        # Update the settings screen live when it is open.
        - if:
            condition:
              lambda: 'return id(ui_context) == 2 || id(ui_context) == 3 || id(ui_context) == 4;'
            then:
              - script.execute: update_settings_labels

  # Status LED brightness for the 240x240 board. This is separate from display
  # brightness and can be changed from Home Assistant.
  - platform: template
    name: "LED Brightness (%)"
    id: led_brightness_num
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 5
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    icon: "mdi:led-strip"
    on_value:
      then:
        - script.execute: update_status_led
        - if:
            condition:
              lambda: 'return id(ui_context) == 2 || id(ui_context) == 3 || id(ui_context) == 4;'
            then:
              - script.execute: update_settings_labels

button:
  - platform: factory_reset
    name: "${friendly_name} Factory Reset"
    id: factory_reset_btn

# ------------------------------------------------------------------
# Encoder button. on_multi_click keeps single and double clicks separated.
# ------------------------------------------------------------------
binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

  - platform: gpio
    id: encoder_button
    pin:
      pcf8574: pcf
      number: 5
      mode:
        input: true
      inverted: true
    filters:
      - delayed_on_off: 10ms
    on_press:
      - script.execute: wake_display
    on_multi_click:
      # Double click keeps the quick jump to the thermostat. A press while the
      # thermostat is already open also selects the other TRV/AC target.
      - timing:
          - ON for at most 350ms
          - OFF for 40ms to 350ms
          - ON for at most 350ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: 'return id(ui_context) != 1;'
              then:
                - lambda: 'id(ui_context) = 1;'
                - lvgl.page.show: screen_thermostat
              else:
                - script.execute: toggle_adjust_target
      # Single click: enter/select inside settings. On the thermostat it now
      # switches directly between the TRV and AC/cool target.
      - timing:
          - ON for at most 350ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                lambda: 'return id(ui_context) == 0;'
              then:
                - lambda: 'id(ui_context) = 1;'
                - lvgl.page.show: screen_thermostat
              else:
                - if:
                    condition:
                      lambda: 'return id(ui_context) == 1;'
                    then:
                      - script.execute: toggle_adjust_target
                    else:
                      - if:
                          condition:
                            lambda: 'return id(ui_context) == 2;'
                          then:
                            - if:
                                condition:
                                  lambda: 'return id(menu_index) == SETTINGS_GROUP_COUNT;'
                                then:
                                  - lambda: 'id(ui_context) = 1;'
                                  - lvgl.page.show:
                                      id: screen_thermostat
                                      animation: MOVE_RIGHT
                                      time: 220ms
                                else:
                                  - script.execute: group_enter
                          else:
                            - if:
                                condition:
                                  lambda: 'return id(ui_context) == 3;'
                                then:
                                  - if:
                                      condition:
                                        lambda: |-
                                          return id(group_item_index) == settings_group_count(id(menu_index));
                                      then:
                                        - lambda: 'id(ui_context) = 2;'
                                        - script.execute: update_settings_labels
                                      else:
                                        - script.execute: menu_enter
                                else:
                                  - script.execute: submenu_apply
      # 1 s: go back one level
      - timing:
          - ON for 800ms to 2500ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: 'return id(ui_context) == 4;'
              then:
                - lambda: 'id(ui_context) = 3;'
                - script.execute: update_settings_labels
              else:
                - if:
                    condition:
                      lambda: 'return id(ui_context) == 3;'
                    then:
                      - lambda: 'id(ui_context) = 2;'
                      - script.execute: update_settings_labels
                    else:
                      - if:
                          condition:
                            lambda: 'return id(ui_context) == 2;'
                          then:
                            - lambda: 'id(ui_context) = 1;'
                            - lvgl.page.show: screen_thermostat
                          else:
                            - lambda: 'id(ui_context) = 0;'
                            - lvgl.page.show: screen_home
# ------------------------------------------------------------------
# Rotary encoder. Pins are swapped to fix rotation direction.
# ------------------------------------------------------------------
sensor:
  - platform: rotary_encoder
    id: temperature_encoder
    pin_a:
      number: GPIO4
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO42
      mode:
        input: true
        pullup: true
    min_value: -100000
    max_value: 100000
    restore_mode: ALWAYS_ZERO
    on_value:
      then:
        - script.execute: wake_display
        - lambda: |-
            // Erstes Event nur als Referenz nehmen: der Encoder kann nach
            // einem Neustart einen alten Zaehlerstand liefern -> sonst
            // entsteht ein Riesen-Delta (Symptom: Sprung auf Max-Temp).
            static bool first_event = true;
            static int32_t last_raw = 0;
            int32_t raw = (int32_t) x;
            if (first_event) {
              first_event = false;
              id(encoder_delta) = 0;
            } else {
              id(encoder_delta) = raw - last_raw;
            }
            last_raw = raw;
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 0;'
            then:
              - lambda: |-
                  id(ui_context) = 1;
                  id(encoder_delta) = 0;
              - lvgl.page.show: screen_thermostat
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 1;'
            then:
              - lambda: |-
                  float step = strtof(id(knob_step_select).current_option().c_str(), nullptr);
                  if (step <= 0.0f) step = ${temperature_step};
                  float new_temp = id(target_temperature) + (step * id(encoder_delta));
                  if (new_temp < ${temperature_min}) new_temp = ${temperature_min};
                  if (new_temp > ${temperature_max}) new_temp = ${temperature_max};
                  // Dual setpoints must not cross; otherwise TRV and AC fight
                  // each other and better_thermostat may reject the range.
                  if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v))) {
                    if (id(adjust_target) == 0 && new_temp > id(target_high_v) - ${setpoint_min_gap})
                      new_temp = id(target_high_v) - ${setpoint_min_gap};
                    if (id(adjust_target) == 1 && new_temp < id(target_low_v) + ${setpoint_min_gap})
                      new_temp = id(target_low_v) + ${setpoint_min_gap};
                  }
                  id(target_temperature) = new_temp;
                  // Update the selected dual-setpoint cache immediately so
                  // its on-screen arc and knob follow every encoder detent.
                  if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v))) {
                    if (id(adjust_target) == 1) id(target_high_v) = new_temp;
                    else id(target_low_v) = new_temp;
                  }
                  id(pending_temperature_change) = true;
              - script.execute: refresh_temps
              - script.execute: send_temperature_update
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 2;'
            then:
              - lambda: |-
                  int d = id(encoder_delta) > 0 ? 1 : -1;
                  id(menu_index) = (id(menu_index) + d + SETTINGS_ROOT_COUNT) % SETTINGS_ROOT_COUNT;
                  id(settings_scroll_dir) = d;
              - script.execute: animate_settings_scroll
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 3;'
            then:
              - lambda: |-
                  int d = id(encoder_delta) > 0 ? 1 : -1;
                  int count = settings_group_entry_count(id(menu_index));
                  if (count > 0)
                    id(group_item_index) = (id(group_item_index) + d + count) % count;
                  id(settings_scroll_dir) = d;
              - script.execute: animate_settings_scroll
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 4;'
            then:
              - lambda: |-
                  int d = id(encoder_delta) > 0 ? 1 : -1;
                  switch (id(submenu_type)) {
                    case 0:
                    case 1:
                    case 13:
                      if (id(submenu_count) > 0)
                        id(submenu_index) = (id(submenu_index) + d + id(submenu_count)) % id(submenu_count);
                      break;
                    case 2:
                      id(brightness_pct) = clamp(id(brightness_pct) + d * 5, 5, 100);
                      break;
                    case 3: case 4: case 5: case 6: case 7:
                    case 12: case 16: case 17:
                      id(submenu_index) = 1 - id(submenu_index);
                      break;
                    case 8:
                    case 9:
                      id(num_preview) = clamp(id(num_preview) + d * 5, 5, 300);
                      break;
                    case 10:
                    case 18:
                      id(num_preview) = clamp(id(num_preview) + d * 5, 0, 100);
                      break;
                    default:
                      break;
                  }
              - if:
                  condition:
                    lambda: 'return id(submenu_type) == 2;'
                  then:
                    - light.turn_on:
                        id: display_backlight
                        brightness: !lambda 'return id(brightness_pct) / 100.0f;'
              - if:
                  condition:
                    lambda: 'return id(submenu_type) == 18;'
                  then:
                    - script.execute: preview_led_brightness
              - script.execute: update_settings_labels

  # ---- Current temperature ----
  - platform: homeassistant
    id: current_temperature_ha
    entity_id: ${climate_default_entity}
    attribute: current_temperature
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !std::isnan(x);'
            then:
              - lambda: 'id(pending_current_temperature) = x;'
              - script.execute: refresh_temps

  # ---- Target temperature for single-setpoint entities. Dual-setpoint
  # entities use target_temp_low/high for display. ----
  - platform: homeassistant
    id: target_temperature_ha
    entity_id: ${climate_default_entity}
    attribute: temperature
    on_value:
      then:
        - if:
            condition:
              lambda: |-
                return !id(pending_temperature_change) && !std::isnan(x)
                       && std::isnan(id(target_low_v));
            then:
              - lambda: 'id(target_temperature) = x;'
              - script.execute: refresh_temps

  # ---- Dual setpoint (TRV = heat / AC = cool) ----
  - platform: homeassistant
    id: target_low_ha
    entity_id: ${climate_default_entity}
    attribute: target_temp_low
    on_value:
      then:
        - lambda: 'id(target_low_v) = x;'
        - if:
            condition:
              lambda: 'return !id(pending_temperature_change) && !std::isnan(x) && id(adjust_target) == 0;'
            then:
              - lambda: 'id(target_temperature) = x;'
        # The inactive setpoint must redraw too, otherwise only one knob is
        # visible until TRV/AC is toggled.
        - script.execute: refresh_temps
  - platform: homeassistant
    id: target_high_ha
    entity_id: ${climate_default_entity}
    attribute: target_temp_high
    on_value:
      then:
        - lambda: 'id(target_high_v) = x;'
        - if:
            condition:
              lambda: 'return !id(pending_temperature_change) && !std::isnan(x) && id(adjust_target) == 1;'
            then:
              - lambda: 'id(target_temperature) = x;'
        - script.execute: refresh_temps

  # ---- Humidity: better_thermostat "humidity" or standard
  # "current_humidity". ----
  - platform: homeassistant
    id: humidity_ha
    entity_id: ${climate_default_entity}
    attribute: humidity
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !std::isnan(x);'
            then:
              - lambda: 'id(pending_humidity) = x;'
              - script.execute: refresh_temps
  - platform: homeassistant
    id: current_humidity_ha
    entity_id: ${climate_default_entity}
    attribute: current_humidity
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !std::isnan(x);'
            then:
              - lambda: 'id(pending_humidity) = x;'
              - script.execute: refresh_temps

  - platform: wifi_signal
    id: wifi_rssi
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

# ------------------------------------------------------------------
# HVAC state, mode/preset lists, and active preset.
# ------------------------------------------------------------------
text_sensor:
  - platform: homeassistant
    id: hvac_state_ha
    entity_id: ${climate_default_entity}
    on_value:
      then:
        - lambda: 'id(current_hvac_raw) = x;'
        - script.execute: refresh_temps
        - script.execute: refresh_status
        - script.execute: refresh_connection

  # Current action phase: heating, cooling, idle, or off.
  - platform: homeassistant
    id: hvac_action_ha
    entity_id: ${climate_default_entity}
    attribute: hvac_action
    on_value:
      then:
        - lambda: 'id(current_action_raw) = x;'
        - script.execute: refresh_status

  - platform: homeassistant
    id: hvac_modes_ha
    entity_id: ${climate_default_entity}
    attribute: hvac_modes
    on_value:
      then:
        - lambda: 'id(hvac_modes_raw) = x;'
        - script.execute: refresh_temps

  - platform: homeassistant
    id: preset_modes_ha
    entity_id: ${climate_default_entity}
    attribute: preset_modes
    on_value:
      then:
        - lambda: 'id(preset_modes_raw) = x;'

  - platform: homeassistant
    id: preset_ha
    entity_id: ${climate_default_entity}
    attribute: preset_mode
    on_value:
      then:
        - lambda: 'id(current_preset_raw) = x;'
        - script.execute: refresh_status

  - platform: version
    id: fw_version
    name: "${friendly_name} Firmware"

  - platform: wifi_info
    ip_address:
      id: wifi_ip_txt
      name: "${friendly_name} IP"
    ssid:
      id: wifi_ssid_txt
      name: "${friendly_name} SSID"

# ------------------------------------------------------------------
# Scripts
# ------------------------------------------------------------------
script:
  # After API connect, force-copy Home Assistant states into globals. This
  # covers cases where individual on_value automations do not fire during init.
  - id: sync_ha_states
    mode: restart
    then:
      - delay: 2s
      - lambda: |-
          if (id(preset_ha).has_state())       id(current_preset_raw)  = id(preset_ha).state;
          if (id(hvac_state_ha).has_state())   id(current_hvac_raw)    = id(hvac_state_ha).state;
          if (id(hvac_action_ha).has_state())  id(current_action_raw)  = id(hvac_action_ha).state;
          if (id(hvac_modes_ha).has_state())   id(hvac_modes_raw)      = id(hvac_modes_ha).state;
          if (id(preset_modes_ha).has_state()) id(preset_modes_raw)    = id(preset_modes_ha).state;
          if (!std::isnan(id(target_low_ha).state))  id(target_low_v)  = id(target_low_ha).state;
          if (!std::isnan(id(target_high_ha).state)) id(target_high_v) = id(target_high_ha).state;
          if (!std::isnan(id(current_temperature_ha).state))
            id(pending_current_temperature) = id(current_temperature_ha).state;
          if (!id(pending_temperature_change)) {
            if (!std::isnan(id(target_low_v)) && id(adjust_target) == 0)
              id(target_temperature) = id(target_low_v);
            else if (!std::isnan(id(target_high_v)) && id(adjust_target) == 1)
              id(target_temperature) = id(target_high_v);
            else if (!std::isnan(id(target_temperature_ha).state) && std::isnan(id(target_low_v)))
              id(target_temperature) = id(target_temperature_ha).state;
          }
      - script.execute: refresh_temps
      - script.execute: refresh_status
      - script.execute: refresh_connection

  - id: send_temperature_update
    mode: restart
    then:
      - delay: ${debounce_ms}
      - if:
          condition:
            lambda: 'return id(pending_temperature_change);'
          then:
            - lambda: |-
                // Refresh the cache directly from Home Assistant sensors.
                if (std::isnan(id(target_low_v)))  id(target_low_v)  = id(target_low_ha).state;
                if (std::isnan(id(target_high_v))) id(target_high_v) = id(target_high_ha).state;
            - if:
                condition:
                  lambda: 'return !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));'
                then:
                  # Dual setpoint: update only the active target and clamp it
                  # against the other target so the range never crosses.
                  - lambda: |-
                      if (id(adjust_target) == 1) {
                        id(target_high_v) = id(target_temperature);
                        if (id(target_high_v) < id(target_low_v) + ${setpoint_min_gap})
                          id(target_high_v) = id(target_low_v) + ${setpoint_min_gap};
                        id(target_temperature) = id(target_high_v);
                      } else {
                        id(target_low_v) = id(target_temperature);
                        if (id(target_low_v) > id(target_high_v) - ${setpoint_min_gap})
                          id(target_low_v) = id(target_high_v) - ${setpoint_min_gap};
                        id(target_temperature) = id(target_low_v);
                      }
                  - script.execute: refresh_temps
                  - homeassistant.service:
                      service: climate.set_temperature
                      data:
                        entity_id: !lambda 'return id(climate_entity).state;'
                        target_temp_low: !lambda |-
                          char buf[16];
                          snprintf(buf, sizeof(buf), "%.1f", id(target_low_v));
                          return std::string(buf);
                        target_temp_high: !lambda |-
                          char buf[16];
                          snprintf(buf, sizeof(buf), "%.1f", id(target_high_v));
                          return std::string(buf);
                else:
                  - homeassistant.service:
                      service: climate.set_temperature
                      data:
                        entity_id: !lambda 'return id(climate_entity).state;'
                        temperature: !lambda |-
                          char buf[16];
                          snprintf(buf, sizeof(buf), "%.1f", id(target_temperature));
                          return std::string(buf);
            - lambda: 'id(pending_temperature_change) = false;'

  - id: wake_display
    then:
      # Reset LVGL idle timers. Encoder/button input is not an LVGL input
      # device, so dim and idle timers would otherwise ignore knob activity.
      - lambda: 'lv_disp_trig_activity(nullptr);'
      - if:
          condition:
            lambda: 'return id(display_dimmed);'
          then:
            - lambda: 'id(display_dimmed) = false;'
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(brightness_pct) / 100.0f;'
            - script.execute: update_status_led

  # Horizontal swipes switch between thermostat and settings. Home is kept out
  # of this swipe order so it can only be reached by the existing idle/back flow.
  - id: handle_swipe_release
    then:
      - if:
          condition:
            lambda: |-
              int dx = id(swipe_last_x) - id(swipe_start_x);
              int dy = id(swipe_last_y) - id(swipe_start_y);
              return id(ui_context) == 1 && dx < -60 && abs(dx) > abs(dy);
          then:
            - script.execute: wake_display
            - script.execute: open_settings
      - if:
          condition:
            lambda: |-
              int dx = id(swipe_last_x) - id(swipe_start_x);
              int dy = id(swipe_last_y) - id(swipe_start_y);
              return id(ui_context) >= 2 && dx > 60 && abs(dx) > abs(dy);
          then:
            - script.execute: wake_display
            - lambda: 'id(ui_context) = 1;'
            - lvgl.page.show:
                id: screen_thermostat
                animation: MOVE_RIGHT
                time: 220ms

  - id: toggle_adjust_target
    then:
      - lambda: |-
          // Refresh the cache directly from Home Assistant sensors.
          if (std::isnan(id(target_low_v)))  id(target_low_v)  = id(target_low_ha).state;
          if (std::isnan(id(target_high_v))) id(target_high_v) = id(target_high_ha).state;
      - if:
          condition:
            lambda: 'return !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));'
          then:
            # Real dual-setpoint entity (heat_cool): switch between low (TRV)
            # and high (AC).
            - lambda: |-
                id(adjust_target) = 1 - id(adjust_target);
                id(target_temperature) = id(adjust_target) == 1 ? id(target_high_v) : id(target_low_v);
            - script.execute: refresh_temps
            - script.execute: refresh_status
          else:
            # better_thermostat style: one temperature attribute; TRV = heat
            # mode, AC = cool mode, so toggle the mode.
            - if:
                condition:
                  lambda: |-
                    auto v = ha_parse_list(id(hvac_modes_raw));
                    bool h = false, c = false;
                    for (auto &m : v) { if (m == "heat") h = true; if (m == "cool") c = true; }
                    return h && c;
                then:
                  - homeassistant.service:
                      service: climate.set_hvac_mode
                      data:
                        entity_id: !lambda 'return id(climate_entity).state;'
                        hvac_mode: !lambda |-
                          return id(current_hvac_raw) == "cool" ? std::string("heat") : std::string("cool");

  # Status LED hook. Boards with an LED strip extend this placeholder; boards
  # without one keep it empty.
  - id: update_status_led
    then: []

  # Live preview for LED brightness while rotating in the settings submenu.
  # The 240x240 board overrides this placeholder with `!extend`.
  - id: preview_led_brightness
    then: []

  # All temperature/humidity labels and ring fill level.
  - id: refresh_temps
    then:
      # Icon glyphs from thermostat_helpers.h; keep PUA characters out of YAML.
      - lvgl.label.update:
          id: icon_thermo_current
          text: !lambda 'return std::string(ICON_THERMO_HIGH);'
      - lvgl.widget.update:
          id: icon_thermo_current
          text_color: !lambda |-
            if (id(design_select).current_option() != "Color") return lv_color_hex(0xFFFFFF);
            return lv_color_hex(0xFF5A2D);
      - lvgl.label.update:
          id: icon_hum_thermo
          text: !lambda 'return std::string(ICON_DROPLET_HALF);'
      - lvgl.widget.update:
          id: icon_hum_thermo
          text_color: !lambda |-
            if (id(design_select).current_option() != "Color") return lv_color_hex(0xFFFFFF);
            return lv_color_hex(0x6EC6FF);
      # TRV/AC indicator, visible only in dual-setpoint mode.
      - if:
          condition:
            lambda: 'return !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));'
          then:
            - lvgl.label.update:
                id: label_setpoint_mode
                text: !lambda 'return id(adjust_target) == 1 ? std::string("AC") : std::string("TRV");'
            - lvgl.widget.show: label_setpoint_mode
          else:
            - lvgl.widget.hide: label_setpoint_mode
      - lvgl.label.update:
          id: label_target_temperature
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            return to_string((int) display_temp(id(target_temperature), f));
      - lvgl.label.update:
          id: label_target_decimal
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            float t = display_temp(id(target_temperature), f);
            int frac = (int) roundf((t - (int) t) * 10.0f);
            char buf[8];
            snprintf(buf, sizeof(buf), ".%d", abs(frac));
            return std::string(buf);
      - lvgl.label.update:
          id: label_target_unit
          text: !lambda 'return id(unit_select).current_option() == "Fahrenheit" ? std::string("°F") : std::string("°C");'
      - lvgl.label.update:
          id: label_current_temperature
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f°", display_temp(id(pending_current_temperature), f));
            return std::string(buf);
      - lvgl.label.update:
          id: label_home_current_temperature
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            return to_string((int) display_temp(id(pending_current_temperature), f));
      - lvgl.label.update:
          id: label_home_current_decimal
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            float c = display_temp(id(pending_current_temperature), f);
            int frac = (int) roundf((c - (int) c) * 10.0f);
            char buf[8];
            snprintf(buf, sizeof(buf), ".%d", abs(frac));
            return std::string(buf);
      - lvgl.label.update:
          id: label_home_current_unit
          text: !lambda 'return id(unit_select).current_option() == "Fahrenheit" ? std::string("°F") : std::string("°C");'
      # Two independent setpoint handles share the same neutral track. Heat
      # fills from the left; cool uses REVERSE mode and fills from the right.
      # Animate the underlying arc value so its indicator and knob move as one.
      # Restarting from the currently rendered value also keeps quick encoder
      # turns fluid instead of snapping between consecutive temperature steps.
      - lambda: |-
          lv_anim_exec_xcb_t set_arc_value = [](void *var, int32_t value) {
            lv_arc_set_value(static_cast<lv_obj_t *>(var), value);
          };
          auto animate_arc_to = [set_arc_value](lv_obj_t *arc, int32_t target) {
            target = clamp(target, (int32_t) 0, (int32_t) 100);
            int32_t current = lv_arc_get_value(arc);
            lv_anim_delete(arc, set_arc_value);
            if (current == target) return;

            lv_anim_t anim;
            lv_anim_init(&anim);
            lv_anim_set_var(&anim, arc);
            lv_anim_set_values(&anim, current, target);
            lv_anim_set_time(&anim, 180);
            lv_anim_set_path_cb(&anim, lv_anim_path_ease_out);
            lv_anim_set_exec_cb(&anim, set_arc_value);
            lv_anim_start(&anim);
          };

          auto normalize_temperature = [](float temperature) {
            return clamp((int32_t) roundf((temperature - ${temperature_min}) /
                                          (${temperature_max} - ${temperature_min}) * 100.0f),
                         (int32_t) 0, (int32_t) 100);
          };

          float heat_target = !std::isnan(id(target_low_v))
                                  ? id(target_low_v) : id(target_temperature);
          float cool_target = !std::isnan(id(target_high_v))
                                  ? id(target_high_v) : id(target_temperature);
          int32_t cool_normalized = normalize_temperature(cool_target);

          animate_arc_to(id(arc_temperature_heat), normalize_temperature(heat_target));
          // REVERSE places internal value 0 at the right-hand end. Inverting
          // the visual value keeps minimum temperature on the left like HA.
          animate_arc_to(id(arc_temperature_cool), 100 - cool_normalized);
          animate_arc_to(id(arc_temperature_current),
                         normalize_temperature(id(pending_current_temperature)));
      - if:
          condition:
            lambda: |-
              if (!std::isnan(id(target_low_v))) return true;
              for (const auto &mode : ha_parse_list(id(hvac_modes_raw)))
                if (mode == "heat" || mode == "heat_cool" || mode == "auto") return true;
              return id(current_hvac_raw) == "heat" || id(current_hvac_raw) == "heat_cool";
          then:
            - lvgl.widget.show: arc_temperature_heat
          else:
            - lvgl.widget.hide: arc_temperature_heat
      - if:
          condition:
            lambda: |-
              if (!std::isnan(id(target_high_v))) return true;
              for (const auto &mode : ha_parse_list(id(hvac_modes_raw)))
                if (mode == "cool" || mode == "heat_cool" || mode == "auto") return true;
              return id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "heat_cool"
                     || id(current_hvac_raw) == "dry"
                     || id(current_hvac_raw) == "fan_only";
          then:
            - lvgl.widget.show: arc_temperature_cool
          else:
            - lvgl.widget.hide: arc_temperature_cool
      # Humidity, only visible when a value exists.
      - if:
          condition:
            lambda: 'return !std::isnan(id(pending_humidity));'
          then:
            - lvgl.label.update:
                id: label_humidity_thermo
                text: !lambda |-
                  char buf[8];
                  snprintf(buf, sizeof(buf), "%.0f%%", id(pending_humidity));
                  return std::string(buf);
            - lvgl.label.update:
                id: label_home_humidity
                text: !lambda |-
                  char buf[8];
                  snprintf(buf, sizeof(buf), "%.0f%%", id(pending_humidity));
                  return std::string(buf);
            - lvgl.widget.show: label_humidity_thermo
            - lvgl.widget.show: label_home_humidity
            - if:
                condition:
                  lambda: 'return id(icons_enabled).state;'
                then:
                  - lvgl.widget.show: icon_hum_thermo
                else:
                  - lvgl.widget.hide: icon_hum_thermo
          else:
            - lvgl.widget.hide: label_humidity_thermo
            - lvgl.widget.hide: label_home_humidity
            - lvgl.widget.hide: icon_hum_thermo
      - if:
          condition:
            lambda: 'return id(icons_enabled).state;'
          then:
            - lvgl.widget.show: icon_thermo_current
          else:
            - lvgl.widget.hide: icon_thermo_current

  # Status lines, mode icons, and ring color.
  - id: refresh_status
    then:
      - lvgl.label.update:
          id: label_hvac_mode
          text: !lambda 'return ha_hvac_mode_label(id(current_hvac_raw), false);'
      - lvgl.label.update:
          id: label_home_hvac_mode
          text: !lambda 'return ha_hvac_mode_label(id(current_hvac_raw), false);'
      - lvgl.label.update:
          id: label_preset
          text: !lambda 'return ha_preset_label(id(current_preset_raw), false);'
      - lvgl.label.update:
          id: label_home_preset
          text: !lambda 'return ha_preset_label(id(current_preset_raw), false);'
      - lvgl.label.update:
          id: icon_mode_thermo
          text: !lambda |-
            if (id(current_hvac_raw) == "off") return std::string(ICON_POWER);
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)))
              return std::string(id(adjust_target) == 1 ? ICON_SNOW : ICON_FIRE);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return std::string(ICON_SNOW);
            return std::string(ICON_FIRE);
      - lvgl.label.update:
          id: icon_mode_home
          text: !lambda |-
            if (id(current_hvac_raw) == "off") return std::string(ICON_POWER);
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)))
              return std::string(id(adjust_target) == 1 ? ICON_SNOW : ICON_FIRE);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return std::string(ICON_SNOW);
            return std::string(ICON_FIRE);
      - lvgl.widget.update:
          id: icon_mode_thermo
          text_color: !lambda |-
            // No active heating/cooling phase (idle/off): use dark gray.
            if (id(current_action_raw) != "heating" && id(current_action_raw) != "cooling")
              return lv_color_hex(0x9A9A9A);
            // Active AC target: snow icon is always blue.
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)) && id(adjust_target) == 1)
              return lv_color_hex(0x6EC6FF);
            if (id(design_select).current_option() != "Color") return lv_color_hex(0xFFFFFF);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return lv_color_hex(0x6EC6FF);
            return lv_color_hex(0xFF8A3D);
      - lvgl.widget.update:
          id: icon_mode_home
          text_color: !lambda |-
            // No active heating/cooling phase (idle/off): use dark gray.
            if (id(current_action_raw) != "heating" && id(current_action_raw) != "cooling")
              return lv_color_hex(0x9A9A9A);
            // Active AC target: snow icon is always blue.
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)) && id(adjust_target) == 1)
              return lv_color_hex(0x6EC6FF);
            if (id(design_select).current_option() != "Color") return lv_color_hex(0xFFFFFF);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return lv_color_hex(0x6EC6FF);
            return lv_color_hex(0xFF8A3D);
      # Keep both setpoint markers visible at once. Switching TRV/AC still only
      # changes `adjust_target`; it does not hide the other setpoint.
      - lvgl.arc.update:
          id: arc_temperature_heat
          indicator:
            arc_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
          knob:
            bg_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
            border_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
      - lvgl.arc.update:
          id: arc_temperature_cool
          indicator:
            arc_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
          knob:
            bg_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
            border_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
      - if:
          condition:
            lambda: 'return id(icons_enabled).state && id(ha_connected);'
          then:
            - lvgl.widget.show: icon_mode_thermo
            - lvgl.widget.show: icon_mode_home
          else:
            - lvgl.widget.hide: icon_mode_thermo
            - lvgl.widget.hide: icon_mode_home
      - script.execute: update_status_led

  # Staged connection diagnostics: WiFi -> HA API -> climate entity.
  - id: refresh_connection
    mode: restart
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: |-
                id(connection_ready) = false;
                if (!id(ha_connected)) {
                  id(connection_message) = millis() < 60000
                      ? "HA connecting..." : "HA unreachable";
                  return;
                }
                bool valid_climate = id(hvac_state_ha).has_state()
                    && !id(hvac_state_ha).state.empty()
                    && id(hvac_state_ha).state != "unknown"
                    && id(hvac_state_ha).state != "unavailable";
                if (valid_climate) {
                  id(connection_ready) = true;
                  id(connection_message).clear();
                  return;
                }
                uint32_t connected_for = millis() - id(ha_connected_since_ms);
                id(connection_message) = connected_for < 10000
                    ? "Climate entity loading..." : "Climate entity not found";
          else:
            - lambda: |-
                id(connection_ready) = false;
                id(connection_message) = millis() < 30000
                    ? "WiFi connecting..." : "WiFi error";
      - lvgl.label.update:
          id: label_conn_thermo
          text: !lambda 'return id(connection_message);'
      - lvgl.label.update:
          id: label_conn_home
          text: !lambda 'return id(connection_message);'
      - if:
          condition:
            lambda: 'return id(connection_ready);'
          then:
            - lvgl.widget.hide: label_conn_thermo
            - lvgl.widget.hide: label_conn_home
            - lvgl.widget.show: label_hvac_mode
            - lvgl.widget.show: label_home_hvac_mode
            - lvgl.widget.show: label_preset
            - lvgl.widget.show: label_home_preset
            - script.execute: refresh_status
          else:
            - lvgl.widget.show: label_conn_thermo
            - lvgl.widget.show: label_conn_home
            - lvgl.widget.hide: label_hvac_mode
            - lvgl.widget.hide: label_home_hvac_mode
            - lvgl.widget.hide: label_preset
            - lvgl.widget.hide: label_home_preset
            - lvgl.widget.hide: icon_mode_thermo
            - lvgl.widget.hide: icon_mode_home

  - id: open_settings
    then:
      - lambda: |-
          id(ui_context) = 2;
          id(menu_index) = 0;
          id(group_item_index) = 0;
      - script.execute: update_settings_labels
      - lvgl.page.show:
          id: screen_settings
          animation: MOVE_LEFT
          time: 220ms

  - id: group_enter
    then:
      - lambda: |-
          id(group_item_index) = 0;
          id(ui_context) = 3;
      - script.execute: update_settings_labels

  - id: menu_enter
    then:
      - lambda: |-
          id(submenu_type) = settings_group_type_at(id(menu_index), id(group_item_index));
          id(submenu_index) = 0;
          switch (id(submenu_type)) {
            case 0: {
              auto vec = ha_filter_modes(id(hvac_modes_raw), id(knob_hvac_modes).current_option() != "All");
              id(submenu_count) = (int) vec.size();
              for (size_t i = 0; i < vec.size(); i++)
                if (vec[i] == id(current_hvac_raw)) { id(submenu_index) = (int) i; break; }
              break;
            }
            case 1: {
              auto vec = ha_filter_presets(id(preset_modes_raw));
              id(submenu_count) = (int) vec.size();
              for (size_t i = 0; i < vec.size(); i++)
                if (vec[i] == id(current_preset_raw)) { id(submenu_index) = (int) i; break; }
              break;
            }
            case 2: break;
            case 3:  id(submenu_index) = id(time_24h).state ? 1 : 0; break;
            case 4:  id(submenu_index) = 0; id(submenu_count) = 1; break;
            case 5:  id(submenu_index) = id(design_select).current_option() == "Color" ? 1 : 0; break;
            case 6:  id(submenu_index) = id(icons_enabled).state ? 1 : 0; break;
            case 7:  id(submenu_index) = id(unit_select).current_option() == "Fahrenheit" ? 1 : 0; break;
            case 8:  id(num_preview) = (int) id(idle_home_num).state; break;
            case 9:  id(num_preview) = (int) id(dim_delay_num).state; break;
            case 10: id(num_preview) = (int) id(dim_level_num).state; break;
            case 12: id(submenu_index) = id(knob_hvac_modes).current_option() == "All" ? 1 : 0; break;
            case 13: {
              static const char *const opts[] = {"0.1", "0.2", "0.5", "1.0"};
              id(submenu_count) = 4;
              for (int i = 0; i < 4; i++)
                if (id(knob_step_select).current_option() == opts[i]) { id(submenu_index) = i; break; }
              break;
            }
            case 17: id(submenu_index) = id(led_enabled).state ? 1 : 0; break;
            case 18: id(num_preview) = (int) id(led_brightness_num).state; break;
            default: break;
          }
          id(ui_context) = 4;
      - script.execute: update_settings_labels

  - id: submenu_apply
    then:
      - lambda: |-
          id(apply_service) = 0;
          switch (id(submenu_type)) {
            case 0: {
              auto vec = ha_filter_modes(id(hvac_modes_raw), id(knob_hvac_modes).current_option() != "All");
              int n = (int) vec.size();
              if (n <= 0) break;
              int idx = ((id(submenu_index) % n) + n) % n;
              id(pending_mode_holder) = vec[idx];
              id(apply_service) = 1;
              break;
            }
            case 1: {
              auto vec = ha_filter_presets(id(preset_modes_raw));
              int n = (int) vec.size();
              if (n <= 0) break;
              int idx = ((id(submenu_index) % n) + n) % n;
              id(pending_mode_holder) = vec[idx];
              id(apply_service) = 2;
              break;
            }
            case 3:  id(apply_service) = id(submenu_index) ? 3 : 4; break;
            case 4:  id(apply_service) = 8; break;
            case 5:  id(apply_service) = id(submenu_index) ? 11 : 10; break;
            case 6:  id(apply_service) = id(submenu_index) ? 13 : 12; break;
            case 7:  id(apply_service) = id(submenu_index) ? 15 : 14; break;
            case 8:  id(apply_service) = 16; break;
            case 9:  id(apply_service) = 17; break;
            case 10: id(apply_service) = 18; break;
            case 12: id(apply_service) = id(submenu_index) ? 5 : 6; break;
            case 13: {
              static const char *const opts[] = {"0.1", "0.2", "0.5", "1.0"};
              int idx = ((id(submenu_index) % 4) + 4) % 4;
              id(pending_mode_holder) = opts[idx];
              id(apply_service) = 21;
              break;
            }
            case 16: if (id(submenu_index) == 1) id(apply_service) = 7; break;
            case 17: id(apply_service) = id(submenu_index) ? 23 : 22; break;
            case 18: id(apply_service) = 24; break;
            default: break;
          }
          id(ui_context) = 3;
      - if:
          condition: {lambda: 'return id(apply_service) == 1;'}
          then:
            - homeassistant.service:
                service: climate.set_hvac_mode
                data:
                  entity_id: !lambda 'return id(climate_entity).state;'
                  hvac_mode: !lambda 'return id(pending_mode_holder);'
      - if:
          condition: {lambda: 'return id(apply_service) == 2;'}
          then:
            - homeassistant.service:
                service: climate.set_preset_mode
                data:
                  entity_id: !lambda 'return id(climate_entity).state;'
                  preset_mode: !lambda 'return id(pending_mode_holder);'
      - if:
          condition: {lambda: 'return id(apply_service) == 3;'}
          then: [switch.turn_on: time_24h]
      - if:
          condition: {lambda: 'return id(apply_service) == 4;'}
          then: [switch.turn_off: time_24h]
      - if:
          condition: {lambda: 'return id(apply_service) == 5;'}
          then: [{select.set: {id: knob_hvac_modes, option: "All"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 6;'}
          then: [{select.set: {id: knob_hvac_modes, option: "Heat/Off"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 7;'}
          then: [button.press: factory_reset_btn]
      - if:
          condition: {lambda: 'return id(apply_service) == 8;'}
          then: [{select.set: {id: language_select, option: "English"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 9;'}
          then: [{select.set: {id: language_select, option: "English"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 10;'}
          then: [{select.set: {id: design_select, option: "Mono"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 11;'}
          then: [{select.set: {id: design_select, option: "Color"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 12;'}
          then: [switch.turn_off: icons_enabled]
      - if:
          condition: {lambda: 'return id(apply_service) == 13;'}
          then: [switch.turn_on: icons_enabled]
      - if:
          condition: {lambda: 'return id(apply_service) == 14;'}
          then: [{select.set: {id: unit_select, option: "Celsius"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 15;'}
          then: [{select.set: {id: unit_select, option: "Fahrenheit"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 16;'}
          then: [{number.set: {id: idle_home_num, value: !lambda 'return id(num_preview);'}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 17;'}
          then: [{number.set: {id: dim_delay_num, value: !lambda 'return id(num_preview);'}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 18;'}
          then: [{number.set: {id: dim_level_num, value: !lambda 'return id(num_preview);'}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 21;'}
          then:
            - select.set:
                id: knob_step_select
                option: !lambda 'return id(pending_mode_holder);'
      - if:
          condition: {lambda: 'return id(apply_service) == 22;'}
          then: [switch.turn_off: led_enabled]
      - if:
          condition: {lambda: 'return id(apply_service) == 23;'}
          then: [switch.turn_on: led_enabled]
      - if:
          condition: {lambda: 'return id(apply_service) == 24;'}
          then: [{number.set: {id: led_brightness_num, value: !lambda 'return id(num_preview);'}}]
      - script.execute: update_settings_labels

  # Slide the newly selected settings row into the fixed center selection.
  # Labels and icons have no background objects, matching the round list UI.
  - id: animate_settings_scroll
    mode: restart
    then:
      - script.execute: update_settings_labels
      - lambda: |-
          int32_t from = id(settings_scroll_dir) * ${settings_row_gap};
          auto animate_translate_y = [from](lv_obj_t *obj) {
            lv_anim_del(obj, nullptr);
            lv_obj_set_style_translate_y(obj, from, LV_PART_MAIN);
            lv_anim_t anim;
            lv_anim_init(&anim);
            lv_anim_set_var(&anim, obj);
            lv_anim_set_values(&anim, from, 0);
            lv_anim_set_time(&anim, 180);
            lv_anim_set_path_cb(&anim, lv_anim_path_ease_out);
            lv_anim_set_exec_cb(&anim, [](void *var, int32_t value) {
              lv_obj_set_style_translate_y(static_cast<lv_obj_t *>(var), value, LV_PART_MAIN);
            });
            lv_anim_start(&anim);
          };
          animate_translate_y(id(label_menu_icon_prev));
          animate_translate_y(id(label_menu_icon));
          animate_translate_y(id(label_menu_icon_next));
          animate_translate_y(id(label_menu_icon_prev2));
          animate_translate_y(id(label_menu_icon_next2));
          animate_translate_y(id(label_menu_prev));
          animate_translate_y(id(label_menu_current));
          animate_translate_y(id(label_menu_next));
          animate_translate_y(id(label_menu_prev2));
          animate_translate_y(id(label_menu_next2));
          id(settings_scroll_dir) = 0;

  - id: update_settings_labels
    then:
      - lambda: |-
          bool de = false;
          char buf[64];
          if (id(ui_context) == 2) {
            int position = settings_root_wrap(id(menu_index));
            id(set_title) = "Settings";
            id(set_prev2) = "";
            id(set_prev) = settings_root_name(position - 1);
            id(set_cur) = settings_root_name(position);
            id(set_next) = settings_root_name(position + 1);
            id(set_next2) = "";
            if (position == SETTINGS_GROUP_COUNT) {
              id(set_value) = "Press = back";
            } else {
              snprintf(buf, sizeof(buf), "%d settings", settings_group_count(position));
              id(set_value) = buf;
            }
          } else if (id(ui_context) == 3) {
            int group = settings_group_wrap(id(menu_index));
            int count = settings_group_entry_count(group);
            int i = ((id(group_item_index) % count) + count) % count;
            int t = settings_group_entry_type_at(group, i);
            auto entry_name = [group, de](int position) -> std::string {
              int type = settings_group_entry_type_at(group, position);
              return type < 0 ? std::string("Back") : std::string(settings_menu_name(type, de));
            };
            id(set_title) = SETTINGS_GROUP_NAMES[group];
            id(set_prev2) = ${settings_extra_rows} && count >= 5
                                ? entry_name(i - 2) : "";
            id(set_prev) = count > 1 ? entry_name(i - 1) : "";
            id(set_cur) = entry_name(i);
            id(set_next) = count > 1 ? entry_name(i + 1) : "";
            id(set_next2) = ${settings_extra_rows} && count >= 5
                                ? entry_name(i + 2) : "";
            std::string val = t < 0 ? "Press = back" : "";
            switch (t) {
              case 0: val = ha_hvac_mode_label(id(current_hvac_raw), de); break;
              case 1: val = ha_preset_label(id(current_preset_raw), de); break;
              case 2: snprintf(buf, sizeof(buf), "%d%%", id(brightness_pct)); val = buf; break;
              case 3: val = id(time_24h).state ? "24h" : "12h"; break;
              case 4: val = id(language_select).current_option(); break;
              case 5: val = id(design_select).current_option() == "Color" ? "Color" : "Black/White"; break;
              case 6: val = id(icons_enabled).state ? "On" : "Off"; break;
              case 7: val = id(unit_select).current_option() == "Fahrenheit" ? "°F" : "°C"; break;
              case 8: snprintf(buf, sizeof(buf), "%ds", (int) id(idle_home_num).state); val = buf; break;
              case 9: snprintf(buf, sizeof(buf), "%ds", (int) id(dim_delay_num).state); val = buf; break;
              case 10: snprintf(buf, sizeof(buf), "%d%%", (int) id(dim_level_num).state); val = buf; break;
              case 12: val = id(knob_hvac_modes).current_option() == "All" ? "All modes" : "Heat/Off"; break;
              case 13: val = id(knob_step_select).current_option().str() + "°C"; break;
              case 14: val = id(wifi_ssid_txt).state; break;
              case 15: val = id(fw_version).state; break;
              case 16: val = ""; break;
              case 17: val = id(led_enabled).state ? "On" : "Off"; break;
              case 18: snprintf(buf, sizeof(buf), "%d%%", (int) id(led_brightness_num).state); val = buf; break;
            }
            id(set_value) = val;
          } else {
            int t = id(submenu_type);
            id(set_title) = settings_menu_name(t, de);
            id(set_prev2) = "";
            id(set_prev) = "";
            id(set_next) = "";
            id(set_next2) = "";
            std::string cur, val;
            std::string h_apply = "Press = apply";
            std::string h_save = "Press = save";
            std::string h_turn = "Turn = adjust";
            switch (t) {
              case 0:
              case 1: {
                std::vector<std::string> vec;
                if (t == 0) {
                  vec = ha_filter_modes(id(hvac_modes_raw), id(knob_hvac_modes).current_option() != "All");
                } else {
                  vec = ha_filter_presets(id(preset_modes_raw));
                }
                id(submenu_count) = (int) vec.size();
                int n = (int) vec.size();
                if (n <= 0) {
                  cur = t == 0 ? "No HVAC modes" : "No presets";
                  val = "Home Assistant unavailable";
                  break;
                }
                int idx = ((id(submenu_index) % n) + n) % n;
                cur = (t == 0) ? ha_hvac_mode_label(vec[idx], de) : ha_preset_label(vec[idx], de);
                if (n > 1) {
                  id(set_prev) = (t == 0) ? ha_hvac_mode_label(vec[(idx+n-1)%n], de) : ha_preset_label(vec[(idx+n-1)%n], de);
                  id(set_next) = (t == 0) ? ha_hvac_mode_label(vec[(idx+1)%n], de) : ha_preset_label(vec[(idx+1)%n], de);
                }
                val = h_apply;
                break;
              }
              case 2: snprintf(buf, sizeof(buf), "%d%%", id(brightness_pct)); cur = buf; val = h_turn; break;
              case 3: cur = id(submenu_index) ? "24h" : "12h"; val = h_save; break;
              case 4: cur = "English"; val = h_save; break;
              case 5: cur = id(submenu_index) ? "Color" : "Black/White"; val = h_save; break;
              case 6: cur = id(submenu_index) ? "On" : "Off"; val = h_save; break;
              case 7: cur = id(submenu_index) ? "°F" : "°C"; val = h_save; break;
              case 8:
              case 9: snprintf(buf, sizeof(buf), "%ds", id(num_preview)); cur = buf; val = h_save; break;
              case 10: snprintf(buf, sizeof(buf), "%d%%", id(num_preview)); cur = buf; val = h_save; break;
              case 12: cur = id(submenu_index) ? "All modes" : "Heat/Off"; val = h_save; break;
              case 13: {
                static const char *const opts[] = {"0.1", "0.2", "0.5", "1.0"};
                id(submenu_count) = 4;
                int idx = ((id(submenu_index) % 4) + 4) % 4;
                cur = std::string(opts[idx]) + "°C";
                id(set_prev) = std::string(opts[(idx + 3) % 4]) + "°C";
                id(set_next) = std::string(opts[(idx + 1) % 4]) + "°C";
                val = h_save;
                break;
              }
              case 14:
                cur = id(wifi_ssid_txt).state;
                snprintf(buf, sizeof(buf), "%s  %.0f dBm", id(wifi_ip_txt).state.c_str(), id(wifi_rssi).state);
                val = buf;
                break;
              case 15: cur = id(fw_version).state; val = ""; break;
              case 16: cur = id(submenu_index) == 1 ? "Yes, reset" : "No"; val = "Press = confirm"; break;
              case 17: cur = id(submenu_index) ? "On" : "Off"; val = h_save; break;
              case 18: snprintf(buf, sizeof(buf), "%d%%", id(num_preview)); cur = buf; val = h_save; break;
            }
            id(set_cur) = cur;
            id(set_value) = val;
          }
      - lvgl.label.update:
          id: label_settings_title
          text: !lambda 'return id(set_title);'
      - lvgl.label.update:
          id: label_menu_icon_prev2
          text: !lambda |-
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index) - 2));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index) - 2);
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - lvgl.label.update:
          id: label_menu_icon_prev
          text: !lambda |-
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index) - 1));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index) - 1);
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - lvgl.label.update:
          id: label_menu_icon
          text: !lambda |-
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index)));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index));
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - lvgl.label.update:
          id: label_menu_icon_next
          text: !lambda |-
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index) + 1));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index) + 1);
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - lvgl.label.update:
          id: label_menu_icon_next2
          text: !lambda |-
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index) + 2));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index) + 2);
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - if:
          condition: {lambda: 'return id(icons_enabled).state;'}
          then:
            - lvgl.widget.show: label_menu_icon
            - if:
                condition: {lambda: 'return !id(set_prev2).empty();'}
                then: [lvgl.widget.show: label_menu_icon_prev2]
                else: [lvgl.widget.hide: label_menu_icon_prev2]
            - if:
                condition: {lambda: 'return !id(set_prev).empty();'}
                then: [lvgl.widget.show: label_menu_icon_prev]
                else: [lvgl.widget.hide: label_menu_icon_prev]
            - if:
                condition: {lambda: 'return !id(set_next).empty();'}
                then: [lvgl.widget.show: label_menu_icon_next]
                else: [lvgl.widget.hide: label_menu_icon_next]
            - if:
                condition: {lambda: 'return !id(set_next2).empty();'}
                then: [lvgl.widget.show: label_menu_icon_next2]
                else: [lvgl.widget.hide: label_menu_icon_next2]
          else:
            - lvgl.widget.hide: label_menu_icon_prev2
            - lvgl.widget.hide: label_menu_icon_prev
            - lvgl.widget.hide: label_menu_icon
            - lvgl.widget.hide: label_menu_icon_next
            - lvgl.widget.hide: label_menu_icon_next2
      - lvgl.label.update: {id: label_menu_prev2, text: !lambda 'return id(set_prev2);'}
      - lvgl.label.update: {id: label_menu_prev, text: !lambda 'return id(set_prev);'}
      - lvgl.label.update: {id: label_menu_current, text: !lambda 'return id(set_cur);'}
      - lvgl.label.update: {id: label_menu_next, text: !lambda 'return id(set_next);'}
      - lvgl.label.update: {id: label_menu_next2, text: !lambda 'return id(set_next2);'}
      - lvgl.label.update: {id: label_menu_value, text: !lambda 'return id(set_value);'}

  - id: update_clock_labels
    then:
      - lambda: |-
          auto now = id(ha_time).now();
          if (!now.is_valid()) return;
          bool de = false;
          static const char* const day_en[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
          static const char* const mon_en[] = {"Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"};
          const char* day = day_en[(now.day_of_week - 1) % 7];
          const char* month = mon_en[(now.month - 1) % 12];
          char time_buf[12];
          if (id(time_24h).state) {
            snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
          } else {
            int h12 = now.hour % 12; if (h12 == 0) h12 = 12;
            snprintf(time_buf, sizeof(time_buf), "%d:%02d %s", h12, now.minute,
                     now.hour < 12 ? "AM" : "PM");
          }
          char date_buf[24];
          snprintf(date_buf, sizeof(date_buf), "%02d %s", now.day_of_month, month);
          id(pending_clock_time) = time_buf;
          id(pending_clock_day) = day;
          id(pending_home_date) = date_buf;
      - lvgl.label.update: {id: label_clock_time, text: !lambda 'return id(pending_clock_time);'}
      - lvgl.label.update: {id: label_home_time, text: !lambda 'return id(pending_clock_time);'}
      - lvgl.label.update: {id: label_thermo_weekday, text: !lambda 'return id(pending_clock_day);'}
      - lvgl.label.update: {id: label_home_weekday, text: !lambda 'return id(pending_clock_day);'}
      - lvgl.label.update: {id: label_thermo_date, text: !lambda 'return id(pending_home_date);'}
      - lvgl.label.update: {id: label_home_date, text: !lambda 'return id(pending_home_date);'}


# ------------------------------------------------------------------
# Uhrzeit
# ------------------------------------------------------------------
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      - script.execute: update_clock_labels
    on_time:
      - minutes: "*"
        seconds: 0
        then:
          - script.execute: update_clock_labels
