########################################################################
# thermostat_common.yaml
#
# Shared package for CrowPanel ESP32-S3 rotary displays (2.1"/480x480 and
# 1.28"/240x240). Board-specific hardware and each native LVGL layout live in
# thermostat_480.yaml and thermostat_240.yaml, which include this file through
# `packages:`. There is no automatic scaling; every board has its own layout.
#
# One or more Home Assistant climate entities drive the UI. Each can represent
# a thermostat-only setup, an AC-only setup, or a combined heat/cool entity.
# Available hvac_modes and preset_modes are read separately at runtime.
#
# Screens: screen_home (default), then horizontal navigation through
# configured thermostat pages -> configured light pages -> screen_navigation.
#
# Knob controls:
#   Home:        rotate or short-press -> thermostat screen
#   Thermostat:  rotate -> target temperature +/- configured step
#                short-press -> switch TRV/AC target
#                vertical swipe -> HVAC, then preset quick selector
#   Light:       rotate -> selected light value, short-press -> light.toggle
#                vertical swipe -> next brightness/temperature/color mode
#   Settings:    rotate = scroll/change value, short-press = select/OK
#   Everywhere:  hold knob for 800 ms -> back
#                Idle -> dim display and return home after configured delays
#
# Home Assistant must allow this ESPHome device to perform Home Assistant
# actions, otherwise climate.set_temperature and related service calls will not
# run.
#
# Climate and light entities come from JSON attributes on a Home Assistant
# template sensor. Their live states are subscribed dynamically afterwards.
#
# Hardware-Details siehe jeweilige Board-Datei:
#   thermostat_480.yaml: ST7701S RGB-Panel, CST826-Touch (extern gepatcht),
#                         PCF8574-Expander, Encoder GPIO4/42.
#   thermostat_240.yaml: GC9A01A SPI-Panel, CST816-Touch, Encoder GPIO45/42.
# encoder_button and temperature_encoder define 480x480 defaults below.
# thermostat_240.yaml overrides them with `!extend`.
########################################################################

substitutions:
  device_name: thermostat
  friendly_name: "Thermostat Knob"
  # Home Assistant template sensor that provides the JSON attributes
  # `climates` and `lights`. It can also be changed later from Home Assistant.
  ha_config_entity_id: "sensor.smart_knob_config"

  # ---- Behavior ----
  temperature_step: "0.5"       # Celsius per encoder detent; internal values stay Celsius
  temperature_min: "5.0"
  temperature_max: "30.0"
  setpoint_min_gap: "0.5"       # Minimum TRV(low) <-> AC(high) gap in Celsius
  debounce_ms: "500ms"          # Quiet time before climate.set_temperature
  settings_row_gap: "82"        # Overridden by the 240x240 board
  settings_extra_rows: "false"  # 480x480 overrides this to show five rows
  light_color_preset_border: "5"
  light_slider_range: "230"
  light_kelvin_scale_width: "288"
  light_kelvin_scale_height: "56"

# Local components load variable-length climate/light lists from the JSON
# attributes of the Home Assistant configuration entity.
external_components:
  - source:
      type: local
      path: components
    components: [ha_climate_controller, ha_light_controller]

ha_climate_controller:
  id: ha_climates
  config_entity_id: ${ha_config_entity_id}
  config_attribute: climates

ha_light_controller:
  id: ha_lights
  config_entity_id: ${ha_config_entity_id}
  config_attribute: lights

esphome:
  name: ${device_name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  comment: "ESPHome CrowPanel Thermostat Knob"
  includes:
    - thermostat_helpers.h
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            int b = (int) roundf(id(brightness_num).state);
            id(brightness_pct) = clamp(b > 0 ? b : 50, 5, 100);
        - light.turn_on:
            id: display_backlight
            brightness: !lambda 'return id(brightness_pct) / 100.0f;'
        - lvgl.page.show: screen_loading
        - lambda: |-
            id(ui_context) = -1;
            id(app_booted) = true;
        - script.execute: refresh_temps
        - script.execute: refresh_status
        - script.execute: refresh_connection
        - script.execute: update_clock_labels
        - script.execute: update_status_led

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

# ------------------------------------------------------------------
# Network
# ------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - script.execute: refresh_connection
  on_disconnect:
    - script.execute: refresh_connection
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_ap_password

captive_portal:

logger:
  level: INFO

# API without encryption lets Home Assistant add the device without a key.
api:
  # Required by the dynamic climate/light array controllers. Without this,
  # ESPHome compiles APIServer without subscribe_home_assistant_state().
  homeassistant_states: true
  on_client_connected:
    - lambda: |-
        // Ignore ESPHome Logs/CLI clients; only a real Home Assistant API
        // session may mark HA as reachable.
        if (client_info.find("Home Assistant") == std::string::npos) return;
        id(ha_connected) = true;
        id(ha_connected_since_ms) = millis();
    - script.execute: refresh_connection
    - script.execute: sync_ha_states
  on_client_disconnected:
    - lambda: |-
        if (client_info.find("Home Assistant") == std::string::npos) return;
        id(ha_connected) = false;
        id(ha_connected_since_ms) = 0;
    - script.execute: refresh_connection

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

# Refresh staged connection diagnostics while WiFi, Home Assistant, or the
# configured climate entity is still becoming available.
interval:
  - interval: 2s
    then:
      - if:
          condition:
            lambda: 'return id(app_booted);'
          then:
            - script.execute: refresh_connection
  # Home Assistant light subscriptions are asynchronous. Redraw only while a
  # light page is visible and only after data actually changed.
  - interval: 100ms
    then:
      - if:
          condition:
            lambda: 'return id(ha_climates).consume_dirty(id(climate_index));'
          then:
            - script.execute: load_active_climate
      - if:
          condition:
            lambda: 'return id(ui_context) == 5 && id(ha_lights).consume_dirty();'
          then:
            - script.execute: refresh_light

# ------------------------------------------------------------------
# Global state
# ------------------------------------------------------------------
globals:

  - id: target_temperature
    type: float
    restore_value: false
    initial_value: "21.0"

  - id: pending_temperature_change
    type: bool
    restore_value: false
    initial_value: "false"

  - id: ha_connected
    type: bool
    restore_value: false
    initial_value: "false"

  - id: ha_connected_since_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: connection_ready
    type: bool
    restore_value: false
    initial_value: "false"

  - id: connection_state_changed
    type: bool
    restore_value: false
    initial_value: "false"

  - id: connection_message
    type: std::string
    restore_value: false

  # Becomes true only at the end of the on_boot(-100) sequence. This prevents
  # select components from restoring values and triggering refresh_status ->
  # update_status_led before WS2812/RMT hardware is initialized.
  - id: app_booted
    type: bool
    restore_value: false
    initial_value: "false"

  # Raw coordinate tracking for swipe detection. LVGL on_swipe_* events were
  # unreliable on the full-screen button, so the board files feed raw touch
  # start/end coordinates into handle_swipe_release.
  # UI navigation: 0 Home, 1 Thermostat, 2 groups, 3 group items, 4 editor,
  # 5 one of the configured light pages, 6 entity overview.
  - id: ui_context
    type: int
    restore_value: false
    initial_value: "0"

  - id: menu_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: group_item_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: submenu_type
    type: int
    restore_value: false
    initial_value: "0"

  - id: entity_menu_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: entity_return_kind
    type: int
    restore_value: false
    initial_value: "1"

  - id: entity_return_index
    type: int
    restore_value: false
    initial_value: "0"

  # Quick thermostat selector: 0 normal settings, 1 HVAC, 2 presets.
  - id: thermostat_quick_stage
    type: int
    restore_value: false
    initial_value: "0"

  - id: submenu_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: submenu_count
    type: int
    restore_value: false
    initial_value: "1"

  - id: num_preview
    type: int
    restore_value: false
    initial_value: "0"

  - id: encoder_delta
    type: int
    restore_value: false
    initial_value: "0"

  - id: light_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: climate_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: pending_climate_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: pending_light_change
    type: bool
    restore_value: false
    initial_value: "false"

  - id: brightness_pct
    type: int
    restore_value: false
    initial_value: "50"

  - id: display_dimmed
    type: bool
    restore_value: false
    initial_value: "false"

  - id: apply_service
    type: int
    restore_value: false
    initial_value: "0"

  # Raw data from Home Assistant attributes
  - id: hvac_modes_raw
    type: std::string
    restore_value: false
  - id: preset_modes_raw
    type: std::string
    restore_value: false
  - id: current_hvac_raw
    type: std::string
    restore_value: false
  - id: last_hvac_mode
    type: std::string
    restore_value: false
  - id: current_action_raw
    type: std::string
    restore_value: false
  - id: current_preset_raw
    type: std::string
    restore_value: false

  # Service-Call-Parameter
  - id: pending_entity_id_holder
    type: std::string
    restore_value: false
  - id: pending_mode_holder
    type: std::string
    restore_value: false

  # Clock and date
  - id: pending_clock_time
    type: std::string
    restore_value: false
  - id: pending_clock_day
    type: std::string
    restore_value: false
  - id: pending_home_date
    type: std::string
    restore_value: false

  # Dual setpoint (heat_cool): 0 = TRV/heat (target_temp_low),
  # 1 = AC/cool (target_temp_high). Double click switches target.
  - id: adjust_target
    type: int
    restore_value: false
    initial_value: "0"
  - id: target_low_v
    type: float
    restore_value: false
    initial_value: "NAN"
  - id: target_high_v
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: pending_current_temperature
    type: float
    restore_value: false
    initial_value: "20.0"
  - id: pending_humidity
    type: float
    restore_value: false
    initial_value: "NAN"

  # Settings render text
  - id: set_title
    type: std::string
    restore_value: false
  - id: set_prev
    type: std::string
    restore_value: false
  - id: set_prev2
    type: std::string
    restore_value: false
  - id: set_cur
    type: std::string
    restore_value: false
  - id: set_next
    type: std::string
    restore_value: false
  - id: set_next2
    type: std::string
    restore_value: false
  - id: set_value
    type: std::string
    restore_value: false

light:
  - platform: monochromatic
    name: "${friendly_name} Backlight"
    output: bl_pwm
    id: display_backlight
    default_transition_length: 0s
    # Do not restore the light's own brightness. brightness_num is the single
    # persisted source and is applied explicitly in on_boot(-100).
    restore_mode: ALWAYS_ON
    # Mirror brightness changes from Home Assistant or knob settings into
    # brightness_pct and the number entity. Do not synchronize while dimmed.
    on_state:
      - lambda: |-
          if (!id(display_dimmed)) {
            int b = (int) roundf(id(display_backlight).current_values.get_brightness() * 100.0f);
            if (id(display_backlight).current_values.is_on() && b > 0) {
              id(brightness_pct) = clamp(b, 5, 100);
              if ((int) roundf(id(brightness_num).state) != id(brightness_pct)) {
                auto call = id(brightness_num).make_call();
                call.set_value(id(brightness_pct));
                call.perform();
              }
            }
          }

# ------------------------------------------------------------------
# Persisted settings; all are also controllable from Home Assistant.
# ------------------------------------------------------------------
switch:
  - platform: template
    name: "24h Clock"
    id: time_24h
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: update_clock_labels
    on_turn_off:
      - script.execute: update_clock_labels

  - platform: template
    name: "Show Icons"
    id: icons_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: refresh_status
      - script.execute: refresh_temps
    on_turn_off:
      - script.execute: refresh_status
      - script.execute: refresh_temps

  # Disable the 240x240 status LED regardless of brightness or HVAC color.
  - platform: template
    name: "LED Enabled"
    id: led_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: update_status_led
    on_turn_off:
      - script.execute: update_status_led

select:
  - platform: template
    name: "Language"
    id: language_select
    optimistic: true
    restore_value: true
    options: ["English", "Deutsch"]
    initial_option: "English"
    on_value:
      then:
        - script.execute: refresh_status
        - script.execute: refresh_connection
        - script.execute: update_clock_labels
        - script.execute: update_settings_labels

  - platform: template
    name: "Design"
    id: design_select
    optimistic: true
    restore_value: true
    options: ["Mono", "Color"]
    initial_option: "Mono"
    on_value:
      then:
        - script.execute: refresh_status
        - script.execute: refresh_temps

  - platform: template
    name: "Temperature Unit"
    id: unit_select
    optimistic: true
    restore_value: true
    options: ["Celsius", "Fahrenheit"]
    initial_option: "Celsius"
    on_value:
      then:
        - script.execute: refresh_temps

  - platform: template
    name: "Knob HVAC Modes"
    id: knob_hvac_modes
    optimistic: true
    restore_value: true
    options: ["Heat/Off", "All"]
    initial_option: "Heat/Off"

  # Rotary encoder sensitivity in Celsius per detent.
  - platform: template
    name: "Knob Step (°C)"
    id: knob_step_select
    optimistic: true
    restore_value: true
    options: ["0.1", "0.2", "0.5", "1.0"]
    initial_option: "0.5"
    icon: "mdi:rotate-right"

number:
  - platform: template
    name: "Idle To Home (s)"
    id: idle_home_num
    optimistic: true
    restore_value: true
    initial_value: 15
    min_value: 5
    max_value: 300
    step: 5
    unit_of_measurement: "s"
    mode: box

  - platform: template
    name: "Dim After (s)"
    id: dim_delay_num
    optimistic: true
    restore_value: true
    initial_value: 30
    min_value: 5
    max_value: 300
    step: 5
    unit_of_measurement: "s"
    mode: box

  - platform: template
    name: "Dim Level (%)"
    id: dim_level_num
    optimistic: true
    restore_value: true
    initial_value: 20
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider

  # Display brightness as a Home Assistant entity, synchronized with the
  # settings screen and the backlight.
  - platform: template
    name: "Brightness (%)"
    id: brightness_num
    optimistic: true
    restore_value: true
    initial_value: 50
    min_value: 5
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    icon: "mdi:brightness-6"
    on_value:
      then:
        - lambda: 'id(brightness_pct) = clamp((int) x, 5, 100);'
        - if:
            condition:
              lambda: 'return !id(display_dimmed);'
            then:
              - light.turn_on:
                  id: display_backlight
                  brightness: !lambda 'return id(brightness_pct) / 100.0f;'
        # Update the settings screen live when it is open.
        - if:
            condition:
              lambda: 'return id(ui_context) == 2 || id(ui_context) == 3 || id(ui_context) == 4;'
            then:
              - script.execute: update_settings_labels

  # Status LED brightness for the 240x240 board. This is separate from display
  # brightness and can be changed from Home Assistant.
  - platform: template
    name: "LED Brightness (%)"
    id: led_brightness_num
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 5
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    icon: "mdi:led-strip"
    on_value:
      then:
        - script.execute: update_status_led
        - if:
            condition:
              lambda: 'return id(ui_context) == 2 || id(ui_context) == 3 || id(ui_context) == 4;'
            then:
              - script.execute: update_settings_labels

button:
  - platform: factory_reset
    name: "${friendly_name} Factory Reset"
    id: factory_reset_btn

  - platform: restart
    name: "${friendly_name} Restart"
    id: restart_btn
    entity_category: diagnostic

# ------------------------------------------------------------------
# Encoder button. on_multi_click keeps single and double clicks separated.
# ------------------------------------------------------------------
binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

  - platform: gpio
    id: encoder_button
    pin:
      pcf8574: pcf
      number: 5
      mode:
        input: true
      inverted: true
    filters:
      - delayed_on_off: 10ms
    on_press:
      - if:
          condition:
            lambda: 'return id(connection_message) == "Smart Knob config not found";'
          then:
            - button.press: restart_btn
      - script.execute: wake_display
      - script.execute: global_hold_back
    on_release:
      # Releasing before 800 ms keeps the press as a normal click.
      - script.stop: global_hold_back
    on_multi_click:
      # Double click keeps the quick jump to the thermostat. A press while the
      # thermostat is already open also selects the other TRV/AC target.
      - timing:
          - ON for at most 350ms
          - OFF for 40ms to 350ms
          - ON for at most 350ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: 'return id(ui_context) == 5;'
              then:
                - script.execute: toggle_active_light
              else:
                - if:
                    condition:
                      lambda: 'return id(ui_context) != 1;'
                    then:
                      - lambda: |-
                          id(climate_index) = 0;
                          id(ui_context) = 1;
                      - script.execute: load_active_climate
                      - lvgl.page.show: screen_thermostat
                    else:
                      - script.execute: toggle_adjust_target
      # Single click: enter/select inside settings. On the thermostat it now
      # switches directly between the TRV and AC/cool target.
      - timing:
          - ON for at most 350ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                lambda: 'return id(ui_context) == 0;'
              then:
                - lambda: |-
                    id(climate_index) = 0;
                    id(ui_context) = 1;
                - script.execute: load_active_climate
                - lvgl.page.show: screen_thermostat
              else:
                - if:
                    condition:
                      lambda: 'return id(ui_context) == 1;'
                    then:
                      - script.execute: toggle_adjust_target
                    else:
                      - if:
                          condition:
                            lambda: 'return id(ui_context) == 5;'
                          then:
                            - script.execute: toggle_active_light
                          else:
                            - if:
                                condition:
                                  lambda: 'return id(ui_context) == 6;'
                                then:
                                  - script.execute: entity_menu_enter
                                else:
                                  - if:
                                      condition:
                                        lambda: 'return id(ui_context) == 2;'
                                      then:
                                        - if:
                                            condition:
                                              lambda: 'return id(menu_index) == SETTINGS_GROUP_COUNT;'
                                            then:
                                              - script.execute: close_settings
                                            else:
                                              - script.execute: group_enter
                                      else:
                                        - if:
                                            condition:
                                              lambda: 'return id(ui_context) == 3;'
                                            then:
                                              - if:
                                                  condition:
                                                    lambda: |-
                                                      return id(group_item_index) == settings_group_count(id(menu_index));
                                                  then:
                                                    - lambda: 'id(ui_context) = 2;'
                                                    - script.execute: update_settings_labels
                                                  else:
                                                    - script.execute: menu_enter
                                            else:
                                              - script.execute: submenu_apply
# ------------------------------------------------------------------
# Rotary encoder. Pins are swapped to fix rotation direction.
# ------------------------------------------------------------------
sensor:
  - platform: rotary_encoder
    id: temperature_encoder
    pin_a:
      number: GPIO4
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO42
      mode:
        input: true
        pullup: true
    min_value: -100000
    max_value: 100000
    restore_mode: ALWAYS_ZERO
    on_value:
      then:
        - script.execute: wake_display
        - lambda: |-
            // Erstes Event nur als Referenz nehmen: der Encoder kann nach
            // einem Neustart einen alten Zaehlerstand liefern -> sonst
            // entsteht ein Riesen-Delta (Symptom: Sprung auf Max-Temp).
            static bool first_event = true;
            static int32_t last_raw = 0;
            int32_t raw = (int32_t) x;
            if (first_event) {
              first_event = false;
              id(encoder_delta) = 0;
            } else {
              id(encoder_delta) = raw - last_raw;
            }
            last_raw = raw;
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 0;'
            then:
              - lambda: |-
                  id(ui_context) = 1;
                  id(climate_index) = 0;
                  id(encoder_delta) = 0;
              - script.execute: load_active_climate
              - lvgl.page.show: screen_thermostat
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 1;'
            then:
              - lambda: |-
                  float step = strtof(id(knob_step_select).current_option().c_str(), nullptr);
                  if (step <= 0.0f) step = ${temperature_step};
                  float new_temp = id(target_temperature) + (step * id(encoder_delta));
                  if (new_temp < ${temperature_min}) new_temp = ${temperature_min};
                  if (new_temp > ${temperature_max}) new_temp = ${temperature_max};
                  // Dual setpoints must not cross; otherwise TRV and AC fight
                  // each other and better_thermostat may reject the range.
                  if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v))) {
                    if (id(adjust_target) == 0 && new_temp > id(target_high_v) - ${setpoint_min_gap})
                      new_temp = id(target_high_v) - ${setpoint_min_gap};
                    if (id(adjust_target) == 1 && new_temp < id(target_low_v) + ${setpoint_min_gap})
                      new_temp = id(target_low_v) + ${setpoint_min_gap};
                  }
                  id(target_temperature) = new_temp;
                  // Update the selected dual-setpoint cache immediately so
                  // its on-screen arc and knob follow every encoder detent.
                  if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v))) {
                    if (id(adjust_target) == 1) id(target_high_v) = new_temp;
                    else id(target_low_v) = new_temp;
                  }
                  auto &climate = id(ha_climates).get_mutable(id(climate_index));
                  climate.adjust_target = id(adjust_target);
                  climate.target_temperature = new_temp;
                  climate.target_low = id(target_low_v);
                  climate.target_high = id(target_high_v);
                  id(pending_climate_index) = id(climate_index);
                  id(pending_temperature_change) = true;
              - script.execute: refresh_temps
              - script.execute: send_temperature_update
        - if:
            condition:
              lambda: |-
                return id(encoder_delta) != 0 && id(ui_context) == 5 &&
                       id(ha_lights).get(id(light_index)).state == "on";
            then:
              - lambda: |-
                  if (id(ha_lights).ensure_mode(id(light_index)) ==
                      esphome::ha_light_controller::LIGHT_COLOR) {
                    auto &light = id(ha_lights).get_mutable(id(light_index));
                    int current = nearest_color_preset(light.hue);
                    int dir = id(encoder_delta) > 0 ? 1 : -1;
                    int next = ((current + dir) % LIGHT_COLOR_PRESET_COUNT +
                                LIGHT_COLOR_PRESET_COUNT) % LIGHT_COLOR_PRESET_COUNT;
                    light.hue = LIGHT_COLOR_PRESETS[next].hue;
                    light.saturation = LIGHT_COLOR_PRESETS[next].saturation;
                  } else {
                    id(ha_lights).adjust(id(light_index), id(encoder_delta));
                  }
                  id(pending_light_change) = true;
              - script.execute: refresh_light
              - script.execute: send_light_update
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 2;'
            then:
              - lambda: |-
                  id(menu_index) = menu_scroll_index(id(menu_index), id(encoder_delta), SETTINGS_ROOT_COUNT);
              - script.execute: update_settings_labels
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 6;'
            then:
              - lambda: |-
                  int count = (int) id(ha_climates).size() + (int) id(ha_lights).size() + 2;
                  id(entity_menu_index) = menu_scroll_index(id(entity_menu_index), id(encoder_delta), count);
              - script.execute: update_settings_labels
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 3;'
            then:
              - lambda: |-
                  int count = settings_group_entry_count(id(menu_index));
                  id(group_item_index) = menu_scroll_index(id(group_item_index), id(encoder_delta), count);
              - script.execute: update_settings_labels
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 4;'
            then:
              - lambda: |-
                  int d = id(encoder_delta) > 0 ? 1 : -1;
                  switch (id(submenu_type)) {
                    case 0:
                    case 1:
                    case 13:
                      id(submenu_index) = menu_scroll_index(id(submenu_index), id(encoder_delta), id(submenu_count));
                      break;
                    case 2:
                      id(brightness_pct) = clamp(id(brightness_pct) + d * 5, 5, 100);
                      break;
                    case 3: case 4: case 5: case 6: case 7:
                    case 12: case 16: case 17:
                      id(submenu_index) = 1 - id(submenu_index);
                      break;
                    case 8:
                    case 9:
                      id(num_preview) = clamp(id(num_preview) + d * 5, 5, 300);
                      break;
                    case 10:
                    case 18:
                      id(num_preview) = clamp(id(num_preview) + d * 5, 0, 100);
                      break;
                    default:
                      break;
                  }
              - if:
                  condition:
                    lambda: 'return id(submenu_type) == 2;'
                  then:
                    - light.turn_on:
                        id: display_backlight
                        brightness: !lambda 'return id(brightness_pct) / 100.0f;'
              - if:
                  condition:
                    lambda: 'return id(submenu_type) == 18;'
                  then:
                    - script.execute: preview_led_brightness
              - script.execute: update_settings_labels

  - platform: wifi_signal
    id: wifi_rssi
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

# ------------------------------------------------------------------
# HVAC state, mode/preset lists, and active preset.
# ------------------------------------------------------------------
text_sensor:
  - platform: version
    id: fw_version
    name: "${friendly_name} Firmware"

  - platform: wifi_info
    ip_address:
      id: wifi_ip_txt
      name: "${friendly_name} IP"
    ssid:
      id: wifi_ssid_txt
      name: "${friendly_name} SSID"

# The Home Assistant config entity can be changed without recompiling. The
# template text component persists the selected entity ID in ESP flash and
# publishes it as a normal configurable Home Assistant entity.
text:
  - platform: template
    name: "Home Assistant Config Entity"
    id: ha_config_entity
    icon: "mdi:database-cog-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: ${ha_config_entity_id}
    min_length: 3
    max_length: 100
    pattern: "[a-z0-9_]+\\.[a-z0-9_]+"
    mode: text
    on_value:
      then:
        - lambda: |-
            id(ha_climates).set_config_entity_id(x);
            id(ha_lights).set_config_entity_id(x);
            id(climate_index) = 0;
            id(light_index) = 0;
        - script.execute: refresh_connection

# ------------------------------------------------------------------
# Scripts
# ------------------------------------------------------------------
script:
  # After API connect, force-copy Home Assistant states into globals. This
  # covers cases where individual on_value automations do not fire during init.
  - id: sync_ha_states
    mode: restart
    then:
      - delay: 2s
      - script.execute: load_active_climate
      - script.execute: refresh_connection

  # Copy the selected array entry into the existing UI cache. User changes
  # are kept in the component until Home Assistant confirms the new state.
  - id: load_active_climate
    mode: restart
    then:
      - lambda: |-
          if (id(ha_climates).empty()) {
            id(current_hvac_raw) = "unknown";
            id(last_hvac_mode).clear();
            id(current_action_raw).clear();
            id(hvac_modes_raw).clear();
            id(preset_modes_raw).clear();
            id(current_preset_raw).clear();
            id(pending_current_temperature) = NAN;
            id(pending_humidity) = NAN;
            id(target_low_v) = NAN;
            id(target_high_v) = NAN;
            id(pending_temperature_change) = false;
            return;
          }
          id(climate_index) = clamp(id(climate_index), 0, (int) id(ha_climates).size() - 1);
          auto &climate = id(ha_climates).get_mutable(id(climate_index));
          id(current_hvac_raw) = climate.state;
          id(last_hvac_mode) = climate.last_hvac_mode;
          id(current_action_raw) = climate.hvac_action;
          id(hvac_modes_raw) = climate.hvac_modes;
          id(preset_modes_raw) = climate.preset_modes;
          id(current_preset_raw) = climate.preset_mode;
          if (!std::isnan(climate.current_temperature))
            id(pending_current_temperature) = climate.current_temperature;
          id(pending_humidity) = climate.humidity;
          if (!id(pending_temperature_change) || id(pending_climate_index) != id(climate_index)) {
            id(adjust_target) = climate.adjust_target;
            id(target_low_v) = climate.target_low;
            id(target_high_v) = climate.target_high;
            if (!std::isnan(climate.target_low) && id(adjust_target) == 0)
              id(target_temperature) = climate.target_low;
            else if (!std::isnan(climate.target_high) && id(adjust_target) == 1)
              id(target_temperature) = climate.target_high;
            else if (!std::isnan(climate.target_temperature))
              id(target_temperature) = climate.target_temperature;
          }
      - lvgl.label.update:
          id: label_climate_name
          text: !lambda |-
            const std::string name = id(ha_climates).empty() ? std::string() :
                                     id(ha_climates).get(id(climate_index)).name;
            return ha_text_or_placeholder(id(connection_ready), name, 10);
      - lvgl.label.update:
          id: label_climate_page
          text: !lambda |-
            if (!id(connection_ready))
              return ha_text_or_placeholder(false, std::string(), 5);
            if (id(ha_climates).empty()) return std::string("0 / 0");
            char page[20];
            snprintf(page, sizeof(page), "%d / %d", id(climate_index) + 1,
                     (int) id(ha_climates).size());
            return std::string(page);
      - lambda: |-
          lv_label_set_long_mode(id(label_climate_name), LV_LABEL_LONG_MODE_SCROLL_CIRCULAR);
          lv_obj_update_layout(id(label_climate_name));
      - script.execute: refresh_temps
      - script.execute: refresh_status
      - script.execute: refresh_connection

  - id: send_temperature_update
    mode: restart
    then:
      - delay: ${debounce_ms}
      - script.execute: apply_temperature_update

  - id: apply_temperature_update
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(pending_temperature_change);'
          then:
            - if:
                condition:
                  lambda: |-
                    const auto &climate = id(ha_climates).get(id(pending_climate_index));
                    return !std::isnan(climate.target_low) && !std::isnan(climate.target_high);
                then:
                  # Dual setpoint: update only the active target and clamp it
                  # against the other target so the range never crosses.
                  - lambda: |-
                      auto &climate = id(ha_climates).get_mutable(id(pending_climate_index));
                      if (climate.adjust_target == 1) {
                        if (climate.target_high < climate.target_low + ${setpoint_min_gap})
                          climate.target_high = climate.target_low + ${setpoint_min_gap};
                      } else {
                        if (climate.target_low > climate.target_high - ${setpoint_min_gap})
                          climate.target_low = climate.target_high - ${setpoint_min_gap};
                      }
                  - homeassistant.service:
                      service: climate.set_temperature
                      data:
                        entity_id: !lambda 'return id(ha_climates).get(id(pending_climate_index)).entity_id;'
                        target_temp_low: !lambda |-
                          char buf[16];
                          snprintf(buf, sizeof(buf), "%.1f", id(ha_climates).get(id(pending_climate_index)).target_low);
                          return std::string(buf);
                        target_temp_high: !lambda |-
                          char buf[16];
                          snprintf(buf, sizeof(buf), "%.1f", id(ha_climates).get(id(pending_climate_index)).target_high);
                          return std::string(buf);
                else:
                  - homeassistant.service:
                      service: climate.set_temperature
                      data:
                        entity_id: !lambda 'return id(ha_climates).get(id(pending_climate_index)).entity_id;'
                        temperature: !lambda |-
                          char buf[16];
                          snprintf(buf, sizeof(buf), "%.1f", id(ha_climates).get(id(pending_climate_index)).target_temperature);
                          return std::string(buf);
            - lambda: 'id(pending_temperature_change) = false;'

  - id: wake_display
    then:
      # Reset LVGL idle timers. Encoder/button input is not an LVGL input
      # device, so dim and idle timers would otherwise ignore knob activity.
      - lambda: 'lv_disp_trig_activity(nullptr);'
      - if:
          condition:
            lambda: 'return id(display_dimmed);'
          then:
            - lambda: 'id(display_dimmed) = false;'
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(brightness_pct) / 100.0f;'
            - script.execute: update_status_led

  # A short press on a light now toggles it directly. Mode changes are handled
  # exclusively by vertical swipe gestures.
  - id: toggle_active_light
    then:
      - if:
          condition:
            lambda: |-
              return id(ui_context) == 5 && id(light_index) >= 0 &&
                     id(light_index) < (int) id(ha_lights).size();
          then:
            - homeassistant.action:
                action: light.toggle
                data:
                  entity_id: !lambda 'return id(ha_lights).get(id(light_index)).entity_id;'

  # Holding the knob for 800 ms is the same Back action in every screen.
  - id: global_hold_back
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            lambda: 'return id(encoder_button).state;'
          then:
            - if:
                condition:
                  lambda: 'return id(thermostat_quick_stage) != 0;'
                then:
                  - lambda: |-
                      id(thermostat_quick_stage) = 0;
                      id(ui_context) = 1;
                  - script.execute: load_active_climate
                  - lvgl.page.show: screen_thermostat
                else:
                  - if:
                      condition:
                        lambda: 'return id(ui_context) == 4;'
                      then:
                        - lambda: 'id(ui_context) = 3;'
                        - script.execute: update_settings_labels
                      else:
                        - if:
                            condition:
                              lambda: 'return id(ui_context) == 3;'
                            then:
                              - lambda: 'id(ui_context) = 2;'
                              - script.execute: update_settings_labels
                            else:
                              - if:
                                  condition:
                                    lambda: 'return id(ui_context) == 2;'
                                  then:
                                    - script.execute: close_settings
                                  else:
                                    - if:
                                        condition:
                                          lambda: 'return id(ui_context) == 6;'
                                        then:
                                          - script.execute: close_entity_overview
                                        else:
                                          - if:
                                              condition:
                                                lambda: 'return id(ui_context) == 5;'
                                              then:
                                                - lambda: 'id(ui_context) = 1;'
                                                - script.execute: load_active_climate
                                                - lvgl.page.show: screen_thermostat
                                              else:
                                                - if:
                                                    condition:
                                                      lambda: 'return id(ui_context) == 1;'
                                                    then:
                                                      - lambda: 'id(ui_context) = 0;'
                                                      - lvgl.page.show: screen_home

  # Target for the native LVGL swipe handlers on the settings page.
  - id: show_active_light_screen
    then:
      - if:
          condition:
            lambda: |-
              return id(ha_lights).ensure_mode(id(light_index)) ==
                     esphome::ha_light_controller::LIGHT_TEMPERATURE;
          then:
            - lvgl.page.show:
                id: screen_light_temperature
                animation: NONE
          else:
            - if:
                condition:
                  lambda: |-
                    return id(ha_lights).ensure_mode(id(light_index)) ==
                           esphome::ha_light_controller::LIGHT_COLOR;
                then:
                  - lvgl.page.show:
                      id: screen_light_color
                      animation: NONE
                else:
                  - lvgl.page.show:
                      id: screen_light_brightness
                      animation: NONE

  - id: close_settings
    then:
      - script.execute: wake_display
      - lambda: 'id(thermostat_quick_stage) = 0;'
      - if:
          condition:
            lambda: 'return !id(ha_lights).empty();'
          then:
            - lambda: |-
                id(light_index) = (int) id(ha_lights).size() - 1;
                id(ui_context) = 5;
            - script.execute: refresh_light
            - script.execute: show_active_light_screen
          else:
            - lambda: |-
                id(climate_index) = (int) id(ha_climates).size() - 1;
                id(ui_context) = 1;
            - script.execute: load_active_climate
            - lvgl.page.show:
                id: screen_thermostat

  # Move forward through configured thermostats. After the final thermostat,
  # continue with the first light or settings.
  - id: thermostat_next
    then:
      - script.execute: wake_display
      - if:
          condition:
            lambda: 'return id(pending_temperature_change);'
          then:
            - script.stop: send_temperature_update
            - script.execute: apply_temperature_update
      - if:
          condition:
            lambda: 'return id(climate_index) + 1 < (int) id(ha_climates).size();'
          then:
            - lambda: 'id(climate_index)++;'
            - script.execute: load_active_climate
          else:
            - script.execute: open_first_light_or_settings

  # Home is intentionally excluded from swipe navigation, so the first
  # thermostat has no previous page.
  - id: thermostat_previous
    then:
      - script.execute: wake_display
      - if:
          condition:
            lambda: 'return id(pending_temperature_change);'
          then:
            - script.stop: send_temperature_update
            - script.execute: apply_temperature_update
      - if:
          condition:
            lambda: 'return id(climate_index) > 0;'
          then:
            - lambda: 'id(climate_index)--;'
            - script.execute: load_active_climate

  # Final thermostat -> first configured light, or directly to settings when
  # the light list is empty.
  - id: open_first_light_or_settings
    then:
      - script.execute: wake_display
      - if:
          condition:
            lambda: 'return !id(ha_lights).empty();'
          then:
            - lambda: |-
                id(light_index) = 0;
                id(ui_context) = 5;
            - script.execute: refresh_light
            - script.execute: show_active_light_screen
          else:
            - script.execute: open_settings

  # Move forward through logical light pages; the final light leads to the
  # grouped settings page.
  - id: light_next
    then:
      - script.execute: wake_display
      - if:
          condition:
            lambda: 'return id(light_index) + 1 < (int) id(ha_lights).size();'
          then:
            - lambda: 'id(light_index)++;'
            - script.execute: refresh_light
            - script.execute: show_active_light_screen
          else:
            - script.execute: open_settings

  # Move backward through light pages; the first light leads to thermostat.
  - id: light_previous
    then:
      - script.execute: wake_display
      - if:
          condition:
            lambda: 'return id(light_index) > 0;'
          then:
            - lambda: 'id(light_index)--;'
            - script.execute: refresh_light
            - script.execute: show_active_light_screen
          else:
            - lambda: |-
                id(climate_index) = (int) id(ha_climates).size() - 1;
                id(ui_context) = 1;
            - script.execute: load_active_climate
            - lvgl.page.show:
                id: screen_thermostat

  - id: cycle_light_mode
    then:
      - script.stop: send_light_update
      - lambda: 'id(pending_light_change) = false;'
      - lambda: 'id(ha_lights).cycle_mode(id(light_index));'
      - script.execute: refresh_light
      - script.execute: show_active_light_screen

  # Shared overview on screen_navigation. It lists every configured climate and
  # light, followed by Settings and Back. Pressing an entity opens it directly.
  - id: open_entity_overview
    then:
      - script.execute: wake_display
      - lambda: |-
          if (id(ui_context) == 1) {
            id(entity_return_kind) = 1;
            id(entity_return_index) = id(climate_index);
            id(entity_menu_index) = id(climate_index);
          } else if (id(ui_context) == 5) {
            id(entity_return_kind) = 2;
            id(entity_return_index) = id(light_index);
            id(entity_menu_index) = (int) id(ha_climates).size() + id(light_index);
          }
          id(thermostat_quick_stage) = 0;
          id(ui_context) = 6;
      - script.execute: update_settings_labels
      - lvgl.page.show:
          id: screen_navigation
          animation: NONE

  - id: close_entity_overview
    then:
      - if:
          condition:
            lambda: 'return id(entity_return_kind) == 2 && !id(ha_lights).empty();'
          then:
            - lambda: |-
                id(light_index) = clamp(id(entity_return_index), 0, (int) id(ha_lights).size() - 1);
                id(ui_context) = 5;
            - script.execute: refresh_light
            - script.execute: show_active_light_screen
          else:
            - lambda: |-
                id(climate_index) = clamp(id(entity_return_index), 0, (int) id(ha_climates).size() - 1);
                id(ui_context) = 1;
            - script.execute: load_active_climate
            - lvgl.page.show:
                id: screen_thermostat
                animation: NONE

  - id: settings_swipe_back
    then:
      - if:
          condition:
            lambda: 'return id(thermostat_quick_stage) != 0;'
          then:
            - lambda: |-
                id(thermostat_quick_stage) = 0;
                id(ui_context) = 1;
            - script.execute: load_active_climate
            - lvgl.page.show:
                id: screen_thermostat
                animation: NONE
          else:
            - if:
                condition:
                  lambda: 'return id(ui_context) == 6;'
                then:
                  - script.execute: close_entity_overview
                else:
                  - script.execute: close_settings

  - id: entity_menu_enter
    then:
      - lambda: |-
          int climates = (int) id(ha_climates).size();
          int lights = (int) id(ha_lights).size();
          int total = climates + lights + 2;
          id(entity_menu_index) = ((id(entity_menu_index) % total) + total) % total;
      - if:
          condition:
            lambda: 'return id(entity_menu_index) < (int) id(ha_climates).size();'
          then:
            - lambda: |-
                id(climate_index) = id(entity_menu_index);
                id(ui_context) = 1;
            - script.execute: load_active_climate
            - lvgl.page.show: screen_thermostat
          else:
            - if:
                condition:
                  lambda: |-
                    int i = id(entity_menu_index) - (int) id(ha_climates).size();
                    return i >= 0 && i < (int) id(ha_lights).size();
                then:
                  - lambda: |-
                      id(light_index) = id(entity_menu_index) - (int) id(ha_climates).size();
                      id(ui_context) = 5;
                  - script.execute: refresh_light
                  - script.execute: show_active_light_screen
                else:
                  - if:
                      condition:
                        lambda: |-
                          return id(entity_menu_index) ==
                                 (int) id(ha_climates).size() + (int) id(ha_lights).size();
                      then:
                        - script.execute: open_settings
                      else:
                        - script.execute: close_entity_overview

  # First vertical thermostat swipe opens HVAC. The following vertical swipe
  # changes the same quick selector to presets without creating another page.
  - id: open_thermostat_quick
    then:
      - script.execute: wake_display
      - lambda: |-
          auto page_obj = [](esphome::lvgl::LvPageType *page) { return page->obj; };
          lv_obj_t *target = page_obj(screen_navigation);
          lv_obj_t *widgets[] = {
              id(label_settings_title), id(label_menu_icon_prev2), id(label_menu_icon_prev),
              id(label_menu_icon), id(label_menu_icon_next), id(label_menu_icon_next2),
              id(label_menu_prev2), id(label_menu_prev), id(label_menu_current),
              id(label_menu_next), id(label_menu_next2), id(label_menu_value)};
          for (lv_obj_t *widget : widgets)
            if (lv_obj_get_parent(widget) != target) lv_obj_set_parent(widget, target);
          id(thermostat_quick_stage) = 1;
          id(submenu_type) = 0;
          id(submenu_index) = 0;
          auto vec = ha_filter_modes(id(hvac_modes_raw), false);
          id(submenu_count) = (int) vec.size();
          for (size_t i = 0; i < vec.size(); i++)
            if (vec[i] == id(current_hvac_raw)) { id(submenu_index) = (int) i; break; }
          id(ui_context) = 4;
      - script.execute: update_settings_labels
      - lvgl.page.show:
          id: screen_navigation
          animation: NONE

  - id: cycle_thermostat_quick
    then:
      - if:
          condition:
            lambda: 'return id(thermostat_quick_stage) != 0;'
          then:
            - if:
                condition:
                  lambda: 'return id(thermostat_quick_stage) == 2;'
                then:
                  - lambda: |-
                      id(thermostat_quick_stage) = 0;
                      id(ui_context) = 1;
                  - script.execute: load_active_climate
                  - lvgl.page.show:
                      id: screen_thermostat
                      animation: NONE
                else:
                  - lambda: |-
                      id(thermostat_quick_stage) = 2;
                      id(submenu_type) = 1;
                      id(submenu_index) = 0;
                      auto vec = ha_filter_presets(id(preset_modes_raw));
                      id(submenu_count) = (int) vec.size();
                      for (size_t i = 0; i < vec.size(); i++)
                        if (vec[i] == id(current_preset_raw)) { id(submenu_index) = (int) i; break; }
                  - script.execute: update_settings_labels

  - id: send_light_update
    mode: restart
    then:
      # All light value modes use the same debounce. Because this script uses
      # mode: restart, every encoder detent restarts the delay.
      - delay: 500ms
      - if:
          condition:
            lambda: |-
              return id(pending_light_change) && id(ui_context) == 5 &&
                     id(ha_lights).get(id(light_index)).state == "on";
          then:
            - if:
                condition:
                  lambda: |-
                    return id(ha_lights).ensure_mode(id(light_index)) ==
                           esphome::ha_light_controller::LIGHT_BRIGHTNESS;
                then:
                  - homeassistant.action:
                      action: light.turn_on
                      data:
                        entity_id: !lambda 'return id(ha_lights).get(id(light_index)).entity_id;'
                        brightness_pct: !lambda |-
                          return to_string((int) roundf(id(ha_lights).get(id(light_index)).brightness));
                else:
                  - if:
                      condition:
                        lambda: |-
                          return id(ha_lights).ensure_mode(id(light_index)) ==
                                 esphome::ha_light_controller::LIGHT_TEMPERATURE;
                      then:
                        - homeassistant.action:
                            action: light.turn_on
                            data:
                              entity_id: !lambda 'return id(ha_lights).get(id(light_index)).entity_id;'
                              color_temp_kelvin: !lambda |-
                                return to_string((int) roundf(id(ha_lights).get(id(light_index)).color_temp_kelvin));
                      else:
                        - homeassistant.action:
                            action: light.turn_on
                            data:
                              entity_id: !lambda 'return id(ha_lights).get(id(light_index)).entity_id;'
                            data_template:
                              hs_color: "{{ [hue, saturation] }}"
                            variables:
                              hue: !lambda 'return id(ha_lights).get(id(light_index)).hue;'
                              # The color knob always represents the full
                              # color, independent of the previous Kelvin mode.
                              saturation: !lambda 'return 100.0f;'
            - lambda: 'id(pending_light_change) = false;'

  - id: refresh_light
    then:
      - lvgl.label.update:
          id: label_light_name
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          id(ha_lights).get(id(light_index)).name, 10);
      - lambda: |-
          // The name can be updated while the shared light page is hidden.
          // Restart LVGL's circular mode after every update so it recalculates
          // the rendered text width. LVGL only starts the animation when that
          // width is larger than the board-specific label width.
          lv_label_set_long_mode(id(label_light_name), LV_LABEL_LONG_MODE_SCROLL_CIRCULAR);
          lv_obj_update_layout(id(label_light_name));
      - lvgl.label.update:
          id: label_light_mode
          text: !lambda |-
            int mode = id(ha_lights).ensure_mode(id(light_index));
            std::string text = "Helligkeit";
            if (mode == esphome::ha_light_controller::LIGHT_TEMPERATURE) text = "Kelvin";
            else if (mode == esphome::ha_light_controller::LIGHT_COLOR) text = "Farbe";
            return ha_text_or_placeholder(id(connection_ready), text, 8);
      - lvgl.label.update:
          id: label_light_value
          text: !lambda |-
            if (!id(connection_ready))
              return ha_text_or_placeholder(false, std::string(), 3);
            const auto &light = id(ha_lights).get(id(light_index));
            if (light.state != "on") return std::string("--");
            int mode = id(ha_lights).ensure_mode(id(light_index));
            char value[20];
            if (mode == esphome::ha_light_controller::LIGHT_TEMPERATURE)
              snprintf(value, sizeof(value), "%.0fK", light.color_temp_kelvin);
            else if (mode == esphome::ha_light_controller::LIGHT_COLOR)
              snprintf(value, sizeof(value), "%.0f°", light.hue);
            else
              snprintf(value, sizeof(value), "%.0f%%", light.brightness);
            return std::string(value);
      - lvgl.label.update:
          id: label_light_icon
          text: !lambda |-
            int mode = id(ha_lights).ensure_mode(id(light_index));
            if (mode == esphome::ha_light_controller::LIGHT_TEMPERATURE)
              return std::string(ICON_THERMO_HIGH);
            if (mode == esphome::ha_light_controller::LIGHT_COLOR)
              return std::string(ICON_EYEDROPPER);
            return std::string(ICON_SUN);
      - lvgl.widget.update:
          id: label_light_icon
          text_color: !lambda |-
            return id(ha_lights).get(id(light_index)).state == "on"
                       ? lv_color_hex(0xE8E8E8)
                       : lv_color_hex(0x555555);
      - lvgl.widget.update:
          id: label_light_icon_color
          text_color: !lambda |-
            return id(ha_lights).get(id(light_index)).state == "on"
                       ? lv_color_hex(0xE8E8E8)
                       : lv_color_hex(0x555555);
      - lvgl.label.update:
          id: label_light_state
          text: !lambda |-
            if (!id(connection_ready))
              return ha_text_or_placeholder(false, std::string(), 4);
            const auto &state = id(ha_lights).get(id(light_index)).state;
            if (state == "on") return std::string("On");
            if (state == "off") return std::string("Off");
            if (state == "unavailable") return std::string("Unavailable");
            return std::string("Loading...");
      - lvgl.label.update:
          id: label_light_page
          text: !lambda |-
            if (!id(connection_ready))
              return ha_text_or_placeholder(false, std::string(), 5);
            char page[20];
            snprintf(page, sizeof(page), "%d / %d", id(light_index) + 1, (int) id(ha_lights).size());
            return std::string(page);
      - lambda: |-
          // Brightness uses a tick scale, Kelvin a warm/cold pill and color a
          // handful of fixed presets (see LIGHT_COLOR_PRESETS).
          int mode = id(ha_lights).ensure_mode(id(light_index));
          auto page_obj = [](esphome::lvgl::LvPageType *page) { return page->obj; };
          lv_obj_t *target_page = mode == esphome::ha_light_controller::LIGHT_TEMPERATURE
              ? page_obj(screen_light_temperature)
              : mode == esphome::ha_light_controller::LIGHT_COLOR
                    ? page_obj(screen_light_color)
                    : page_obj(screen_light_brightness);
          lv_obj_t *shared_widgets[] = {
              id(light_brightness_scale), id(label_light_brightness_ticks),
              id(light_kelvin_scale), id(light_slider_knob), id(label_light_name),
              id(label_light_mode), id(label_light_value), id(label_light_icon),
              id(label_light_state), id(label_light_page), id(light_mode_dot_0),
              id(light_mode_dot_1), id(light_mode_dot_2)};
          for (lv_obj_t *widget : shared_widgets)
            if (lv_obj_get_parent(widget) != target_page) lv_obj_set_parent(widget, target_page);

          const auto &light = id(ha_lights).get(id(light_index));
          bool on = id(connection_ready) && light.state == "on";
          bool brightness = mode == esphome::ha_light_controller::LIGHT_BRIGHTNESS;
          bool temperature = mode == esphome::ha_light_controller::LIGHT_TEMPERATURE;
          bool color = mode == esphome::ha_light_controller::LIGHT_COLOR;

          auto visible = [](lv_obj_t *obj, bool show) {
            if (show) lv_obj_remove_flag(obj, LV_OBJ_FLAG_HIDDEN);
            else lv_obj_add_flag(obj, LV_OBJ_FLAG_HIDDEN);
          };

          visible(id(light_brightness_scale), brightness);
          visible(id(label_light_brightness_ticks), brightness);
          visible(id(light_kelvin_scale), temperature);
          visible(id(light_slider_knob), on && (brightness || temperature));
          visible(id(label_light_value), !color);
          visible(id(label_light_name), !color);
          visible(id(label_light_page), !color);
          // The color page has its own statically positioned labels/swatches
          // (label_light_icon_color / label_light_mode_color / light_color_*),
          // so the shared icon and mode label stay at their widget positions.
          visible(id(label_light_icon), !color);
          visible(id(label_light_mode), !color);

          float normalized = on
              ? clamp(id(ha_lights).normalized_value(id(light_index)) / 100.0f, 0.0f, 1.0f)
              : 0.0f;
          int slider_x = (int) roundf((normalized - 0.5f) * ${light_slider_range});
          // Y comes from the widget's static layout (y: 70 on the 240, y: 145
          // on the 480) and is read back here unchanged; this only moves X.
          lv_obj_align(id(light_slider_knob), LV_ALIGN_CENTER, slider_x,
                       lv_obj_get_y_aligned(id(light_slider_knob)));

          char minimum[20], maximum[20];
          snprintf(minimum, sizeof(minimum), "%.0f K", light.min_color_temp_kelvin);
          snprintf(maximum, sizeof(maximum), "%.0f K", light.max_color_temp_kelvin);

          lv_obj_t *dots[] = {id(light_mode_dot_0), id(light_mode_dot_1), id(light_mode_dot_2)};
          for (int i = 0; i < 3; i++) {
            bool supported = i == 0 ? id(ha_lights).supports_brightness(id(light_index))
                            : i == 1 ? id(ha_lights).supports_temperature(id(light_index))
                                     : id(ha_lights).supports_color(id(light_index));
            lv_obj_set_style_bg_color(dots[i],
                lv_color_hex(i == mode ? 0xFFFFFF : supported ? 0x292B2E : 0x111214),
                LV_PART_MAIN);
          }

          // Big center preview shows the light's actual current color; the
          // preset row below highlights whichever preset is closest to it.
          lv_color_t current_color = on
              ? lv_color_hsv_to_rgb((uint16_t) roundf(light.hue),
                                     (uint8_t) roundf(light.saturation), 100)
              : lv_color_hex(0x333333);
          lv_obj_set_style_bg_color(id(light_color_swatch), current_color, LV_PART_MAIN);

          lv_obj_t *presets[] = {id(light_color_preset_0), id(light_color_preset_1),
                                  id(light_color_preset_2), id(light_color_preset_3),
                                  id(light_color_preset_4)};
          int selected_preset = nearest_color_preset(light.hue);
          for (int i = 0; i < LIGHT_COLOR_PRESET_COUNT; i++) {
            const auto &preset = LIGHT_COLOR_PRESETS[i];
            lv_obj_set_style_bg_color(
                presets[i],
                lv_color_hsv_to_rgb((uint16_t) roundf(preset.hue),
                                     (uint8_t) roundf(preset.saturation), 100),
                LV_PART_MAIN);
            bool selected = on && color && i == selected_preset;
            lv_obj_set_style_border_width(presets[i], selected ? ${light_color_preset_border} : 0,
                                           LV_PART_MAIN);
            lv_obj_set_style_border_color(presets[i], lv_color_hex(0xFFFFFF), LV_PART_MAIN);
          }

          // Shared widgets are reparented last, so restore the intended
          // foreground order for the color page's own static widgets.
          lv_obj_move_foreground(id(label_light_icon_color));
          lv_obj_move_foreground(id(light_color_swatch));
          lv_obj_move_foreground(id(label_light_mode_color));
          lv_obj_move_foreground(id(light_color_preset_0));
          lv_obj_move_foreground(id(light_color_preset_1));
          lv_obj_move_foreground(id(light_color_preset_2));
          lv_obj_move_foreground(id(light_color_preset_3));
          lv_obj_move_foreground(id(light_color_preset_4));
          lv_obj_move_foreground(id(label_light_name));
          lv_obj_move_foreground(id(label_light_page));
          lv_obj_move_foreground(id(light_mode_dot_0));
          lv_obj_move_foreground(id(light_mode_dot_1));
          lv_obj_move_foreground(id(light_mode_dot_2));

  - id: toggle_adjust_target
    then:
      - if:
          condition:
            lambda: 'return !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));'
          then:
            # Real dual-setpoint entity (heat_cool): switch between low (TRV)
            # and high (AC).
            - lambda: |-
                id(adjust_target) = 1 - id(adjust_target);
                id(target_temperature) = id(adjust_target) == 1 ? id(target_high_v) : id(target_low_v);
                auto &climate = id(ha_climates).get_mutable(id(climate_index));
                climate.adjust_target = id(adjust_target);
            - script.execute: refresh_temps
            - script.execute: refresh_status
          else:
            # better_thermostat style: one temperature attribute; TRV = heat
            # mode, AC = cool mode, so toggle the mode.
            - if:
                condition:
                  lambda: |-
                    auto v = ha_parse_list(id(hvac_modes_raw));
                    bool h = false, c = false;
                    for (auto &m : v) { if (m == "heat") h = true; if (m == "cool") c = true; }
                    return h && c;
                then:
                  - homeassistant.service:
                      service: climate.set_hvac_mode
                      data:
                        entity_id: !lambda 'return id(ha_climates).get(id(climate_index)).entity_id;'
                        hvac_mode: !lambda |-
                          return id(current_hvac_raw) == "cool" ? std::string("heat") : std::string("cool");

  # Status LED hook. Boards with an LED strip extend this placeholder; boards
  # without one keep it empty.
  - id: update_status_led
    then: []

  # Live preview for LED brightness while rotating in the settings submenu.
  # The 240x240 board overrides this placeholder with `!extend`.
  - id: preview_led_brightness
    then: []

  # All temperature/humidity labels and ring fill level.
  - id: refresh_temps
    then:
      - lvgl.label.update:
          id: label_climate_name
          text: !lambda |-
            const std::string name = id(ha_climates).empty() ? std::string() :
                                     id(ha_climates).get(id(climate_index)).name;
            return ha_text_or_placeholder(id(connection_ready), name, 10);
      - lvgl.label.update:
          id: label_climate_page
          text: !lambda |-
            if (!id(connection_ready))
              return ha_text_or_placeholder(false, std::string(), 5);
            if (id(ha_climates).empty()) return std::string("0 / 0");
            char page[20];
            snprintf(page, sizeof(page), "%d / %d", id(climate_index) + 1,
                     (int) id(ha_climates).size());
            return std::string(page);
      # Icon glyphs from thermostat_helpers.h; keep PUA characters out of YAML.
      - lvgl.label.update:
          id: icon_thermo_current
          text: !lambda 'return std::string(ICON_THERMO_HIGH);'
      - lvgl.widget.update:
          id: icon_thermo_current
          text_color: !lambda |-
            if (id(design_select).current_option() != "Color") return lv_color_hex(0xFFFFFF);
            return lv_color_hex(0xFF5A2D);
      - lvgl.label.update:
          id: icon_hum_thermo
          text: !lambda 'return std::string(ICON_DROPLET_HALF);'
      - lvgl.widget.update:
          id: icon_hum_thermo
          text_color: !lambda |-
            if (id(design_select).current_option() != "Color") return lv_color_hex(0xFFFFFF);
            return lv_color_hex(0x6EC6FF);
      # TRV/AC indicator, visible only in dual-setpoint mode.
      - if:
          condition:
            lambda: |-
              return !id(connection_ready) ||
                     (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)));
          then:
            - lvgl.label.update:
                id: label_setpoint_mode
                text: !lambda |-
                  const std::string mode = id(adjust_target) == 1 ? "AC" : "TRV";
                  return ha_text_or_placeholder(id(connection_ready), mode, 3);
            - lvgl.widget.show: label_setpoint_mode
          else:
            - lvgl.widget.hide: label_setpoint_mode
      - lvgl.label.update:
          id: label_target_temperature
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            return ha_text_or_placeholder(id(connection_ready),
                                          to_string((int) display_temp(id(target_temperature), f)), 2);
      - lvgl.label.update:
          id: label_target_decimal
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            float t = display_temp(id(target_temperature), f);
            int frac = (int) roundf((t - (int) t) * 10.0f);
            char buf[8];
            snprintf(buf, sizeof(buf), ".%d", abs(frac));
            return ha_text_or_placeholder(id(connection_ready), std::string(buf), 2);
      - lvgl.label.update:
          id: label_target_unit
          text: !lambda |-
            const std::string unit = id(unit_select).current_option() == "Fahrenheit" ? "°F" : "°C";
            return ha_text_or_placeholder(id(connection_ready), unit, 2);
      - lvgl.label.update:
          id: label_current_temperature
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f°", display_temp(id(pending_current_temperature), f));
            return ha_text_or_placeholder(id(connection_ready), std::string(buf), 5);
      - lvgl.label.update:
          id: label_home_current_temperature
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            return ha_text_or_placeholder(id(connection_ready),
                                          to_string((int) display_temp(id(pending_current_temperature), f)), 2);
      - lvgl.label.update:
          id: label_home_current_decimal
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            float c = display_temp(id(pending_current_temperature), f);
            int frac = (int) roundf((c - (int) c) * 10.0f);
            char buf[8];
            snprintf(buf, sizeof(buf), ".%d", abs(frac));
            return ha_text_or_placeholder(id(connection_ready), std::string(buf), 2);
      - lvgl.label.update:
          id: label_home_current_unit
          text: !lambda |-
            const std::string unit = id(unit_select).current_option() == "Fahrenheit" ? "°F" : "°C";
            return ha_text_or_placeholder(id(connection_ready), unit, 2);
      # Two independent setpoint handles share the same neutral track. Heat
      # fills from the left; cool uses REVERSE mode and fills from the right.
      # Animate the underlying arc value so its indicator and knob move as one.
      # Restarting from the currently rendered value also keeps quick encoder
      # turns fluid instead of snapping between consecutive temperature steps.
      - lambda: |-
          lv_anim_exec_xcb_t set_arc_value = [](void *var, int32_t value) {
            lv_arc_set_value(static_cast<lv_obj_t *>(var), value);
          };
          auto animate_arc_to = [set_arc_value](lv_obj_t *arc, int32_t target) {
            target = clamp(target, (int32_t) 0, (int32_t) 100);
            int32_t current = lv_arc_get_value(arc);
            lv_anim_delete(arc, set_arc_value);
            if (current == target) return;

            lv_anim_t anim;
            lv_anim_init(&anim);
            lv_anim_set_var(&anim, arc);
            lv_anim_set_values(&anim, current, target);
            lv_anim_set_time(&anim, 180);
            lv_anim_set_path_cb(&anim, lv_anim_path_ease_out);
            lv_anim_set_exec_cb(&anim, set_arc_value);
            lv_anim_start(&anim);
          };

          auto normalize_temperature = [](float temperature) {
            return clamp((int32_t) roundf((temperature - ${temperature_min}) /
                                          (${temperature_max} - ${temperature_min}) * 100.0f),
                         (int32_t) 0, (int32_t) 100);
          };

          float heat_target = !std::isnan(id(target_low_v))
                                  ? id(target_low_v) : id(target_temperature);
          float cool_target = !std::isnan(id(target_high_v))
                                  ? id(target_high_v) : id(target_temperature);
          int32_t cool_normalized = normalize_temperature(cool_target);

          animate_arc_to(id(arc_temperature_heat), normalize_temperature(heat_target));
          // REVERSE places internal value 0 at the right-hand end. Inverting
          // the visual value keeps minimum temperature on the left like HA.
          animate_arc_to(id(arc_temperature_cool), 100 - cool_normalized);
          animate_arc_to(id(arc_temperature_current),
                         normalize_temperature(id(pending_current_temperature)));
      - if:
          condition:
            lambda: |-
              if (!std::isnan(id(target_low_v))) return true;
              for (const auto &mode : ha_parse_list(id(hvac_modes_raw)))
                if (mode == "heat" || mode == "heat_cool" || mode == "auto") return true;
              return id(current_hvac_raw) == "heat" || id(current_hvac_raw) == "heat_cool";
          then:
            - lvgl.widget.show: arc_temperature_heat
          else:
            - lvgl.widget.hide: arc_temperature_heat
      - if:
          condition:
            lambda: |-
              if (!std::isnan(id(target_high_v))) return true;
              for (const auto &mode : ha_parse_list(id(hvac_modes_raw)))
                if (mode == "cool" || mode == "heat_cool" || mode == "auto") return true;
              return id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "heat_cool"
                     || id(current_hvac_raw) == "dry"
                     || id(current_hvac_raw) == "fan_only";
          then:
            - lvgl.widget.show: arc_temperature_cool
          else:
            - lvgl.widget.hide: arc_temperature_cool
      # Humidity, only visible when a value exists.
      - if:
          condition:
            lambda: 'return !id(connection_ready) || !std::isnan(id(pending_humidity));'
          then:
            - lvgl.label.update:
                id: label_humidity_thermo
                text: !lambda |-
                  char buf[8];
                  snprintf(buf, sizeof(buf), "%.0f%%", id(pending_humidity));
                  return ha_text_or_placeholder(id(connection_ready), std::string(buf), 3);
            - lvgl.label.update:
                id: label_home_humidity
                text: !lambda |-
                  char buf[8];
                  snprintf(buf, sizeof(buf), "%.0f%%", id(pending_humidity));
                  return ha_text_or_placeholder(id(connection_ready), std::string(buf), 3);
            - lvgl.widget.show: label_humidity_thermo
            - lvgl.widget.show: label_home_humidity
            - if:
                condition:
                  lambda: 'return id(connection_ready) && id(icons_enabled).state;'
                then:
                  - lvgl.widget.show: icon_hum_thermo
                else:
                  - lvgl.widget.hide: icon_hum_thermo
          else:
            - lvgl.widget.hide: label_humidity_thermo
            - lvgl.widget.hide: label_home_humidity
            - lvgl.widget.hide: icon_hum_thermo
      - if:
          condition:
            lambda: 'return id(connection_ready) && id(icons_enabled).state;'
          then:
            - lvgl.widget.show: icon_thermo_current
          else:
            - lvgl.widget.hide: icon_thermo_current

  # Status lines, mode icons, and ring color.
  - id: refresh_status
    then:
      - lvgl.label.update:
          id: label_hvac_mode
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          ha_hvac_mode_label(id(current_hvac_raw), false), 6);
      - lvgl.label.update:
          id: label_home_hvac_mode
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          ha_hvac_mode_label(id(current_hvac_raw), false), 6);
      - lvgl.label.update:
          id: label_preset
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          ha_preset_label(id(current_preset_raw), false), 6);
      - lvgl.label.update:
          id: label_home_preset
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          ha_preset_label(id(current_preset_raw), false), 6);
      - lvgl.label.update:
          id: icon_mode_thermo
          text: !lambda |-
            if (id(current_hvac_raw) == "off") return std::string(ICON_POWER);
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)))
              return std::string(id(adjust_target) == 1 ? ICON_SNOW : ICON_FIRE);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return std::string(ICON_SNOW);
            return std::string(ICON_FIRE);
      - lvgl.label.update:
          id: icon_mode_home
          text: !lambda |-
            if (id(current_hvac_raw) == "off") return std::string(ICON_POWER);
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)))
              return std::string(id(adjust_target) == 1 ? ICON_SNOW : ICON_FIRE);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return std::string(ICON_SNOW);
            return std::string(ICON_FIRE);
      - lvgl.widget.update:
          id: icon_mode_thermo
          text_color: !lambda |-
            // No active heating/cooling phase (idle/off): use dark gray.
            if (id(current_action_raw) != "heating" && id(current_action_raw) != "cooling")
              return lv_color_hex(0x9A9A9A);
            // Active AC target: snow icon is always blue.
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)) && id(adjust_target) == 1)
              return lv_color_hex(0x6EC6FF);
            if (id(design_select).current_option() != "Color") return lv_color_hex(0xFFFFFF);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return lv_color_hex(0x6EC6FF);
            return lv_color_hex(0xFF8A3D);
      - lvgl.widget.update:
          id: icon_mode_home
          text_color: !lambda |-
            // No active heating/cooling phase (idle/off): use dark gray.
            if (id(current_action_raw) != "heating" && id(current_action_raw) != "cooling")
              return lv_color_hex(0x9A9A9A);
            // Active AC target: snow icon is always blue.
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)) && id(adjust_target) == 1)
              return lv_color_hex(0x6EC6FF);
            if (id(design_select).current_option() != "Color") return lv_color_hex(0xFFFFFF);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return lv_color_hex(0x6EC6FF);
            return lv_color_hex(0xFF8A3D);
      # Keep both setpoint markers visible at once. Switching TRV/AC still only
      # changes `adjust_target`; it does not hide the other setpoint.
      - lvgl.arc.update:
          id: arc_temperature_heat
          indicator:
            arc_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
          knob:
            bg_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
            border_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
      - lvgl.arc.update:
          id: arc_temperature_cool
          indicator:
            arc_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
          knob:
            bg_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
            border_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
      - if:
          condition:
            lambda: 'return id(icons_enabled).state && id(connection_ready);'
          then:
            - lvgl.widget.show: icon_mode_thermo
            - lvgl.widget.show: icon_mode_home
          else:
            - lvgl.widget.hide: icon_mode_thermo
            - lvgl.widget.hide: icon_mode_home
      - script.execute: update_status_led

  # Staged connection diagnostics: WiFi -> HA API -> climate entity.
  - id: refresh_connection
    mode: restart
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: |-
                id(connection_ready) = false;
                if (!id(ha_connected)) {
                  id(connection_message) = millis() < 60000
                      ? "HA connecting..." : "HA unreachable";
                  return;
                }
                if (id(ha_climates).config_error() || id(ha_lights).config_error()) {
                  id(connection_message) = "Smart Knob config JSON error";
                  return;
                }
                if (!id(ha_climates).config_loaded() || !id(ha_lights).config_loaded()) {
                  uint32_t connected_for = millis() - id(ha_connected_since_ms);
                  id(connection_message) = connected_for < 10000
                      ? "Smart Knob config loading..." : "Smart Knob config not found";
                  return;
                }
                if (id(ha_climates).empty()) {
                  id(connection_message) = "No climate configured";
                  return;
                }
                const auto &climate = id(ha_climates).get(id(climate_index));
                bool valid_climate = !climate.state.empty()
                    && climate.state != "unknown"
                    && climate.state != "unavailable";
                if (valid_climate) {
                  id(connection_ready) = true;
                  id(connection_message).clear();
                  return;
                }
                uint32_t connected_for = millis() - id(ha_connected_since_ms);
                id(connection_message) = connected_for < 10000
                    ? "Climate entity loading..." : "Climate entity not found";
          else:
            - lambda: |-
                id(connection_ready) = false;
                id(connection_message) = millis() < 30000
                    ? "WiFi connecting..." : "WiFi error";
      - lvgl.label.update:
          id: label_conn_thermo
          text: !lambda |-
            return ha_connection_label(id(connection_message),
                                       id(language_select).current_option() == "Deutsch");
      - lvgl.label.update:
          id: label_conn_home
          text: !lambda |-
            return ha_connection_label(id(connection_message),
                                       id(language_select).current_option() == "Deutsch");
      - lvgl.label.update:
          id: label_loading_status
          text: !lambda |-
            return ha_connection_label(id(connection_message),
                                       id(language_select).current_option() == "Deutsch");
      - lvgl.label.update:
          id: label_loading_reboot_hint
          text: !lambda |-
            return reboot_hint_label(id(language_select).current_option() == "Deutsch");
      - if:
          condition:
            lambda: 'return id(connection_message) == "Smart Knob config not found";'
          then:
            - lvgl.widget.hide: spinner_ha_connection
            - lvgl.widget.show: icon_loading_config_error
            - lvgl.widget.show: button_loading_reboot_background
            - lvgl.widget.show: label_loading_reboot_hint
          else:
            - lvgl.widget.show: spinner_ha_connection
            - lvgl.widget.hide: icon_loading_config_error
            - lvgl.widget.hide: button_loading_reboot_background
            - lvgl.widget.hide: label_loading_reboot_hint
      - lambda: |-
          static bool previous_ready = false;
          id(connection_state_changed) = previous_ready != id(connection_ready);
          previous_ready = id(connection_ready);
      # Update all HA-backed text exactly once on a ready/not-ready transition.
      # In particular, do not restart the light-name marquee every two seconds.
      - if:
          condition:
            lambda: 'return id(connection_state_changed);'
          then:
            - script.execute: refresh_temps
            - script.execute: refresh_light
            - if:
                condition:
                  lambda: 'return id(connection_ready);'
                then:
                  - lambda: 'id(ui_context) = 0;'
                  - lvgl.page.show:
                      id: screen_home
                      animation: NONE
                else:
                  - lambda: 'id(ui_context) = -1;'
                  - lvgl.page.show:
                      id: screen_loading
                      animation: NONE
      - if:
          condition:
            lambda: 'return id(connection_ready);'
          then:
            - lvgl.widget.hide: label_conn_thermo
            - lvgl.widget.hide: label_conn_home
            - lvgl.widget.show: label_hvac_mode
            - lvgl.widget.show: label_home_hvac_mode
            - lvgl.widget.show: label_preset
            - lvgl.widget.show: label_home_preset
            - script.execute: refresh_status
          else:
            - lvgl.widget.show: label_conn_thermo
            - lvgl.widget.show: label_conn_home
            - lvgl.widget.hide: label_hvac_mode
            - lvgl.widget.hide: label_home_hvac_mode
            - lvgl.widget.hide: label_preset
            - lvgl.widget.hide: label_home_preset
            - lvgl.widget.hide: icon_mode_thermo
            - lvgl.widget.hide: icon_mode_home

  - id: open_settings
    then:
      - lambda: |-
          auto page_obj = [](esphome::lvgl::LvPageType *page) { return page->obj; };
          lv_obj_t *target = page_obj(screen_navigation);
          lv_obj_t *widgets[] = {
              id(label_settings_title), id(label_menu_icon_prev2), id(label_menu_icon_prev),
              id(label_menu_icon), id(label_menu_icon_next), id(label_menu_icon_next2),
              id(label_menu_prev2), id(label_menu_prev), id(label_menu_current),
              id(label_menu_next), id(label_menu_next2), id(label_menu_value)};
          for (lv_obj_t *widget : widgets)
            if (lv_obj_get_parent(widget) != target) lv_obj_set_parent(widget, target);
          id(thermostat_quick_stage) = 0;
          id(ui_context) = 2;
          id(menu_index) = 0;
          id(group_item_index) = 0;
      - script.execute: update_settings_labels
      - lvgl.page.show:
          id: screen_navigation

  - id: group_enter
    then:
      - lambda: |-
          id(group_item_index) = 0;
          id(ui_context) = 3;
      - script.execute: update_settings_labels

  - id: menu_enter
    then:
      - lambda: |-
          id(submenu_type) = settings_group_type_at(id(menu_index), id(group_item_index));
          id(submenu_index) = 0;
          switch (id(submenu_type)) {
            case 0: {
              auto vec = ha_filter_modes(
                  id(hvac_modes_raw),
                  id(thermostat_quick_stage) == 0 &&
                      id(knob_hvac_modes).current_option() != "All");
              id(submenu_count) = (int) vec.size();
              for (size_t i = 0; i < vec.size(); i++)
                if (vec[i] == id(current_hvac_raw)) { id(submenu_index) = (int) i; break; }
              break;
            }
            case 1: {
              auto vec = ha_filter_presets(id(preset_modes_raw));
              id(submenu_count) = (int) vec.size();
              for (size_t i = 0; i < vec.size(); i++)
                if (vec[i] == id(current_preset_raw)) { id(submenu_index) = (int) i; break; }
              break;
            }
            case 2: break;
            case 3:  id(submenu_index) = id(time_24h).state ? 1 : 0; break;
            case 4:
              id(submenu_index) = id(language_select).current_option() == "Deutsch" ? 1 : 0;
              id(submenu_count) = 2;
              break;
            case 5:  id(submenu_index) = id(design_select).current_option() == "Color" ? 1 : 0; break;
            case 6:  id(submenu_index) = id(icons_enabled).state ? 1 : 0; break;
            case 7:  id(submenu_index) = id(unit_select).current_option() == "Fahrenheit" ? 1 : 0; break;
            case 8:  id(num_preview) = (int) id(idle_home_num).state; break;
            case 9:  id(num_preview) = (int) id(dim_delay_num).state; break;
            case 10: id(num_preview) = (int) id(dim_level_num).state; break;
            case 12: id(submenu_index) = id(knob_hvac_modes).current_option() == "All" ? 1 : 0; break;
            case 13: {
              static const char *const opts[] = {"0.1", "0.2", "0.5", "1.0"};
              id(submenu_count) = 4;
              for (int i = 0; i < 4; i++)
                if (id(knob_step_select).current_option() == opts[i]) { id(submenu_index) = i; break; }
              break;
            }
            case 17: id(submenu_index) = id(led_enabled).state ? 1 : 0; break;
            case 18: id(num_preview) = (int) id(led_brightness_num).state; break;
            default: break;
          }
          id(ui_context) = 4;
      - script.execute: update_settings_labels

  - id: submenu_apply
    then:
      - lambda: |-
          id(apply_service) = 0;
          switch (id(submenu_type)) {
            case 0: {
              auto vec = ha_filter_modes(
                  id(hvac_modes_raw),
                  id(thermostat_quick_stage) == 0 &&
                      id(knob_hvac_modes).current_option() != "All");
              int n = (int) vec.size();
              if (n <= 0) break;
              int idx = ((id(submenu_index) % n) + n) % n;
              id(pending_mode_holder) = vec[idx];
              id(apply_service) = 1;
              break;
            }
            case 1: {
              auto vec = ha_filter_presets(id(preset_modes_raw));
              int n = (int) vec.size();
              if (n <= 0) break;
              int idx = ((id(submenu_index) % n) + n) % n;
              id(pending_mode_holder) = vec[idx];
              id(apply_service) = 2;
              break;
            }
            case 3:  id(apply_service) = id(submenu_index) ? 3 : 4; break;
            case 4:  id(apply_service) = id(submenu_index) ? 9 : 8; break;
            case 5:  id(apply_service) = id(submenu_index) ? 11 : 10; break;
            case 6:  id(apply_service) = id(submenu_index) ? 13 : 12; break;
            case 7:  id(apply_service) = id(submenu_index) ? 15 : 14; break;
            case 8:  id(apply_service) = 16; break;
            case 9:  id(apply_service) = 17; break;
            case 10: id(apply_service) = 18; break;
            case 12: id(apply_service) = id(submenu_index) ? 5 : 6; break;
            case 13: {
              static const char *const opts[] = {"0.1", "0.2", "0.5", "1.0"};
              int idx = ((id(submenu_index) % 4) + 4) % 4;
              id(pending_mode_holder) = opts[idx];
              id(apply_service) = 21;
              break;
            }
            case 16: if (id(submenu_index) == 1) id(apply_service) = 7; break;
            case 17: id(apply_service) = id(submenu_index) ? 23 : 22; break;
            case 18: id(apply_service) = 24; break;
            default: break;
          }
          id(ui_context) = id(thermostat_quick_stage) != 0 ? 1 : 3;
      - if:
          condition: {lambda: 'return id(apply_service) == 1;'}
          then:
            - homeassistant.service:
                service: climate.set_hvac_mode
                data:
                  entity_id: !lambda 'return id(ha_climates).get(id(climate_index)).entity_id;'
                  hvac_mode: !lambda 'return id(pending_mode_holder);'
      - if:
          condition: {lambda: 'return id(apply_service) == 2;'}
          then:
            - homeassistant.service:
                service: climate.set_preset_mode
                data:
                  entity_id: !lambda 'return id(ha_climates).get(id(climate_index)).entity_id;'
                  preset_mode: !lambda 'return id(pending_mode_holder);'
      - if:
          condition: {lambda: 'return id(apply_service) == 3;'}
          then: [switch.turn_on: time_24h]
      - if:
          condition: {lambda: 'return id(apply_service) == 4;'}
          then: [switch.turn_off: time_24h]
      - if:
          condition: {lambda: 'return id(apply_service) == 5;'}
          then: [{select.set: {id: knob_hvac_modes, option: "All"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 6;'}
          then: [{select.set: {id: knob_hvac_modes, option: "Heat/Off"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 7;'}
          then: [button.press: factory_reset_btn]
      - if:
          condition: {lambda: 'return id(apply_service) == 8;'}
          then: [{select.set: {id: language_select, option: "English"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 9;'}
          then: [{select.set: {id: language_select, option: "Deutsch"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 10;'}
          then: [{select.set: {id: design_select, option: "Mono"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 11;'}
          then: [{select.set: {id: design_select, option: "Color"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 12;'}
          then: [switch.turn_off: icons_enabled]
      - if:
          condition: {lambda: 'return id(apply_service) == 13;'}
          then: [switch.turn_on: icons_enabled]
      - if:
          condition: {lambda: 'return id(apply_service) == 14;'}
          then: [{select.set: {id: unit_select, option: "Celsius"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 15;'}
          then: [{select.set: {id: unit_select, option: "Fahrenheit"}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 16;'}
          then: [{number.set: {id: idle_home_num, value: !lambda 'return id(num_preview);'}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 17;'}
          then: [{number.set: {id: dim_delay_num, value: !lambda 'return id(num_preview);'}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 18;'}
          then: [{number.set: {id: dim_level_num, value: !lambda 'return id(num_preview);'}}]
      - if:
          condition: {lambda: 'return id(apply_service) == 21;'}
          then:
            - select.set:
                id: knob_step_select
                option: !lambda 'return id(pending_mode_holder);'
      - if:
          condition: {lambda: 'return id(apply_service) == 22;'}
          then: [switch.turn_off: led_enabled]
      - if:
          condition: {lambda: 'return id(apply_service) == 23;'}
          then: [switch.turn_on: led_enabled]
      - if:
          condition: {lambda: 'return id(apply_service) == 24;'}
          then: [{number.set: {id: led_brightness_num, value: !lambda 'return id(num_preview);'}}]
      - if:
          condition:
            lambda: 'return id(thermostat_quick_stage) != 0;'
          then:
            - lambda: 'id(thermostat_quick_stage) = 0;'
            - script.execute: load_active_climate
            - lvgl.page.show:
                id: screen_thermostat
                animation: NONE
          else:
            - script.execute: update_settings_labels

  - id: update_settings_labels
    then:
      - lambda: |-
          bool de = false;
          char buf[64];
          if (id(ui_context) == 6) {
            int climates = (int) id(ha_climates).size();
            int lights = (int) id(ha_lights).size();
            int count = climates + lights + 2;
            auto entity_name = [climates, lights, count](int p) -> std::string {
              p = ((p % count) + count) % count;
              if (p < climates) return id(ha_climates).get(p).name;
              if (p < climates + lights) return id(ha_lights).get(p - climates).name;
              return p == climates + lights ? std::string("Settings") : std::string("Back");
            };
            auto m = menu_window(id(entity_menu_index), count, ${settings_extra_rows}, entity_name);
            id(set_title) = "Entities";
            id(set_prev2) = m.prev2;
            id(set_prev) = m.prev;
            id(set_cur) = m.cur;
            id(set_next) = m.next;
            id(set_next2) = m.next2;
            id(set_value) = m.value;
          } else if (id(ui_context) == 2) {
            auto m = menu_window(id(menu_index), SETTINGS_ROOT_COUNT, false,
                                  [](int p) -> std::string { return settings_root_name(p); });
            id(set_title) = "Settings";
            id(set_prev2) = m.prev2;
            id(set_prev) = m.prev;
            id(set_cur) = m.cur;
            id(set_next) = m.next;
            id(set_next2) = m.next2;
            id(set_value) = m.value;
          } else if (id(ui_context) == 3) {
            int group = settings_group_wrap(id(menu_index));
            int count = settings_group_entry_count(group);
            int i = ((id(group_item_index) % count) + count) % count;
            int t = settings_group_entry_type_at(group, i);
            auto entry_name = [group, de](int position) -> std::string {
              int type = settings_group_entry_type_at(group, position);
              return type < 0 ? std::string("Back") : std::string(settings_menu_name(type, de));
            };
            auto m = menu_window(id(group_item_index), count, ${settings_extra_rows}, entry_name);
            id(set_title) = SETTINGS_GROUP_NAMES[group];
            id(set_prev2) = m.prev2;
            id(set_prev) = m.prev;
            id(set_cur) = m.cur;
            id(set_next) = m.next;
            id(set_next2) = m.next2;
            id(set_value) = m.value;
            std::string val;
            switch (t) {
              case 0: val = ha_hvac_mode_label(id(current_hvac_raw), de); break;
              case 1: val = ha_preset_label(id(current_preset_raw), de); break;
              case 2: snprintf(buf, sizeof(buf), "%d%%", id(brightness_pct)); val = buf; break;
              case 3: val = id(time_24h).state ? "24h" : "12h"; break;
              case 4: val = id(language_select).current_option(); break;
              case 5: val = id(design_select).current_option() == "Color" ? "Color" : "Black/White"; break;
              case 6: val = id(icons_enabled).state ? "On" : "Off"; break;
              case 7: val = id(unit_select).current_option() == "Fahrenheit" ? "°F" : "°C"; break;
              case 8: snprintf(buf, sizeof(buf), "%ds", (int) id(idle_home_num).state); val = buf; break;
              case 9: snprintf(buf, sizeof(buf), "%ds", (int) id(dim_delay_num).state); val = buf; break;
              case 10: snprintf(buf, sizeof(buf), "%d%%", (int) id(dim_level_num).state); val = buf; break;
              case 12: val = id(knob_hvac_modes).current_option() == "All" ? "All modes" : "Heat/Off"; break;
              case 13: val = id(knob_step_select).current_option().str() + "°C"; break;
              case 14: val = id(wifi_ssid_txt).state; break;
              case 15: val = id(fw_version).state; break;
              case 16: val = ""; break;
              case 17: val = id(led_enabled).state ? "On" : "Off"; break;
              case 18: snprintf(buf, sizeof(buf), "%d%%", (int) id(led_brightness_num).state); val = buf; break;
            }
            (void) val;
          } else {
            int t = id(submenu_type);
            id(set_title) = settings_menu_name(t, de);
            id(set_prev2) = "";
            id(set_prev) = "";
            id(set_next) = "";
            id(set_next2) = "";
            std::string cur, val;
            std::string h_apply = "Press = apply";
            std::string h_save = "Press = save";
            std::string h_turn = "Turn = adjust";
            switch (t) {
              case 0:
              case 1: {
                std::vector<std::string> vec;
                if (t == 0) {
                  vec = ha_filter_modes(
                      id(hvac_modes_raw),
                      id(thermostat_quick_stage) == 0 &&
                          id(knob_hvac_modes).current_option() != "All");
                } else {
                  vec = ha_filter_presets(id(preset_modes_raw));
                }
                id(submenu_count) = (int) vec.size();
                if (vec.empty()) {
                  cur = t == 0 ? "No HVAC modes" : "No presets";
                  val = "Home Assistant unavailable";
                  break;
                }
                auto option_name = [t, &vec, de](int p) -> std::string {
                  int n = (int) vec.size();
                  p = ((p % n) + n) % n;
                  return t == 0 ? ha_hvac_mode_label(vec[p], de) : ha_preset_label(vec[p], de);
                };
                auto m = menu_window(id(submenu_index), (int) vec.size(), false, option_name);
                cur = m.cur;
                id(set_prev) = m.prev;
                id(set_next) = m.next;
                val = m.value;
                break;
              }
              case 2: snprintf(buf, sizeof(buf), "%d%%", id(brightness_pct)); cur = buf; val = h_turn; break;
              case 3: cur = id(submenu_index) ? "24h" : "12h"; val = h_save; break;
              case 4: cur = id(submenu_index) ? "Deutsch" : "English"; val = h_save; break;
              case 5: cur = id(submenu_index) ? "Color" : "Black/White"; val = h_save; break;
              case 6: cur = id(submenu_index) ? "On" : "Off"; val = h_save; break;
              case 7: cur = id(submenu_index) ? "°F" : "°C"; val = h_save; break;
              case 8:
              case 9: snprintf(buf, sizeof(buf), "%ds", id(num_preview)); cur = buf; val = h_save; break;
              case 10: snprintf(buf, sizeof(buf), "%d%%", id(num_preview)); cur = buf; val = h_save; break;
              case 12: cur = id(submenu_index) ? "All modes" : "Heat/Off"; val = h_save; break;
              case 13: {
                static const char *const opts[] = {"0.1", "0.2", "0.5", "1.0"};
                id(submenu_count) = 4;
                auto m = menu_window(id(submenu_index), 4, false, [](int p) -> std::string {
                  return std::string(opts[((p % 4) + 4) % 4]) + "°C";
                });
                cur = m.cur;
                id(set_prev) = m.prev;
                id(set_next) = m.next;
                val = h_save;
                break;
              }
              case 14:
                cur = id(wifi_ssid_txt).state;
                snprintf(buf, sizeof(buf), "%s  %.0f dBm", id(wifi_ip_txt).state.c_str(), id(wifi_rssi).state);
                val = buf;
                break;
              case 15: cur = id(fw_version).state; val = ""; break;
              case 16: cur = id(submenu_index) == 1 ? "Yes, reset" : "No"; val = "Press = confirm"; break;
              case 17: cur = id(submenu_index) ? "On" : "Off"; val = h_save; break;
              case 18: snprintf(buf, sizeof(buf), "%d%%", id(num_preview)); cur = buf; val = h_save; break;
            }
            id(set_cur) = cur;
            if (t != 0 && t != 1) {
              int count = id(submenu_count) > 0 ? id(submenu_count) : 1;
              int position = ((id(submenu_index) % count) + count) % count;
              snprintf(buf, sizeof(buf), "%d / %d", position + 1, count);
              val = buf;
            }
            id(set_value) = val;
          }
      - lvgl.label.update:
          id: label_settings_title
          text: !lambda 'return id(set_title);'
      - lvgl.label.update:
          id: label_menu_icon_prev2
          text: !lambda |-
