                  (int) id(ha_climates).size(), (int) id(ha_lights).size()));
            if (id(ui_context) == 2)
              return std::string(settings_root_icon(id(menu_index) - 2));
            if (id(ui_context) == 3) {
              int type = settings_group_entry_type_at(id(menu_index), id(group_item_index) - 2);
              return std::string(type < 0 ? ICON_BACK : MENU_ICONS[type]);
            }
            return std::string(MENU_ICONS[id(submenu_type)]);
      - lvgl.label.update:
          id: label_menu_icon_prev
          text: !lambda |-
            if (id(ui_context) == 6)
              return std::string(entity_menu_icon(id(entity_menu_index) - 1,
