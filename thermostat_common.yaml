########################################################################
# thermostat_common.yaml
#
# Shared package for CrowPanel ESP32-S3 rotary displays (2.1"/480x480 and
# 1.28"/240x240). Board-specific hardware and each native LVGL layout live in
# thermostat_480.yaml and thermostat_240.yaml, which include this file through
# `packages:`. There is no automatic scaling; every board has its own layout.
#
# One or more Home Assistant climate entities drive the UI. Each can represent
# a thermostat-only setup, an AC-only setup, or a combined heat/cool entity.
# Available hvac_modes and preset_modes are read separately at runtime.
#
# Screens: screen_home (default), then horizontal navigation through
# configured thermostat pages -> configured light pages -> screen_navigation.
#
# Knob controls:
#   Home:        rotate or short-press -> thermostat screen
#   Thermostat:  rotate -> target temperature +/- configured step
#                short-press -> switch TRV/AC target
#                vertical swipe -> HVAC, then preset quick selector
#   Light:       rotate -> selected light value, short-press -> light.toggle
#                vertical swipe -> next brightness/temperature/color mode
#   Settings:    rotate = scroll/change value, short-press = select/OK
#   Everywhere:  hold knob for 800 ms -> back
#                Idle -> dim display and return home after configured delays
#
# Home Assistant must allow this ESPHome device to perform Home Assistant
# actions, otherwise climate.set_temperature and related service calls will not
# run.
#
# Climate and light entities come from JSON attributes on a Home Assistant
# template sensor. Their live states are subscribed dynamically afterwards.
#
# Hardware-Details siehe jeweilige Board-Datei:
#   thermostat_480.yaml: ST7701S RGB-Panel, CST826-Touch (extern gepatcht),
#                         PCF8574-Expander, Encoder GPIO4/42.
#   thermostat_240.yaml: GC9A01A SPI-Panel, CST816-Touch, Encoder GPIO45/42.
# encoder_button and temperature_encoder define 480x480 defaults below.
# thermostat_240.yaml overrides them with `!extend`.
########################################################################

substitutions:
  device_name: thermostat
  friendly_name: "Thermostat Knob"
  # Home Assistant template sensor that provides the JSON attributes
  # `climates` and `lights`. It can also be changed later from Home Assistant.
  ha_config_entity_id: "sensor.smart_knob_config"

  # ---- Behavior ----
  temperature_step: "0.5"       # Celsius per encoder detent; internal values stay Celsius
  temperature_min: "5.0"
  temperature_max: "30.0"
  setpoint_min_gap: "0.5"       # Minimum TRV(low) <-> AC(high) gap in Celsius
  debounce_ms: "500ms"          # Quiet time before climate.set_temperature
  settings_row_gap: "82"        # Overridden by the 240x240 board
  settings_extra_rows: "false"  # 480x480 overrides this to show five rows
  light_color_preset_border: "5"
  light_slider_range: "230"
  light_kelvin_scale_width: "288"
  light_kelvin_scale_height: "56"
  cover_fill_max: "480"
  cover_knob_margin: "28"       # Keeps the knob off the very top/bottom edges

# Local components load variable-length climate/light lists from the JSON
# attributes of the Home Assistant configuration entity.
external_components:
  - source:
      type: local
      path: components
    components: [ha_climate_controller, ha_light_controller, ha_cover_controller]

ha_climate_controller:
  id: ha_climates
  config_entity_id: ${ha_config_entity_id}
  config_attribute: climates

ha_light_controller:
  id: ha_lights
  config_entity_id: ${ha_config_entity_id}
  config_attribute: lights

ha_cover_controller:
  id: ha_covers
  config_entity_id: ${ha_config_entity_id}
  config_attribute: covers

esphome:
  name: ${device_name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  comment: "ESPHome CrowPanel Thermostat Knob"
  includes:
    - thermostat_helpers.h
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            int b = (int) roundf(id(brightness_num).state);
            id(brightness_pct) = clamp(b > 0 ? b : 50, 5, 100);
        - light.turn_on:
            id: display_backlight
            brightness: !lambda 'return id(brightness_pct) / 100.0f;'
        - lvgl.page.show: screen_loading
        - lambda: |-
            id(ui_context) = -1;
            id(app_booted) = true;
        - script.execute: refresh_temps
        - script.execute: refresh_status
        - script.execute: refresh_connection
        - script.execute: update_clock_labels
        - script.execute: update_status_led

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

# ------------------------------------------------------------------
# Network
# ------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - script.execute: refresh_connection
  on_disconnect:
    - script.execute: refresh_connection
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_ap_password

# Lets the web flasher (web-flasher/) offer a "configure Wi-Fi" step over
# USB-serial right after installing, the same way esphome.github.io/esp-web-tools
# does for other devices. Independent of the compiled-in network above: Improv
# just stores whatever network the browser sends and takes priority on connect.
improv_serial:

captive_portal:

logger:
  level: INFO

# API without encryption lets Home Assistant add the device without a key.
api:
  # Required by the dynamic climate/light array controllers. Without this,
  # ESPHome compiles APIServer without subscribe_home_assistant_state().
  homeassistant_states: true
  on_client_connected:
    - lambda: |-
        // Ignore ESPHome Logs/CLI clients; only a real Home Assistant API
        // session may mark HA as reachable.
        if (client_info.find("Home Assistant") == std::string::npos) return;
        id(ha_connected) = true;
        id(ha_connected_since_ms) = millis();
    - script.execute: refresh_connection
    - script.execute: sync_ha_states
  on_client_disconnected:
    - lambda: |-
        if (client_info.find("Home Assistant") == std::string::npos) return;
        id(ha_connected) = false;
        id(ha_connected_since_ms) = 0;
    - script.execute: refresh_connection

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

# Refresh staged connection diagnostics while WiFi, Home Assistant, or the
# configured climate entity is still becoming available.
interval:
  - interval: 2s
    then:
      - if:
          condition:
            lambda: 'return id(app_booted);'
          then:
            - script.execute: refresh_connection
  # Home Assistant light subscriptions are asynchronous. Redraw only while a
  # light page is visible and only after data actually changed.
  - interval: 100ms
    then:
      - if:
          condition:
            lambda: 'return id(ha_climates).consume_dirty(id(climate_index));'
          then:
            - script.execute: load_active_climate
      - if:
          condition:
            lambda: 'return id(ui_context) == 5 && id(ha_lights).consume_dirty();'
          then:
            - script.execute: refresh_light
  # Keeps the timer countdown (and the Notify screen's Auto-Home arc) live
  # while their screen is actually showing. Progress needs no ticker - it
  # only changes when Home Assistant pushes a new value, handled by
  # progress_value_num's on_value.
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(ui_context) == 8;'
          then:
            - script.execute: refresh_timer
      - if:
          condition:
            lambda: 'return id(ui_context) == 10;'
          then:
            - script.execute: refresh_notify
  # Finish-state effects (blink, auto-home) run independently of which
  # screen is showing, at a faster cadence so the blink is visibly alternating.
  - interval: 500ms
    then:
      - script.execute: check_finish_effects

# ------------------------------------------------------------------
# Global state
# ------------------------------------------------------------------
globals:

  - id: target_temperature
    type: float
    restore_value: false
    initial_value: "21.0"

  - id: pending_temperature_change
    type: bool
    restore_value: false
    initial_value: "false"

  - id: ha_connected
    type: bool
    restore_value: false
    initial_value: "false"

  - id: ha_connected_since_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: connection_ready
    type: bool
    restore_value: false
    initial_value: "false"

  - id: connection_state_changed
    type: bool
    restore_value: false
    initial_value: "false"

  - id: connection_message
    type: std::string
    restore_value: false

  # Becomes true only at the end of the on_boot(-100) sequence. This prevents
  # select components from restoring values and triggering refresh_status ->
  # update_status_led before WS2812/RMT hardware is initialized.
  - id: app_booted
    type: bool
    restore_value: false
    initial_value: "false"

  # Raw coordinate tracking for swipe detection. LVGL on_swipe_* events were
  # unreliable on the full-screen button, so the board files feed raw touch
  # start/end coordinates into handle_swipe_release.
  # UI navigation: 0 Home, 1 Thermostat, 2 groups, 3 group items, 4 editor,
  # 5 one of the configured light pages, 6 entity overview, 7 cover,
  # 8 timer, 9 progress.
  - id: ui_context
    type: int
    restore_value: false
    initial_value: "0"

  - id: menu_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: group_item_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: submenu_type
    type: int
    restore_value: false
    initial_value: "0"

  - id: entity_menu_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: entity_return_kind
    type: int
    restore_value: false
    initial_value: "1"

  - id: entity_return_index
    type: int
    restore_value: false
    initial_value: "0"

  # Quick thermostat selector: 0 normal settings, 1 HVAC, 2 presets.
  - id: thermostat_quick_stage
    type: int
    restore_value: false
    initial_value: "0"

  - id: submenu_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: submenu_count
    type: int
    restore_value: false
    initial_value: "1"

  - id: num_preview
    type: int
    restore_value: false
    initial_value: "0"

  - id: encoder_delta
    type: int
    restore_value: false
    initial_value: "0"

  - id: light_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: cover_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: climate_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: pending_climate_index
    type: int
    restore_value: false
    initial_value: "0"

  - id: pending_light_change
    type: bool
    restore_value: false
    initial_value: "false"

  - id: pending_cover_change
    type: bool
    restore_value: false
    initial_value: "false"

  - id: pending_cover_index
    type: int
    restore_value: false
    initial_value: "0"

  # Captured automatically whenever timer_end_time_txt changes (see its
  # on_value); used only to compute the timer arc's fill fraction, never
  # exposed as its own entity.
  - id: timer_start_epoch
    type: uint32_t
    restore_value: false
    initial_value: "0"

  # "Finished" tracking for the Timer/Progress post-completion effects
  # (auto-return-home delay, LED/value blink). *_finished latches once the
  # countdown/value crosses into "done" and only clears when a fresh
  # end time / a value below 100 is set again. *_finished_at_ms anchors the
  # auto-home delay. blink_led_on is the shared on/off phase for both the
  # status LED and the value-label blink (one physical LED, so one phase is
  # enough even if timer and progress finish at the same time).
  - id: timer_finished
    type: bool
    restore_value: false
    initial_value: "false"

  - id: timer_finished_at_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  # True for exactly one check_finish_effects tick - the one where
  # *_finished just latched to true. Drives the (optional) auto-show-screen
  # action, which needs to fire once on the transition, not on every tick.
  - id: timer_just_finished
    type: bool
    restore_value: false
    initial_value: "false"

  - id: progress_just_finished
    type: bool
    restore_value: false
    initial_value: "false"

  - id: blink_led_on
    type: bool
    restore_value: false
    initial_value: "false"

  # Cancel-confirmation dialog on the Timer screen: a single click shows it,
  # a second click within 5s cancels the timer, otherwise it disappears on
  # its own (see check_finish_effects).
  - id: timer_cancel_confirm_pending
    type: bool
    restore_value: false
    initial_value: "false"

  - id: timer_cancel_confirm_started_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  # Scratch value for writing a new timer_end_time_txt after the knob
  # adjusts it (see the ui_context == 8 encoder branch).
  - id: timer_edit_value
    type: std::string
    restore_value: false
    initial_value: '""'

  - id: progress_finished
    type: bool
    restore_value: false
    initial_value: "false"

  - id: progress_finished_at_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  # Notify: unlike Timer/Progress there's no countdown/threshold - "finished"
  # simply means "a notification is currently active" (notify_title_txt is
  # non-empty), latched true the moment it's set so notify_finished_at_ms
  # anchors the auto-home delay and the arc countdown consistently.
  - id: notify_finished
    type: bool
    restore_value: false
    initial_value: "false"

  - id: notify_finished_at_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

  - id: notify_just_finished
    type: bool
    restore_value: false
    initial_value: "false"

  - id: brightness_pct
    type: int
    restore_value: false
    initial_value: "50"

  - id: display_dimmed
    type: bool
    restore_value: false
    initial_value: "false"

  - id: apply_service
    type: int
    restore_value: false
    initial_value: "0"

  # Raw data from Home Assistant attributes
  - id: hvac_modes_raw
    type: std::string
    restore_value: false
  - id: preset_modes_raw
    type: std::string
    restore_value: false
  - id: current_hvac_raw
    type: std::string
    restore_value: false
  - id: last_hvac_mode
    type: std::string
    restore_value: false
  - id: current_action_raw
    type: std::string
    restore_value: false
  - id: current_preset_raw
    type: std::string
    restore_value: false

  # Service-Call-Parameter
  - id: pending_entity_id_holder
    type: std::string
    restore_value: false
  - id: pending_mode_holder
    type: std::string
    restore_value: false

  # Clock and date
  - id: pending_clock_time
    type: std::string
    restore_value: false
  - id: pending_clock_day
    type: std::string
    restore_value: false
  - id: pending_home_date
    type: std::string
    restore_value: false

  # Dual setpoint (heat_cool): 0 = TRV/heat (target_temp_low),
  # 1 = AC/cool (target_temp_high). Double click switches target.
  - id: adjust_target
    type: int
    restore_value: false
    initial_value: "0"
  - id: target_low_v
    type: float
    restore_value: false
    initial_value: "NAN"
  - id: target_high_v
    type: float
    restore_value: false
    initial_value: "NAN"

  - id: pending_current_temperature
    type: float
    restore_value: false
    initial_value: "20.0"
  - id: pending_humidity
    type: float
    restore_value: false
    initial_value: "NAN"

  # Settings render text
  - id: set_title
    type: std::string
    restore_value: false
  - id: set_prev
    type: std::string
    restore_value: false
  - id: set_prev2
    type: std::string
    restore_value: false
  - id: set_cur
    type: std::string
    restore_value: false
  - id: set_next
    type: std::string
    restore_value: false
  - id: set_next2
    type: std::string
    restore_value: false
  - id: set_value
    type: std::string
    restore_value: false

light:
  - platform: monochromatic
    name: "[Standard] ${friendly_name} Backlight"
    output: bl_pwm
    id: display_backlight
    default_transition_length: 0s
    # Do not restore the light's own brightness. brightness_num is the single
    # persisted source and is applied explicitly in on_boot(-100).
    restore_mode: ALWAYS_ON
    # Mirror brightness changes from Home Assistant or knob settings into
    # brightness_pct and the number entity. Do not synchronize while dimmed.
    on_state:
      - lambda: |-
          if (!id(display_dimmed)) {
            int b = (int) roundf(id(display_backlight).current_values.get_brightness() * 100.0f);
            if (id(display_backlight).current_values.is_on() && b > 0) {
              id(brightness_pct) = clamp(b, 5, 100);
              if ((int) roundf(id(brightness_num).state) != id(brightness_pct)) {
                auto call = id(brightness_num).make_call();
                call.set_value(id(brightness_pct));
                call.perform();
              }
            }
          }

# ------------------------------------------------------------------
# Persisted settings; all are also controllable from Home Assistant.
# ------------------------------------------------------------------
switch:
  - platform: template
    name: "[System] 24h Clock"
    id: time_24h
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: update_clock_labels
    on_turn_off:
      - script.execute: update_clock_labels

  # Disable the 240x240 status LED regardless of brightness or HVAC color.
  - platform: template
    name: "[System] LED Enabled"
    id: led_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: update_status_led
    on_turn_off:
      - script.execute: update_status_led

  # Whether the status LED blinks (in the respective *_blink_led_color_select
  # color) once
  # the Timer/Progress finishes (see check_finish_effects/update_status_led).
  # On by default - a finished timer/progress should be hard to miss.
  - platform: template
    name: "[Timer] Timer LED Blink"
    id: timer_finish_blink_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "[Progress] Progress LED Blink"
    id: progress_finish_blink_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  # Whether the big value label itself also blinks (same phase as the LED)
  # once finished. On by default, independent of the LED blink switch above.
  - platform: template
    name: "[Timer] Timer Value Blink"
    id: timer_value_blink_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "[Progress] Progress Value Blink"
    id: progress_value_blink_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  # Whether finishing auto-switches the display to the respective screen
  # (see check_finish_effects). On by default.
  - platform: template
    name: "[Timer] Timer Show Screen"
    id: timer_show_on_finish_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "[Progress] Progress Show Screen"
    id: progress_show_on_finish_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "[Notify] Notify LED Blink"
    id: notify_finish_blink_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "[Notify] Notify Value Blink"
    id: notify_value_blink_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "[Notify] Notify Show Screen"
    id: notify_show_on_finish_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

select:
  - platform: template
    name: "[System] Language"
    id: language_select
    optimistic: true
    restore_value: true
    options: ["English", "Deutsch"]
    initial_option: "English"
    on_value:
      then:
        - script.execute: refresh_status
        - script.execute: refresh_connection
        - script.execute: update_clock_labels
        - script.execute: update_settings_labels

  - platform: template
    name: "[Thermostat] Temperature Unit"
    id: unit_select
    optimistic: true
    restore_value: true
    options: ["Celsius", "Fahrenheit"]
    initial_option: "Celsius"
    on_value:
      then:
        - script.execute: refresh_temps

  # Rotary encoder sensitivity in Celsius per detent.
  - platform: template
    name: "[Thermostat] Knob Step (°C)"
    id: knob_step_select
    optimistic: true
    restore_value: true
    options: ["0.1", "0.2", "0.5", "1.0"]
    initial_option: "0.5"
    icon: "mdi:rotate-right"

  # Status LED color for the Timer/Progress finish blink, set separately per
  # screen. See BLINK_LED_COLORS in thermostat_helpers.h for the fixed
  # preset list.
  - platform: template
    name: "[Timer] Timer Blink LED Color"
    id: timer_blink_led_color_select
    optimistic: true
    restore_value: true
    options: ["Green", "Red", "Blue", "Yellow", "Orange", "Purple", "Cyan", "Magenta", "White", "Pink"]
    initial_option: "Green"
    icon: "mdi:eyedropper"

  - platform: template
    name: "[Progress] Progress Blink LED Color"
    id: progress_blink_led_color_select
    optimistic: true
    restore_value: true
    options: ["Green", "Red", "Blue", "Yellow", "Orange", "Purple", "Cyan", "Magenta", "White", "Pink"]
    initial_option: "Green"
    icon: "mdi:eyedropper"

  - platform: template
    name: "[Notify] Notify Blink LED Color"
    id: notify_blink_led_color_select
    optimistic: true
    restore_value: true
    options: ["Green", "Red", "Blue", "Yellow", "Orange", "Purple", "Cyan", "Magenta", "White", "Pink"]
    initial_option: "Green"
    icon: "mdi:eyedropper"

number:
  - platform: template
    name: "[System] Idle To Home (s)"
    id: idle_home_num
    optimistic: true
    restore_value: true
    initial_value: 15
    min_value: 5
    max_value: 300
    step: 5
    unit_of_measurement: "s"
    mode: box

  - platform: template
    name: "[System] Dim After (s)"
    id: dim_delay_num
    optimistic: true
    restore_value: true
    initial_value: 30
    min_value: 5
    max_value: 300
    step: 5
    unit_of_measurement: "s"
    mode: box

  - platform: template
    name: "[System] Dim Level (%)"
    id: dim_level_num
    optimistic: true
    restore_value: true
    initial_value: 20
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider

  # Display brightness as a Home Assistant entity, synchronized with the
  # settings screen and the backlight.
  - platform: template
    name: "[System] Brightness (%)"
    id: brightness_num
    optimistic: true
    restore_value: true
    initial_value: 50
    min_value: 5
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    icon: "mdi:brightness-6"
    on_value:
      then:
        - lambda: 'id(brightness_pct) = clamp((int) x, 5, 100);'
        - if:
            condition:
              lambda: 'return !id(display_dimmed);'
            then:
              - light.turn_on:
                  id: display_backlight
                  brightness: !lambda 'return id(brightness_pct) / 100.0f;'
        # Update the settings screen live when it is open.
        - if:
            condition:
              lambda: 'return id(ui_context) == 2 || id(ui_context) == 3 || id(ui_context) == 4;'
            then:
              - script.execute: update_settings_labels

  # Status LED brightness for the 240x240 board. This is separate from display
  # brightness and can be changed from Home Assistant.
  - platform: template
    name: "[System] LED Brightness (%)"
    id: led_brightness_num
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 5
    max_value: 100
    step: 5
