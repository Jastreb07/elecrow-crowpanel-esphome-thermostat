name: Deploy Web Flasher

# Publishes the web-flasher page to GitHub Pages. This workflow never runs
# ESPHome and never uploads firmware binaries: the manifests fetch their
# .bin parts straight from raw.githubusercontent.com, so whatever host
# serves this page (GitHub Pages or elsewhere) only ever needs the page
# itself. Firmware is built locally and pushed to web-flasher/firmware/
# (see build.ps1 and web-flasher/README.md); pushing it to master is what
# makes it fetchable, independent of this deploy.

on:
  push:
    branches: [master]
    paths:
      - "web-flasher/index.html"
      - "web-flasher/manifest_*.json"
      - "web-flasher/CNAME"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage page (without firmware binaries)
        run: |
          mkdir -p dist
          cp web-flasher/index.html web-flasher/manifest_240.json web-flasher/manifest_480.json dist/
          cp web-flasher/CNAME dist/ 2>/dev/null || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
