            long_mode: SCROLL_CIRCULAR
            hidden: true

        - label:
            id: label_home_current_temperature
            text: "38"
            text_font: rajdhani_bold_130
            text_color: 0xFFFFFF
            align: CENTER
            x: -8
            width: 150
            text_align: RIGHT
        - label:
            id: label_home_current_unit
            text: "°C"
            text_font: rajdhani_semibold_46
            text_color: 0xB0B0B0
            align: CENTER
            x: 86
            y: -22
            width: 50
            text_align: LEFT
