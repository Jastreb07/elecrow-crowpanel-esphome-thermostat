# ------------------------------------------------------------------
# Encoder button. on_multi_click keeps single and double clicks separated.
# ------------------------------------------------------------------
binary_sensor:
  - platform: status
    name: "[Standard] ${friendly_name} Status"

  - platform: gpio
    id: encoder_button
    pin:
      pcf8574: pcf
      number: 5
      mode:
        input: true
      inverted: true
    filters:
      - delayed_on_off: 10ms
    on_press:
      - if:
          condition:
            lambda: 'return id(connection_message) == "Smart Knob config not found";'
          then:
            - button.press: restart_btn
      - script.execute: wake_display
      - script.execute: global_hold_back
    on_release:
      # Releasing before 800 ms keeps the press as a normal click.
      - script.stop: global_hold_back
    on_multi_click:
      # Double click keeps the quick jump to the thermostat. A press while the
      # thermostat is already open also selects the other TRV/AC target.
      - timing:
          - ON for at most 350ms
          - OFF for 40ms to 350ms
          - ON for at most 350ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: 'return id(ui_context) == 5;'
              then:
                - script.execute: toggle_active_light
              else:
                - if:
                    condition:
                      lambda: 'return id(ui_context) != 1;'
                    then:
                      - lambda: |-
                          id(climate_index) = 0;
                          id(ui_context) = 1;
                      - script.execute: load_active_climate
                      - lvgl.page.show: screen_thermostat
                    else:
                      - script.execute: toggle_adjust_target
      # Single click: enter/select inside settings. On the thermostat it now
      # switches directly between the TRV and AC/cool target.
      - timing:
          - ON for at most 350ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                lambda: 'return id(ui_context) == 0;'
              then:
                - lambda: |-
                    id(climate_index) = 0;
                    id(ui_context) = 1;
                - script.execute: load_active_climate
                - lvgl.page.show: screen_thermostat
              else:
                - if:
                    condition:
                      lambda: 'return id(ui_context) == 1;'
                    then:
                      - script.execute: toggle_adjust_target
                    else:
                      - if:
                          condition:
                            lambda: 'return id(ui_context) == 5;'
                          then:
                            - script.execute: toggle_active_light
                          else:
                            - if:
                                condition:
                                  lambda: 'return id(ui_context) == 7;'
                                then:
                                  - script.execute: cover_stop
                                else:
                                  - if:
                                      condition:
                                        lambda: 'return id(ui_context) == 8;'
                                      then:
                                        - script.execute: timer_click
                                      else:
                                        - if:
                                            condition:
                                              lambda: 'return id(ui_context) == 6;'
                                            then:
                                              - script.execute: entity_menu_enter
                                            else:
                                            - if:
                                                condition:
                                                  lambda: 'return id(ui_context) == 2;'
                                                then:
                                                  - if:
                                                      condition:
                                                        lambda: 'return id(menu_index) == SETTINGS_GROUP_COUNT;'
                                                      then:
                                                        - script.execute: close_settings
                                                      else:
                                                        - script.execute: group_enter
                                                else:
                                                  - if:
                                                      condition:
                                                        lambda: 'return id(ui_context) == 3;'
                                                      then:
                                                        - if:
                                                            condition:
                                                              lambda: |-
                                                                return id(group_item_index) == settings_group_count(id(menu_index));
                                                            then:
                                                              - lambda: 'id(ui_context) = 2;'
                                                              - script.execute: update_settings_labels
                                                            else:
                                                              - script.execute: menu_enter
                                                      else:
                                                        - script.execute: submenu_apply
# ------------------------------------------------------------------
# Rotary encoder. Pins are swapped to fix rotation direction.
# ------------------------------------------------------------------
sensor:
  - platform: rotary_encoder
    id: temperature_encoder
    pin_a:
      number: GPIO4
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO42
      mode:
        input: true
        pullup: true
    min_value: -100000
    max_value: 100000
    restore_mode: ALWAYS_ZERO
    on_value:
      then:
        - script.execute: wake_display
        - lambda: |-
            // Erstes Event nur als Referenz nehmen: der Encoder kann nach
            // einem Neustart einen alten Zaehlerstand liefern -> sonst
            // entsteht ein Riesen-Delta (Symptom: Sprung auf Max-Temp).
            static bool first_event = true;
            static int32_t last_raw = 0;
            int32_t raw = (int32_t) x;
            if (first_event) {
              first_event = false;
              id(encoder_delta) = 0;
            } else {
              id(encoder_delta) = raw - last_raw;
            }
            last_raw = raw;
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 0;'
            then:
              - lambda: |-
                  id(ui_context) = 1;
                  id(climate_index) = 0;
                  id(encoder_delta) = 0;
              - script.execute: load_active_climate
              - lvgl.page.show: screen_thermostat
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 1;'
            then:
              - lambda: |-
                  float step = strtof(id(knob_step_select).current_option().c_str(), nullptr);
                  if (step <= 0.0f) step = ${temperature_step};
                  float new_temp = id(target_temperature) + (step * id(encoder_delta));
                  if (new_temp < ${temperature_min}) new_temp = ${temperature_min};
                  if (new_temp > ${temperature_max}) new_temp = ${temperature_max};
                  // Dual setpoints must not cross; otherwise TRV and AC fight
                  // each other and better_thermostat may reject the range.
                  if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v))) {
                    if (id(adjust_target) == 0 && new_temp > id(target_high_v) - ${setpoint_min_gap})
                      new_temp = id(target_high_v) - ${setpoint_min_gap};
                    if (id(adjust_target) == 1 && new_temp < id(target_low_v) + ${setpoint_min_gap})
                      new_temp = id(target_low_v) + ${setpoint_min_gap};
                  }
                  id(target_temperature) = new_temp;
                  // Update the selected dual-setpoint cache immediately so
                  // its on-screen arc and knob follow every encoder detent.
                  if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v))) {
                    if (id(adjust_target) == 1) id(target_high_v) = new_temp;
                    else id(target_low_v) = new_temp;
                  }
                  auto &climate = id(ha_climates).get_mutable(id(climate_index));
                  climate.adjust_target = id(adjust_target);
                  climate.target_temperature = new_temp;
                  climate.target_low = id(target_low_v);
                  climate.target_high = id(target_high_v);
                  id(pending_climate_index) = id(climate_index);
                  id(pending_temperature_change) = true;
              - script.execute: refresh_temps
              - script.execute: send_temperature_update
        - if:
            condition:
              lambda: |-
                return id(encoder_delta) != 0 && id(ui_context) == 5 &&
                       id(ha_lights).get(id(light_index)).state == "on";
            then:
              - lambda: |-
                  if (id(ha_lights).ensure_mode(id(light_index)) ==
                      esphome::ha_light_controller::LIGHT_COLOR) {
                    auto &light = id(ha_lights).get_mutable(id(light_index));
                    int current = nearest_color_preset(light.hue);
                    int dir = id(encoder_delta) > 0 ? 1 : -1;
                    int next = ((current + dir) % LIGHT_COLOR_PRESET_COUNT +
                                LIGHT_COLOR_PRESET_COUNT) % LIGHT_COLOR_PRESET_COUNT;
                    light.hue = LIGHT_COLOR_PRESETS[next].hue;
                    light.saturation = LIGHT_COLOR_PRESETS[next].saturation;
                  } else {
                    id(ha_lights).adjust(id(light_index), id(encoder_delta));
                  }
                  id(pending_light_change) = true;
              - script.execute: refresh_light
              - script.execute: send_light_update
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 7;'
            then:
              - lambda: |-
                  id(ha_covers).adjust(id(cover_index), id(encoder_delta));
                  id(pending_cover_change) = true;
                  id(pending_cover_index) = id(cover_index);
              - script.execute: refresh_cover
              - script.execute: send_cover_update
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 8;'
            then:
              # Turning the knob moves the end time by one knob-step per
              # detent - from "now" if no timer is set yet (manually
              # starting one), or from the current remaining time if one is
              # already counting down (extend/shorten it). Writing through
              # timer_end_time_txt reuses its existing on_value handler
              # (resets start_epoch/finished/blink and refreshes the screen).
              - lambda: |-
                  auto now = id(ha_time).now();
                  if (!now.is_valid()) return;
                  long remaining = timer_remaining_seconds(id(timer_end_time_txt).state, now);
                  long base = remaining > 0 ? remaining : 0;
                  int step = (int) id(timer_knob_step_num).state;
                  int d = id(encoder_delta) > 0 ? 1 : -1;
                  long new_remaining = base + (long) d * step;
                  if (new_remaining < 0) new_remaining = 0;
                  long now_secs = civil_seconds(now.year, now.month, now.day_of_month,
                                                 now.hour, now.minute, now.second);
                  id(timer_edit_value) = format_civil_datetime(now_secs + new_remaining);
              - text.set:
                  id: timer_end_time_txt
                  value: !lambda 'return id(timer_edit_value);'
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 2;'
            then:
              - lambda: |-
                  id(menu_index) = menu_scroll_index(id(menu_index), id(encoder_delta), SETTINGS_ROOT_COUNT);
              - script.execute: update_settings_labels
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 6;'
            then:
              - lambda: |-
                  int timer_count = 1;  // Timer is always listed, running or not.
                  int progress_count = progress_is_running(id(progress_value_num).state) ? 1 : 0;
                  int notify_count = id(notify_finished) ? 1 : 0;
                  int count = (int) id(ha_climates).size() + (int) id(ha_lights).size() +
                              (int) id(ha_covers).size() + timer_count + progress_count + notify_count + 2;
                  id(entity_menu_index) = menu_scroll_index(id(entity_menu_index), id(encoder_delta), count);
              - script.execute: update_settings_labels
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 3;'
            then:
              - lambda: |-
                  int count = settings_group_entry_count(id(menu_index));
                  id(group_item_index) = menu_scroll_index(id(group_item_index), id(encoder_delta), count);
              - script.execute: update_settings_labels
        - if:
            condition:
              lambda: 'return id(encoder_delta) != 0 && id(ui_context) == 4;'
            then:
              - lambda: |-
                  int d = id(encoder_delta) > 0 ? 1 : -1;
                  switch (id(submenu_type)) {
                    case 0:
                    case 1:
                    case 13:
                    case 25:
                    case 28:
                    case 33:
                      id(submenu_index) = menu_scroll_index(id(submenu_index), id(encoder_delta), id(submenu_count));
                      break;
                    case 2:
                      id(brightness_pct) = clamp(id(brightness_pct) + d * 5, 5, 100);
                      break;
                    case 3: case 4: case 7:
                    case 16: case 17:
                    case 19: case 21:
                    case 23: case 24: case 26: case 27:
                    case 32: case 35: case 36:
                      id(submenu_index) = 1 - id(submenu_index);
                      break;
                    case 8:
                    case 9:
                      id(num_preview) = clamp(id(num_preview) + d * 5, 5, 300);
                      break;
                    case 10:
                    case 18:
                    case 29:
                    case 30:
                    case 34:
                      id(num_preview) = clamp(id(num_preview) + d * 5, 0, 100);
                      break;
                    case 11:
                    case 20:
                    case 31:
                      // 0 = "never auto-home", unlike Idle Time/Dim After
                      // which always stay at least 5s.
                      id(num_preview) = clamp(id(num_preview) + d * 5, 0, 300);
                      break;
                    case 22:
                      id(num_preview) = clamp(id(num_preview) + d * 5, 5, 60);
                      break;
                    default:
                      break;
                  }
              - if:
                  condition:
                    lambda: 'return id(submenu_type) == 2;'
                  then:
                    - light.turn_on:
                        id: display_backlight
                        brightness: !lambda 'return id(brightness_pct) / 100.0f;'
              - if:
                  condition:
                    lambda: 'return id(submenu_type) == 18;'
                  then:
                    - script.execute: preview_led_brightness
              - script.execute: update_settings_labels

  - platform: wifi_signal
    id: wifi_rssi
    name: "[System] ${friendly_name} WiFi Signal"
    update_interval: 60s

# ------------------------------------------------------------------
# HVAC state, mode/preset lists, and active preset.
# ------------------------------------------------------------------
text_sensor:
  - platform: version
    id: fw_version
    name: "[System] ${friendly_name} Firmware"

  - platform: wifi_info
    ip_address:
      id: wifi_ip_txt
      name: "[System] ${friendly_name} IP"
    ssid:
      id: wifi_ssid_txt
      name: "[System] ${friendly_name} SSID"

# The Home Assistant config entity can be changed without recompiling. The
# template text component persists the selected entity ID in ESP flash and
# publishes it as a normal configurable Home Assistant entity.
text:
  - platform: template
    name: "[Standard] Home Assistant Config Entity"
    id: ha_config_entity
    icon: "mdi:database-cog-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: ${ha_config_entity_id}
    min_length: 3
    max_length: 100
    pattern: "[a-z0-9_]+\\.[a-z0-9_]+"
    mode: text
    on_value:
      then:
        - lambda: |-
            id(ha_climates).set_config_entity_id(x);
            id(ha_lights).set_config_entity_id(x);
            id(ha_covers).set_config_entity_id(x);
            id(climate_index) = 0;
            id(light_index) = 0;
            id(cover_index) = 0;
        - script.execute: refresh_connection

  # Timer/Progress: plain local entities, set from Home Assistant like any
  # other ESPHome text/number/button, no JSON config list involved. Start
  # time is never configured - it's captured as "now" whenever a new end
  # time is written, purely to compute the timer arc's fill fraction.
  - platform: template
    name: "[Timer] Timer End Time"
    id: timer_end_time_txt
    icon: "mdi:timer-outline"
    optimistic: true
    restore_value: true
    initial_value: ""
    max_length: 32
    mode: text
    on_value:
      then:
        - lambda: |-
            id(timer_start_epoch) = id(ha_time).now().timestamp;
            id(timer_finished) = false;
            id(blink_led_on) = false;
        - script.execute: refresh_timer

  - platform: template
    name: "[Timer] Timer Title"
    id: timer_title_txt
    icon: "mdi:format-title"
    optimistic: true
    restore_value: true
    initial_value: "Timer"
    max_length: 32
    mode: text
    on_value:
      then:
        - script.execute: refresh_timer

  - platform: template
    name: "[Progress] Progress Title"
    id: progress_title_txt
    icon: "mdi:format-title"
    optimistic: true
    restore_value: true
    initial_value: "Progress"
    max_length: 32
    mode: text
    on_value:
      then:
        - script.execute: refresh_progress

  # Notify: a one-shot message from Home Assistant, not a persisted default
  # label like Timer/Progress Title - cleared on boot, and self-clears once
  # dismissed (see check_finish_effects).
  - platform: template
    name: "[Notify] Notify Title"
    id: notify_title_txt
    icon: "mdi:bell-outline"
    optimistic: true
    restore_value: false
    initial_value: ""
    max_length: 32
    mode: text
    on_value:
      then:
        - script.execute: refresh_notify

  - platform: template
    name: "[Notify] Notify Subtext"
    id: notify_subtext_txt
    icon: "mdi:bell-outline"
    optimistic: true
    restore_value: false
    initial_value: ""
    max_length: 64
    mode: text
    on_value:
      then:
        - script.execute: refresh_notify

# ------------------------------------------------------------------
# Scripts
# ------------------------------------------------------------------
script:
  # After API connect, force-copy Home Assistant states into globals. This
  # covers cases where individual on_value automations do not fire during init.
  - id: sync_ha_states
    mode: restart
    then:
      - delay: 2s
      - script.execute: load_active_climate
      - script.execute: refresh_connection

  # Copy the selected array entry into the existing UI cache. User changes
  # are kept in the component until Home Assistant confirms the new state.
  - id: load_active_climate
    mode: restart
    then:
      - lambda: |-
          if (id(ha_climates).empty()) {
            id(current_hvac_raw) = "unknown";
            id(last_hvac_mode).clear();
            id(current_action_raw).clear();
            id(hvac_modes_raw).clear();
            id(preset_modes_raw).clear();
            id(current_preset_raw).clear();
            id(pending_current_temperature) = NAN;
            id(pending_humidity) = NAN;
            id(target_low_v) = NAN;
            id(target_high_v) = NAN;
            id(pending_temperature_change) = false;
            return;
          }
          id(climate_index) = clamp(id(climate_index), 0, (int) id(ha_climates).size() - 1);
          auto &climate = id(ha_climates).get_mutable(id(climate_index));
          id(current_hvac_raw) = climate.state;
          id(last_hvac_mode) = climate.last_hvac_mode;
          id(current_action_raw) = climate.hvac_action;
          id(hvac_modes_raw) = climate.hvac_modes;
          id(preset_modes_raw) = climate.preset_modes;
          id(current_preset_raw) = climate.preset_mode;
          if (!std::isnan(climate.current_temperature))
            id(pending_current_temperature) = climate.current_temperature;
          id(pending_humidity) = climate.humidity;
          if (!id(pending_temperature_change) || id(pending_climate_index) != id(climate_index)) {
            id(adjust_target) = climate.adjust_target;
            id(target_low_v) = climate.target_low;
            id(target_high_v) = climate.target_high;
            if (!std::isnan(climate.target_low) && id(adjust_target) == 0)
              id(target_temperature) = climate.target_low;
            else if (!std::isnan(climate.target_high) && id(adjust_target) == 1)
              id(target_temperature) = climate.target_high;
            else if (!std::isnan(climate.target_temperature))
              id(target_temperature) = climate.target_temperature;
          }
      - lvgl.label.update:
          id: label_climate_name
          text: !lambda |-
            const std::string name = id(ha_climates).empty() ? std::string() :
                                     id(ha_climates).get(id(climate_index)).name;
            return ha_text_or_placeholder(id(connection_ready), name, 10);
      - lvgl.label.update:
          id: label_climate_page
          text: !lambda |-
            if (!id(connection_ready))
              return ha_text_or_placeholder(false, std::string(), 5);
            if (id(ha_climates).empty()) return std::string("0 / 0");
            char page[20];
            snprintf(page, sizeof(page), "%d / %d", id(climate_index) + 1,
                     (int) id(ha_climates).size());
            return std::string(page);
      - lambda: |-
          lv_label_set_long_mode(id(label_climate_name), LV_LABEL_LONG_MODE_SCROLL_CIRCULAR);
          lv_obj_update_layout(id(label_climate_name));
      - script.execute: refresh_temps
      - script.execute: refresh_status
      - script.execute: refresh_connection

  - id: send_temperature_update
    mode: restart
    then:
      - delay: ${debounce_ms}
      - script.execute: apply_temperature_update

  - id: apply_temperature_update
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(pending_temperature_change);'
          then:
            - if:
                condition:
                  lambda: |-
                    const auto &climate = id(ha_climates).get(id(pending_climate_index));
                    return !std::isnan(climate.target_low) && !std::isnan(climate.target_high);
                then:
                  # Dual setpoint: update only the active target and clamp it
                  # against the other target so the range never crosses.
                  - lambda: |-
                      auto &climate = id(ha_climates).get_mutable(id(pending_climate_index));
                      if (climate.adjust_target == 1) {
                        if (climate.target_high < climate.target_low + ${setpoint_min_gap})
                          climate.target_high = climate.target_low + ${setpoint_min_gap};
                      } else {
                        if (climate.target_low > climate.target_high - ${setpoint_min_gap})
                          climate.target_low = climate.target_high - ${setpoint_min_gap};
                      }
                  - homeassistant.service:
                      service: climate.set_temperature
                      data:
                        entity_id: !lambda 'return id(ha_climates).get(id(pending_climate_index)).entity_id;'
                        target_temp_low: !lambda |-
                          char buf[16];
                          snprintf(buf, sizeof(buf), "%.1f", id(ha_climates).get(id(pending_climate_index)).target_low);
                          return std::string(buf);
                        target_temp_high: !lambda |-
                          char buf[16];
                          snprintf(buf, sizeof(buf), "%.1f", id(ha_climates).get(id(pending_climate_index)).target_high);
                          return std::string(buf);
                else:
                  - homeassistant.service:
                      service: climate.set_temperature
                      data:
                        entity_id: !lambda 'return id(ha_climates).get(id(pending_climate_index)).entity_id;'
                        temperature: !lambda |-
                          char buf[16];
                          snprintf(buf, sizeof(buf), "%.1f", id(ha_climates).get(id(pending_climate_index)).target_temperature);
                          return std::string(buf);
            - lambda: 'id(pending_temperature_change) = false;'

  - id: wake_display
    then:
      # Reset LVGL idle timers. Encoder/button input is not an LVGL input
      # device, so dim and idle timers would otherwise ignore knob activity.
      - lambda: 'lv_disp_trig_activity(nullptr);'
      - if:
          condition:
            lambda: 'return id(display_dimmed);'
          then:
            - lambda: 'id(display_dimmed) = false;'
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(brightness_pct) / 100.0f;'
            - script.execute: update_status_led

  # A short press on a light now toggles it directly. Mode changes are handled
  # exclusively by vertical swipe gestures.
  - id: toggle_active_light
    then:
      - if:
          condition:
            lambda: |-
              return id(ui_context) == 5 && id(light_index) >= 0 &&
                     id(light_index) < (int) id(ha_lights).size();
          then:
            - homeassistant.action:
                action: light.toggle
                data:
                  entity_id: !lambda 'return id(ha_lights).get(id(light_index)).entity_id;'

  # Holding the knob for 800 ms is the same Back action in every screen.
  - id: global_hold_back
    mode: restart
    then:
      - delay: 800ms
      - if:
          condition:
            lambda: 'return id(encoder_button).state;'
          then:
            - if:
                condition:
                  lambda: 'return id(thermostat_quick_stage) != 0;'
                then:
                  - lambda: |-
                      id(thermostat_quick_stage) = 0;
                      id(ui_context) = 1;
                  - script.execute: load_active_climate
                  - lvgl.page.show: screen_thermostat
                else:
                  - if:
                      condition:
                        lambda: 'return id(ui_context) == 4;'
                      then:
                        - lambda: 'id(ui_context) = 3;'
                        - script.execute: update_settings_labels
                      else:
                        - if:
                            condition:
                              lambda: 'return id(ui_context) == 3;'
                            then:
                              - lambda: 'id(ui_context) = 2;'
                              - script.execute: update_settings_labels
                            else:
                              - if:
                                  condition:
                                    lambda: 'return id(ui_context) == 2;'
                                  then:
                                    - script.execute: close_settings
                                  else:
                                    - if:
                                        condition:
                                          lambda: 'return id(ui_context) == 6;'
                                        then:
                                          - script.execute: close_entity_overview
                                        else:
                                          - if:
                                              condition:
                                                lambda: 'return id(ui_context) == 5;'
                                              then:
                                                - lambda: 'id(ui_context) = 1;'
                                                - script.execute: load_active_climate
                                                - lvgl.page.show: screen_thermostat
                                              else:
                                                - if:
                                                    condition:
                                                      lambda: |-
                                                        return id(ui_context) == 7 ||
                                                               id(ui_context) == 8 ||
                                                               id(ui_context) == 9 ||
                                                               id(ui_context) == 10;
                                                    then:
                                                      - lambda: 'id(ui_context) = 1;'
                                                      - script.execute: load_active_climate
                                                      - lvgl.page.show: screen_thermostat
                                                    else:
                                                      - if:
                                                          condition:
                                                            lambda: 'return id(ui_context) == 1;'
                                                          then:
                                                            - lambda: 'id(ui_context) = 0;'
                                                            - lvgl.page.show: screen_home

  # Target for the native LVGL swipe handlers on the settings page.
  - id: show_active_light_screen
    then:
      - if:
          condition:
            lambda: |-
              return id(ha_lights).ensure_mode(id(light_index)) ==
                     esphome::ha_light_controller::LIGHT_TEMPERATURE;
          then:
            - lvgl.page.show:
                id: screen_light_temperature
                animation: NONE
          else:
            - if:
                condition:
                  lambda: |-
                    return id(ha_lights).ensure_mode(id(light_index)) ==
                           esphome::ha_light_controller::LIGHT_COLOR;
                then:
                  - lvgl.page.show:
                      id: screen_light_color
                      animation: NONE
                else:
                  - lvgl.page.show:
                      id: screen_light_brightness
                      animation: NONE

  # Returns to whichever real screen open_settings/open_entity_overview
  # remembered (entity_return_kind/entity_return_index), i.e. the screen
  # that was actually open before entering screen_navigation.
  - id: close_settings
    then:
      - script.execute: wake_display
      - lambda: 'id(thermostat_quick_stage) = 0;'
      - script.execute: close_entity_overview

  # Move forward through configured thermostats. After the final thermostat,
  # continue with the first light or settings.
  - id: thermostat_next
    then:
      - script.execute: wake_display
      - if:
          condition:
            lambda: 'return id(pending_temperature_change);'
          then:
            - script.stop: send_temperature_update
            - script.execute: apply_temperature_update
      - if:
          condition:
            lambda: 'return id(climate_index) + 1 < (int) id(ha_climates).size();'
          then:
            - lambda: 'id(climate_index)++;'
            - script.execute: load_active_climate
          else:
            - script.execute: open_first_light_or_settings

  # Home is intentionally excluded from swipe navigation, so the first
  # thermostat has no previous page.
  - id: thermostat_previous
    then:
      - script.execute: wake_display
      - if:
          condition:
            lambda: 'return id(pending_temperature_change);'
          then:
            - script.stop: send_temperature_update
            - script.execute: apply_temperature_update
      - if:
          condition:
            lambda: 'return id(climate_index) > 0;'
          then:
            - lambda: 'id(climate_index)--;'
            - script.execute: load_active_climate

  # Final thermostat -> first configured light, or directly to settings when
  # the light list is empty.
  - id: open_first_light_or_settings
    then:
      - script.execute: wake_display
      - if:
          condition:
            lambda: 'return !id(ha_lights).empty();'
          then:
            - lambda: |-
                id(light_index) = 0;
                id(ui_context) = 5;
            - script.execute: refresh_light
            - script.execute: show_active_light_screen
          else:
            - script.execute: open_settings

  # Move forward through logical light pages; the final light leads to the
  # grouped settings page.
  - id: light_next
    then:
      - script.execute: wake_display
      - if:
          condition:
            lambda: 'return id(light_index) + 1 < (int) id(ha_lights).size();'
          then:
            - lambda: 'id(light_index)++;'
            - script.execute: refresh_light
            - script.execute: show_active_light_screen
          else:
            - script.execute: open_settings

  # Move backward through light pages; the first light leads to thermostat.
  - id: light_previous
    then:
      - script.execute: wake_display
      - if:
          condition:
            lambda: 'return id(light_index) > 0;'
          then:
            - lambda: 'id(light_index)--;'
            - script.execute: refresh_light
            - script.execute: show_active_light_screen
          else:
            - lambda: |-
                id(climate_index) = (int) id(ha_climates).size() - 1;
                id(ui_context) = 1;
            - script.execute: load_active_climate
            - lvgl.page.show:
                id: screen_thermostat

  # direction > 0 moves to the next light screen, direction < 0 to the
  # previous one; both wrap around (see swipe_step_vertical/horizontal).
  - id: cycle_light_mode
    parameters:
      direction: int
    then:
      - script.stop: send_light_update
      - lambda: 'id(pending_light_change) = false;'
      - lambda: 'id(ha_lights).cycle_mode(id(light_index), direction);'
      - script.execute: refresh_light
      - script.execute: show_active_light_screen

  # Shared overview on screen_navigation. It lists every configured climate and
  # light, followed by Settings and Back. Pressing an entity opens it directly.
  - id: open_entity_overview
    then:
      - script.execute: wake_display
      - lambda: |-
          if (id(ui_context) == 1) {
            id(entity_return_kind) = 1;
            id(entity_return_index) = id(climate_index);
            id(entity_menu_index) = id(climate_index);
          } else if (id(ui_context) == 5) {
            id(entity_return_kind) = 2;
            id(entity_return_index) = id(light_index);
            id(entity_menu_index) = (int) id(ha_climates).size() + id(light_index);
          } else if (id(ui_context) == 7) {
            id(entity_return_kind) = 3;
            id(entity_return_index) = id(cover_index);
            id(entity_menu_index) =
                (int) id(ha_climates).size() + (int) id(ha_lights).size() + id(cover_index);
          } else if (id(ui_context) == 8) {
            id(entity_return_kind) = 4;
            id(entity_menu_index) =
                (int) id(ha_climates).size() + (int) id(ha_lights).size() + (int) id(ha_covers).size();
          } else if (id(ui_context) == 9) {
            id(entity_return_kind) = 5;
            id(entity_menu_index) = (int) id(ha_climates).size() + (int) id(ha_lights).size() +
                                     (int) id(ha_covers).size() + 1;  // + Timer (always listed)
          } else if (id(ui_context) == 10) {
            id(entity_return_kind) = 6;
            id(entity_menu_index) = (int) id(ha_climates).size() + (int) id(ha_lights).size() +
                                     (int) id(ha_covers).size() + 1 +
                                     (progress_is_running(id(progress_value_num).state) ? 1 : 0);
          }
          id(thermostat_quick_stage) = 0;
          id(ui_context) = 6;
      - script.execute: update_settings_labels
      - lvgl.page.show:
          id: screen_navigation
          animation: NONE

  - id: close_entity_overview
    then:
      - if:
          condition:
            lambda: 'return id(entity_return_kind) == 2 && !id(ha_lights).empty();'
          then:
            - lambda: |-
                id(light_index) = clamp(id(entity_return_index), 0, (int) id(ha_lights).size() - 1);
                id(ui_context) = 5;
            - script.execute: refresh_light
            - script.execute: show_active_light_screen
          else:
            - if:
                condition:
                  lambda: 'return id(entity_return_kind) == 3 && !id(ha_covers).empty();'
                then:
                  - lambda: |-
                      id(cover_index) = clamp(id(entity_return_index), 0, (int) id(ha_covers).size() - 1);
                      id(ui_context) = 7;
                  - script.execute: refresh_cover
                  - lvgl.page.show:
                      id: screen_cover
                      animation: NONE
                else:
                  - if:
                      condition:
                        lambda: 'return id(entity_return_kind) == 4;'
                      then:
                        - lambda: |-
                            id(ui_context) = 8;
                            // Re-viewing an already-finished timer should not
                            // instantly trigger auto-home from a stale
                            // finished_at_ms - treat arriving on screen as the
                            // start of the auto-home delay.
                            if (id(timer_finished)) id(timer_finished_at_ms) = millis();
                        - script.execute: refresh_timer
                        - lvgl.page.show:
                            id: screen_timer
                            animation: NONE
                      else:
                        - if:
                            condition:
                              lambda: 'return id(entity_return_kind) == 5;'
                            then:
                              - lambda: |-
                                  id(ui_context) = 9;
                                  if (id(progress_finished)) id(progress_finished_at_ms) = millis();
                              - script.execute: refresh_progress
                              - lvgl.page.show:
                                  id: screen_progress
                                  animation: NONE
                            else:
                              - if:
                                  condition:
                                    lambda: 'return id(entity_return_kind) == 6;'
                                  then:
                                    - lambda: |-
                                        id(ui_context) = 10;
                                        if (id(notify_finished)) id(notify_finished_at_ms) = millis();
                                    - script.execute: refresh_notify
                                    - lvgl.page.show:
                                        id: screen_notify
                                        animation: NONE
                                  else:
                                    - lambda: |-
                                        id(climate_index) = clamp(id(entity_return_index), 0, (int) id(ha_climates).size() - 1);
                                        id(ui_context) = 1;
                                    - script.execute: load_active_climate
                                    - lvgl.page.show:
                                        id: screen_thermostat
                                        animation: NONE

  - id: settings_swipe_back
    then:
      - if:
          condition:
            lambda: 'return id(thermostat_quick_stage) != 0;'
          then:
            - lambda: |-
                id(thermostat_quick_stage) = 0;
                id(ui_context) = 1;
            - script.execute: load_active_climate
            - lvgl.page.show:
                id: screen_thermostat
                animation: NONE
          else:
            - if:
                condition:
                  lambda: 'return id(ui_context) == 6;'
                then:
                  - script.execute: close_entity_overview
                else:
                  - script.execute: close_settings

  - id: entity_menu_enter
    then:
      - lambda: |-
          int climates = (int) id(ha_climates).size();
          int lights = (int) id(ha_lights).size();
          int covers = (int) id(ha_covers).size();
          int timer_count = 1;  // Timer is always listed, running or not.
          int progress_count = progress_is_running(id(progress_value_num).state) ? 1 : 0;
          int notify_count = id(notify_finished) ? 1 : 0;
          int total = climates + lights + covers + timer_count + progress_count + notify_count + 2;
          id(entity_menu_index) = ((id(entity_menu_index) % total) + total) % total;
      - if:
          condition:
            lambda: 'return id(entity_menu_index) < (int) id(ha_climates).size();'
          then:
            - lambda: |-
                id(climate_index) = id(entity_menu_index);
                id(ui_context) = 1;
            - script.execute: load_active_climate
            - lvgl.page.show: screen_thermostat
          else:
            - if:
                condition:
                  lambda: |-
                    int i = id(entity_menu_index) - (int) id(ha_climates).size();
                    return i >= 0 && i < (int) id(ha_lights).size();
                then:
                  - lambda: |-
                      id(light_index) = id(entity_menu_index) - (int) id(ha_climates).size();
                      id(ui_context) = 5;
                  - script.execute: refresh_light
                  - script.execute: show_active_light_screen
                else:
                  - if:
                      condition:
                        lambda: |-
                          int i = id(entity_menu_index) -
                                  (int) id(ha_climates).size() - (int) id(ha_lights).size();
                          return i >= 0 && i < (int) id(ha_covers).size();
                      then:
                        - lambda: |-
                            id(cover_index) = id(entity_menu_index) -
                                (int) id(ha_climates).size() - (int) id(ha_lights).size();
                            id(ui_context) = 7;
                        - script.execute: refresh_cover
                        - lvgl.page.show: screen_cover
                      else:
                        - if:
                            condition:
                              lambda: |-
                                return id(entity_menu_index) == (int) id(ha_climates).size() +
                                    (int) id(ha_lights).size() + (int) id(ha_covers).size();
                            then:
                              - lambda: |-
                                  id(ui_context) = 8;
                                  if (id(timer_finished)) id(timer_finished_at_ms) = millis();
                              - script.execute: refresh_timer
                              - lvgl.page.show: screen_timer
                            else:
                              - if:
                                  condition:
                                    lambda: |-
                                      bool progress_running =
                                          progress_is_running(id(progress_value_num).state);
                                      return progress_running &&
                                             id(entity_menu_index) == (int) id(ha_climates).size() +
                                                 (int) id(ha_lights).size() +
                                                 (int) id(ha_covers).size() + 1;
                                  then:
                                    - lambda: |-
                                        id(ui_context) = 9;
                                        if (id(progress_finished)) id(progress_finished_at_ms) = millis();
                                    - script.execute: refresh_progress
                                    - lvgl.page.show: screen_progress
                                  else:
                                    - if:
                                        condition:
                                          lambda: |-
                                            int progress_count =
                                                progress_is_running(id(progress_value_num).state) ? 1 : 0;
                                            return id(notify_finished) &&
                                                   id(entity_menu_index) == (int) id(ha_climates).size() +
                                                       (int) id(ha_lights).size() + (int) id(ha_covers).size() +
                                                       1 + progress_count;
                                        then:
                                          - lambda: |-
                                              id(ui_context) = 10;
                                              if (id(notify_finished)) id(notify_finished_at_ms) = millis();
                                          - script.execute: refresh_notify
                                          - lvgl.page.show: screen_notify
                                        else:
                                          - if:
                                              condition:
                                                lambda: |-
                                                  int progress_count =
                                                      progress_is_running(id(progress_value_num).state) ? 1 : 0;
                                                  int notify_count = id(notify_finished) ? 1 : 0;
                                                  return id(entity_menu_index) == (int) id(ha_climates).size() +
                                                      (int) id(ha_lights).size() + (int) id(ha_covers).size() +
                                                      1 + progress_count + notify_count;
                                              then:
                                                - script.execute: open_settings
                                              else:
                                                - script.execute: close_entity_overview

  # First vertical thermostat swipe opens HVAC. The following vertical swipe
  # changes the same quick selector to presets without creating another page.
  - id: open_thermostat_quick
    then:
      - script.execute: wake_display
      - lambda: |-
          auto page_obj = [](esphome::lvgl::LvPageType *page) { return page->obj; };
          lv_obj_t *target = page_obj(screen_navigation);
          lv_obj_t *widgets[] = {
              id(label_settings_title), id(label_menu_icon_prev2), id(label_menu_icon_prev),
              id(label_menu_icon), id(label_menu_icon_next), id(label_menu_icon_next2),
              id(label_menu_prev2), id(label_menu_prev), id(label_menu_current),
              id(label_menu_next), id(label_menu_next2), id(label_menu_value)};
          for (lv_obj_t *widget : widgets)
            if (lv_obj_get_parent(widget) != target) lv_obj_set_parent(widget, target);
          id(thermostat_quick_stage) = 1;
          id(submenu_type) = 0;
          id(submenu_index) = 0;
          auto vec = ha_filter_modes(id(hvac_modes_raw));
          id(submenu_count) = (int) vec.size();
          for (size_t i = 0; i < vec.size(); i++)
            if (vec[i] == id(current_hvac_raw)) { id(submenu_index) = (int) i; break; }
          id(ui_context) = 4;
      - script.execute: update_settings_labels
      - lvgl.page.show:
          id: screen_navigation
          animation: NONE

  - id: cycle_thermostat_quick
    then:
      - if:
          condition:
            lambda: 'return id(thermostat_quick_stage) != 0;'
          then:
            - if:
                condition:
                  lambda: 'return id(thermostat_quick_stage) == 2;'
                then:
                  - lambda: |-
                      id(thermostat_quick_stage) = 0;
                      id(ui_context) = 1;
                  - script.execute: load_active_climate
                  - lvgl.page.show:
                      id: screen_thermostat
                      animation: NONE
                else:
                  - lambda: |-
                      id(thermostat_quick_stage) = 2;
                      id(submenu_type) = 1;
                      id(submenu_index) = 0;
                      auto vec = ha_filter_presets(id(preset_modes_raw));
                      id(submenu_count) = (int) vec.size();
                      for (size_t i = 0; i < vec.size(); i++)
                        if (vec[i] == id(current_preset_raw)) { id(submenu_index) = (int) i; break; }
                  - script.execute: update_settings_labels

  - id: send_light_update
    mode: restart
    then:
      # All light value modes use the same debounce. Because this script uses
      # mode: restart, every encoder detent restarts the delay.
      - delay: 500ms
      - if:
          condition:
            lambda: |-
              return id(pending_light_change) && id(ui_context) == 5 &&
                     id(ha_lights).get(id(light_index)).state == "on";
          then:
            - if:
                condition:
                  lambda: |-
                    return id(ha_lights).ensure_mode(id(light_index)) ==
                           esphome::ha_light_controller::LIGHT_BRIGHTNESS;
                then:
                  - homeassistant.action:
                      action: light.turn_on
                      data:
                        entity_id: !lambda 'return id(ha_lights).get(id(light_index)).entity_id;'
                        brightness_pct: !lambda |-
                          return to_string((int) roundf(id(ha_lights).get(id(light_index)).brightness));
                else:
                  - if:
                      condition:
                        lambda: |-
                          return id(ha_lights).ensure_mode(id(light_index)) ==
                                 esphome::ha_light_controller::LIGHT_TEMPERATURE;
                      then:
                        - homeassistant.action:
                            action: light.turn_on
                            data:
                              entity_id: !lambda 'return id(ha_lights).get(id(light_index)).entity_id;'
                              color_temp_kelvin: !lambda |-
                                return to_string((int) roundf(id(ha_lights).get(id(light_index)).color_temp_kelvin));
                      else:
                        - homeassistant.action:
                            action: light.turn_on
                            data:
                              entity_id: !lambda 'return id(ha_lights).get(id(light_index)).entity_id;'
                            data_template:
                              hs_color: "{{ [hue, saturation] }}"
                            variables:
                              hue: !lambda 'return id(ha_lights).get(id(light_index)).hue;'
                              # The color knob always represents the full
                              # color, independent of the previous Kelvin mode.
                              saturation: !lambda 'return 100.0f;'
            - lambda: 'id(pending_light_change) = false;'

  - id: refresh_light
    then:
      - lvgl.label.update:
          id: label_light_name
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          id(ha_lights).get(id(light_index)).name, 10);
      - lambda: |-
          // The name can be updated while the shared light page is hidden.
          // Restart LVGL's circular mode after every update so it recalculates
          // the rendered text width. LVGL only starts the animation when that
          // width is larger than the board-specific label width.
          lv_label_set_long_mode(id(label_light_name), LV_LABEL_LONG_MODE_SCROLL_CIRCULAR);
          lv_obj_update_layout(id(label_light_name));
      - lvgl.label.update:
          id: label_light_mode
          text: !lambda |-
            int mode = id(ha_lights).ensure_mode(id(light_index));
            std::string text = "Helligkeit";
            if (mode == esphome::ha_light_controller::LIGHT_TEMPERATURE) text = "Kelvin";
            else if (mode == esphome::ha_light_controller::LIGHT_COLOR) text = "Farbe";
            return ha_text_or_placeholder(id(connection_ready), text, 8);
      - lvgl.label.update:
          id: label_light_value
          text: !lambda |-
            if (!id(connection_ready))
              return ha_text_or_placeholder(false, std::string(), 3);
            const auto &light = id(ha_lights).get(id(light_index));
            if (light.state != "on") return std::string("OFF");
            int mode = id(ha_lights).ensure_mode(id(light_index));
            char value[20];
            if (mode == esphome::ha_light_controller::LIGHT_TEMPERATURE)
              snprintf(value, sizeof(value), "%.0fK", light.color_temp_kelvin);
            else if (mode == esphome::ha_light_controller::LIGHT_COLOR)
              snprintf(value, sizeof(value), "%.0f°", light.hue);
            else
              snprintf(value, sizeof(value), "%.0f%%", light.brightness);
            return std::string(value);
      # Each light page has its own static icon glyph (see thermostat_240/480
      # .yaml); only its on/off tint needs a runtime update.
      - lambda: |-
          int mode = id(ha_lights).ensure_mode(id(light_index));
          lv_obj_t *mode_icons[3] = {id(label_light_icon_brightness),
                                      id(label_light_icon_temperature),
                                      id(label_light_icon_color)};
          lv_color_t icon_color = id(ha_lights).get(id(light_index)).state == "on"
                                       ? lv_color_hex(0xE8E8E8)
                                       : lv_color_hex(0x555555);
          lv_obj_set_style_text_color(mode_icons[mode], icon_color, LV_PART_MAIN);
      - lvgl.label.update:
          id: label_light_state
          text: !lambda |-
            if (!id(connection_ready))
              return ha_text_or_placeholder(false, std::string(), 4);
            const auto &state = id(ha_lights).get(id(light_index)).state;
            if (state == "on") return std::string("On");
            if (state == "off") return std::string("Off");
            if (state == "unavailable") return std::string("Unavailable");
            return std::string("Loading...");
      - lvgl.label.update:
          id: label_light_page
          text: !lambda |-
            if (!id(connection_ready))
              return ha_text_or_placeholder(false, std::string(), 5);
            char page[20];
            snprintf(page, sizeof(page), "%d / %d", id(light_index) + 1, (int) id(ha_lights).size());
            return std::string(page);
      - lambda: |-
          // Brightness uses a tick scale, Kelvin a warm/cold pill and color a
          // handful of fixed presets (see LIGHT_COLOR_PRESETS).
          int mode = id(ha_lights).ensure_mode(id(light_index));
          auto page_obj = [](esphome::lvgl::LvPageType *page) { return page->obj; };
          lv_obj_t *target_page = mode == esphome::ha_light_controller::LIGHT_TEMPERATURE
              ? page_obj(screen_light_temperature)
              : mode == esphome::ha_light_controller::LIGHT_COLOR
                    ? page_obj(screen_light_color)
                    : page_obj(screen_light_brightness);
          lv_obj_t *shared_widgets[] = {
              id(light_brightness_scale), id(label_light_brightness_ticks),
              id(light_kelvin_scale), id(light_slider_knob), id(label_light_name),
              id(label_light_mode), id(label_light_value),
              id(label_light_state), id(label_light_page), id(light_mode_dot_0),
              id(light_mode_dot_1), id(light_mode_dot_2)};
          for (lv_obj_t *widget : shared_widgets)
            if (lv_obj_get_parent(widget) != target_page) lv_obj_set_parent(widget, target_page);

          const auto &light = id(ha_lights).get(id(light_index));
          bool on = id(connection_ready) && light.state == "on";
          bool brightness = mode == esphome::ha_light_controller::LIGHT_BRIGHTNESS;
          bool temperature = mode == esphome::ha_light_controller::LIGHT_TEMPERATURE;
          bool color = mode == esphome::ha_light_controller::LIGHT_COLOR;

          auto visible = [](lv_obj_t *obj, bool show) {
            if (show) lv_obj_remove_flag(obj, LV_OBJ_FLAG_HIDDEN);
            else lv_obj_add_flag(obj, LV_OBJ_FLAG_HIDDEN);
          };

          visible(id(light_brightness_scale), brightness);
          visible(id(label_light_brightness_ticks), brightness);
          visible(id(light_kelvin_scale), temperature);
          visible(id(light_slider_knob), on && (brightness || temperature));
          // On the color page the swatch itself shows the color, but there is
          // nothing to show when the light is off, so label_light_value ("OFF")
          // takes its place instead.
          visible(id(label_light_value), !color || !on);
          visible(id(label_light_page), !color);
          // label_light_name and label_light_mode ("Farbe") stay visible on
          // the color page too, same as on brightness/temperature.

          float normalized = on
              ? clamp(id(ha_lights).normalized_value(id(light_index)) / 100.0f, 0.0f, 1.0f)
              : 0.0f;
          int slider_x = (int) roundf((normalized - 0.5f) * ${light_slider_range});
          // Y comes from the widget's static layout (y: 70 on the 240, y: 145
          // on the 480) and is read back here unchanged; this only moves X.
          lv_obj_align(id(light_slider_knob), LV_ALIGN_CENTER, slider_x,
                       lv_obj_get_y_aligned(id(light_slider_knob)));

          char minimum[20], maximum[20];
          snprintf(minimum, sizeof(minimum), "%.0f K", light.min_color_temp_kelvin);
          snprintf(maximum, sizeof(maximum), "%.0f K", light.max_color_temp_kelvin);

          lv_obj_t *dots[] = {id(light_mode_dot_0), id(light_mode_dot_1), id(light_mode_dot_2)};
          for (int i = 0; i < 3; i++) {
            bool supported = i == 0 ? id(ha_lights).supports_brightness(id(light_index))
                            : i == 1 ? id(ha_lights).supports_temperature(id(light_index))
                                     : id(ha_lights).supports_color(id(light_index));
            lv_obj_set_style_bg_color(dots[i],
                lv_color_hex(i == mode ? 0xFFFFFF : supported ? 0x292B2E : 0x111214),
                LV_PART_MAIN);
          }

          // Big center preview shows the light's actual current color; hidden
          // while off since label_light_value ("OFF") takes its place then.
          // The preset row below highlights whichever preset is closest to it.
          visible(id(light_color_swatch), on);
          if (on)
            lv_obj_set_style_bg_color(
                id(light_color_swatch),
                lv_color_hsv_to_rgb((uint16_t) roundf(light.hue),
                                     (uint8_t) roundf(light.saturation), 100),
                LV_PART_MAIN);

          lv_obj_t *presets[LIGHT_COLOR_PRESET_COUNT] = {
              id(light_color_preset_0), id(light_color_preset_1), id(light_color_preset_2),
              id(light_color_preset_3), id(light_color_preset_4), id(light_color_preset_5),
              id(light_color_preset_6), id(light_color_preset_7), id(light_color_preset_8),
              id(light_color_preset_9), id(light_color_preset_10), id(light_color_preset_11),
              id(light_color_preset_12), id(light_color_preset_13), id(light_color_preset_14),
              id(light_color_preset_15), id(light_color_preset_16), id(light_color_preset_17)};
          // Preset colors are precomputed constants (LIGHT_COLOR_PRESETS[i].rgb),
          // so this loop only ever does a color lookup, never an HSV conversion.
          int selected_preset = nearest_color_preset(light.hue);
          for (int i = 0; i < LIGHT_COLOR_PRESET_COUNT; i++) {
            lv_obj_set_style_bg_color(presets[i], lv_color_hex(LIGHT_COLOR_PRESETS[i].rgb),
                                       LV_PART_MAIN);
            bool selected = on && color && i == selected_preset;
            lv_obj_set_style_border_width(presets[i], selected ? ${light_color_preset_border} : 0,
                                           LV_PART_MAIN);
            lv_obj_set_style_border_color(presets[i], lv_color_hex(0xFFFFFF), LV_PART_MAIN);
          }

          // Shared widgets are reparented last, so restore the intended
          // foreground order for the color page's own static widgets.
          lv_obj_move_foreground(id(label_light_icon_color));
          lv_obj_move_foreground(id(light_color_swatch));
          for (lv_obj_t *preset : presets) lv_obj_move_foreground(preset);
          lv_obj_move_foreground(id(label_light_name));
          lv_obj_move_foreground(id(label_light_page));
          lv_obj_move_foreground(id(light_mode_dot_0));
          lv_obj_move_foreground(id(light_mode_dot_1));
          lv_obj_move_foreground(id(light_mode_dot_2));

  # Same debounce pattern as send_light_update; uses pending_cover_index
  # (frozen at the last encoder tick) instead of the live cover_index in
  # case the user already swiped to a different cover before this fires.
  - id: send_cover_update
    mode: restart
    then:
      - delay: 500ms
      - if:
          condition:
            lambda: 'return id(pending_cover_change);'
          then:
            - if:
                condition:
                  lambda: 'return id(ha_covers).supports_position(id(pending_cover_index));'
                then:
                  - homeassistant.action:
                      action: cover.set_cover_position
                      data:
                        entity_id: !lambda 'return id(ha_covers).get(id(pending_cover_index)).entity_id;'
                        position: !lambda |-
                          return to_string(
                              (int) roundf(id(ha_covers).get(id(pending_cover_index)).position));
                else:
                  # No SET_POSITION support: the locally tracked position is
                  # only used to decide which direction the last nudge meant.
                  - if:
                      condition:
                        lambda: 'return id(ha_covers).get(id(pending_cover_index)).position >= 50.0f;'
                      then:
                        - homeassistant.action:
                            action: cover.open_cover
                            data:
                              entity_id: !lambda 'return id(ha_covers).get(id(pending_cover_index)).entity_id;'
                      else:
                        - homeassistant.action:
                            action: cover.close_cover
                            data:
                              entity_id: !lambda 'return id(ha_covers).get(id(pending_cover_index)).entity_id;'
            - lambda: 'id(pending_cover_change) = false;'

  - id: refresh_cover
    then:
      - lvgl.label.update:
          id: label_cover_name
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          id(ha_covers).get(id(cover_index)).name, 10);
      - lambda: |-
          lv_label_set_long_mode(id(label_cover_name), LV_LABEL_LONG_MODE_SCROLL_CIRCULAR);
          lv_obj_update_layout(id(label_cover_name));
      - lvgl.label.update:
          id: label_cover_mode
          text: !lambda |-
            if (!id(connection_ready)) return ha_text_or_placeholder(false, std::string(), 8);
            const std::string &state = id(ha_covers).get(id(cover_index)).state;
            if (state == "opening") return std::string("Öffnet");
            if (state == "closing") return std::string("Schließt");
            if (state == "open") return std::string("Geöffnet");
            if (state == "closed") return std::string("Geschlossen");
            return std::string("Rollo");
      - lvgl.label.update:
          id: label_cover_value
          text: !lambda |-
            if (!id(connection_ready)) return ha_text_or_placeholder(false, std::string(), 3);
            char value[8];
            snprintf(value, sizeof(value), "%.0f%%", id(ha_covers).get(id(cover_index)).position);
            return std::string(value);
      # The cover screen has one static icon glyph (see thermostat_240/480
      # .yaml); only its availability tint needs a runtime update.
      - lambda: |-
          bool available = id(connection_ready) &&
                            id(ha_covers).get(id(cover_index)).state != "unavailable";
          lv_obj_set_style_text_color(id(label_cover_icon),
              available ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x4A3A73), LV_PART_MAIN);
      - lvgl.label.update:
          id: label_cover_page
          text: !lambda |-
            if (!id(connection_ready)) return ha_text_or_placeholder(false, std::string(), 5);
            char page[20];
            snprintf(page, sizeof(page), "%d / %d", id(cover_index) + 1, (int) id(ha_covers).size());
            return std::string(page);
      - lambda: |-
          // The whole screen is the slider: cover_fill grows down from the
          // top edge, and cover_fill_knob rides inside it, staying a fixed
          // gap above its bottom edge. At 0 % there is no fill to sit in,
          // so the knob hides along with it.
          float normalized = id(connection_ready)
              ? clamp(id(ha_covers).normalized_value(id(cover_index)) / 100.0f, 0.0f, 1.0f)
              : 0.0f;
          int fill_height = (int) roundf(normalized * ${cover_fill_max});
          lv_obj_set_height(id(cover_fill), fill_height);
          if (fill_height <= 0) {
            lv_obj_add_flag(id(cover_fill_knob), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_clear_flag(id(cover_fill_knob), LV_OBJ_FLAG_HIDDEN);
            int knob_y = std::max(0, fill_height - ${cover_knob_margin});
            lv_obj_align(id(cover_fill_knob), LV_ALIGN_TOP_MID, 0, knob_y);
          }

  # Knob press on the cover screen: stop is the one action rotating the
  # encoder can't already achieve (rotating reaches 0/100 exactly).
  - id: cover_stop
    then:
      - if:
          condition:
            lambda: |-
              return id(ui_context) == 7 && id(cover_index) >= 0 &&
                     id(cover_index) < (int) id(ha_covers).size();
          then:
            - homeassistant.action:
                action: cover.stop_cover
                data:
                  entity_id: !lambda 'return id(ha_covers).get(id(cover_index)).entity_id;'

  # Swipe shortcuts for fully open/closed; optimistic position update so the
  # pill/knob react immediately instead of waiting for the next HA push.
  - id: cover_open_full
    then:
      - script.execute: wake_display
      - lambda: |-
          id(ha_covers).get_mutable(id(cover_index)).position = 100.0f;
      - script.execute: refresh_cover
      - homeassistant.action:
          action: cover.open_cover
          data:
            entity_id: !lambda 'return id(ha_covers).get(id(cover_index)).entity_id;'

  - id: cover_close_full
    then:
      - script.execute: wake_display
      - lambda: |-
          id(ha_covers).get_mutable(id(cover_index)).position = 0.0f;
      - script.execute: refresh_cover
      - homeassistant.action:
          action: cover.close_cover
          data:
            entity_id: !lambda 'return id(ha_covers).get(id(cover_index)).entity_id;'

  # Timer/Progress: single fixed screens, no per-entity index. Values come
  # straight from the text/number entities above; these scripts just push
  # them onto the LVGL widgets and, if the entity-overview list happens to
  # be open right now, refresh it too so a timer finishing (or a progress
  # reaching 0/100) disappears from the menu immediately.
  - id: refresh_timer
    then:
      - lvgl.label.update:
          id: label_timer_value
          text: !lambda |-
            auto now = id(ha_time).now();
            const std::string &end_str = id(timer_end_time_txt).state;
            if (end_str.empty()) return std::string("--:--:--");
            long remaining = timer_remaining_seconds(end_str, now);
            if (remaining < 0) remaining = 0;
            char value[16];
            snprintf(value, sizeof(value), "%ld:%02ld:%02ld", remaining / 3600,
                     (remaining % 3600) / 60, remaining % 60);
            return std::string(value);
      - lambda: |-
          if (!id(timer_title_txt).state.empty()) {
            lv_label_set_text(id(label_timer_title), id(timer_title_txt).state.c_str());
            lv_obj_clear_flag(id(label_timer_title), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(label_timer_title), LV_OBJ_FLAG_HIDDEN);
          }
      - lambda: |-
          auto now = id(ha_time).now();
          const std::string &end_str = id(timer_end_time_txt).state;
          long remaining = end_str.empty() ? -1 : timer_remaining_seconds(end_str, now);
          uint32_t elapsed = (now.is_valid() && now.timestamp > id(timer_start_epoch))
                                  ? now.timestamp - id(timer_start_epoch) : 0;
          uint32_t total = elapsed + (uint32_t) (remaining > 0 ? remaining : 0);
          int percent = total > 0
                            ? (int) clamp((float) elapsed / (float) total * 100.0f, 0.0f, 100.0f)
                            : 0;
          lv_arc_set_value(id(arc_timer_value), percent);
      - if:
          condition:
            lambda: 'return id(ui_context) == 6;'
          then:
            - script.execute: update_settings_labels

  - id: refresh_progress
    then:
      - lvgl.label.update:
          id: label_progress_value
          text: !lambda |-
            char value[8];
            snprintf(value, sizeof(value), "%.0f%%", id(progress_value_num).state);
            return std::string(value);
      - lambda: |-
          if (!id(progress_title_txt).state.empty()) {
            lv_label_set_text(id(label_progress_title), id(progress_title_txt).state.c_str());
            lv_obj_clear_flag(id(label_progress_title), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(label_progress_title), LV_OBJ_FLAG_HIDDEN);
          }
      - lambda: |-
          lv_arc_set_value(id(arc_progress_value), (int) roundf(id(progress_value_num).state));
      - if:
          condition:
            lambda: 'return id(ui_context) == 6;'
          then:
            - script.execute: update_settings_labels

  - id: refresh_notify
    then:
      - lvgl.label.update:
          id: label_notify_title
          text: !lambda 'return id(notify_title_txt).state;'
      - lambda: |-
          if (!id(notify_subtext_txt).state.empty()) {
            lv_label_set_text(id(label_notify_subtext), id(notify_subtext_txt).state.c_str());
            lv_obj_clear_flag(id(label_notify_subtext), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(label_notify_subtext), LV_OBJ_FLAG_HIDDEN);
          }
      - lambda: |-
          // No numeric value to show progress for, so the arc instead shows
          // how far through the Auto-Home countdown we are (0 while off or
          // not yet active).
          int delay = (int) id(notify_auto_home_num).state;
          int percent = 0;
          if (delay > 0 && id(notify_finished)) {
            uint32_t elapsed = millis() - id(notify_finished_at_ms);
            percent = (int) clamp((float) elapsed / ((float) delay * 1000.0f) * 100.0f, 0.0f, 100.0f);
          }
          lv_arc_set_value(id(arc_notify_value), percent);
      - if:
          condition:
            lambda: 'return id(ui_context) == 6;'
          then:
            - script.execute: update_settings_labels

  - id: activate_home_screen
    then:
      - script.execute: wake_display
      - lambda: 'id(ui_context) = 0;'
      - script.execute: refresh_temps
      - script.execute: refresh_status
      - lvgl.page.show: screen_home

  - id: activate_timer_screen
    then:
      - script.execute: wake_display
      - lambda: |-
          id(ui_context) = 8;
          if (id(timer_finished)) id(timer_finished_at_ms) = millis();
      - script.execute: refresh_timer
      - lvgl.page.show: screen_timer

  # Short knob press on the Timer screen. First press shows a "cancel?"
  # confirmation overlay (auto-dismissed after 5s by check_finish_effects),
  # hiding the arc/value/title while it's up; a second press while it's
  # showing confirms the cancel - clears both the end time (stops the
  # countdown) and the title.
  - id: timer_click
    then:
      - if:
          condition:
            lambda: 'return id(timer_cancel_confirm_pending);'
          then:
            - lambda: |-
                id(timer_cancel_confirm_pending) = false;
                lv_obj_add_flag(id(timer_cancel_backdrop), LV_OBJ_FLAG_HIDDEN);
                lv_obj_add_flag(id(label_timer_cancel_confirm), LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(id(arc_timer_track), LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(id(arc_timer_value), LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(id(label_timer_value), LV_OBJ_FLAG_HIDDEN);
            - text.set: {id: timer_end_time_txt, value: ""}
            - text.set: {id: timer_title_txt, value: ""}
          else:
            - lambda: |-
                id(timer_cancel_confirm_pending) = true;
                id(timer_cancel_confirm_started_ms) = millis();
                lv_obj_clear_flag(id(timer_cancel_backdrop), LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(id(label_timer_cancel_confirm), LV_OBJ_FLAG_HIDDEN);
                lv_obj_add_flag(id(arc_timer_track), LV_OBJ_FLAG_HIDDEN);
                lv_obj_add_flag(id(arc_timer_value), LV_OBJ_FLAG_HIDDEN);
                lv_obj_add_flag(id(label_timer_value), LV_OBJ_FLAG_HIDDEN);
                lv_obj_add_flag(id(label_timer_title), LV_OBJ_FLAG_HIDDEN);
                lv_label_set_text(id(label_timer_cancel_confirm), "Cancel timer?\nPress again to confirm (5s)");

  - id: activate_progress_screen
    then:
      - script.execute: wake_display
      - lambda: |-
          id(ui_context) = 9;
          if (id(progress_finished)) id(progress_finished_at_ms) = millis();
      - script.execute: refresh_progress
      - lvgl.page.show: screen_progress

  - id: activate_notify_screen
    then:
      - script.execute: wake_display
      - lambda: |-
          id(ui_context) = 10;
          if (id(notify_finished)) id(notify_finished_at_ms) = millis();
      - script.execute: refresh_notify
      - lvgl.page.show: screen_notify

  # Runs every 500ms (see the interval: block). Handles what happens once a
  # timer/progress has finished: an optional status-LED blink (in the
  # respective *_blink_led_color_select color, only while still on that
  # screen - see update_status_led), an optional blink of the big value label (only
  # while its screen is actually visible), and an optional auto-return-home
  # after a configurable delay. Recomputes from scratch each tick instead of
  # tracking extra "is blinking" state, so turning a blink switch off (or the
  # countdown/value resetting) cleans up within one tick without any separate
  # teardown logic.
  - id: check_finish_effects
    then:
      - lambda: |-
          // Latch "finished" the first time the countdown reaches zero /
          // the value reaches 100. Runs unconditionally (not just while the
          // respective screen is open), otherwise a timer/progress that
          // finishes while the user is elsewhere would never be detected -
          // needed for auto-home, the LED blink once back on screen, and the
          // auto-show-screen action below. *timer_just_finished is true for
          // exactly this one tick, driving that action.
          id(timer_just_finished) = false;
          const std::string &end_str = id(timer_end_time_txt).state;
          if (!end_str.empty() && !id(timer_finished)) {
            long remaining = timer_remaining_seconds(end_str, id(ha_time).now());
            if (remaining <= 0) {
              id(timer_finished) = true;
              id(timer_finished_at_ms) = millis();
              id(timer_just_finished) = true;
            }
          }
          id(progress_just_finished) = false;
          float progress_v = id(progress_value_num).state;
          if (progress_v >= 100.0f) {
            if (!id(progress_finished)) {
              id(progress_finished) = true;
              id(progress_finished_at_ms) = millis();
              id(progress_just_finished) = true;
            }
          } else {
            id(progress_finished) = false;
          }
          // Notify has no threshold to cross - it's "finished" (active) the
          // instant a title is set, and stays that way until dismissed.
          id(notify_just_finished) = false;
          if (!id(notify_title_txt).state.empty()) {
            if (!id(notify_finished)) {
              id(notify_finished) = true;
              id(notify_finished_at_ms) = millis();
              id(notify_just_finished) = true;
            }
          } else {
            id(notify_finished) = false;
          }
      # Gated on connection_ready so a timer/progress that had already
      # finished before a reboot (its end time/value survives via restored
      # entity state) can't hijack the very first screen after boot - normal
      # boot always lands on screen_home first (see refresh_connection),
      # and only finishes occurring after that point auto-show their screen.
      - if:
          condition:
            lambda: |-
              return id(connection_ready) && id(timer_just_finished) &&
                     id(timer_show_on_finish_switch).state;
          then:
            - script.execute: wake_display
            - lambda: 'id(ui_context) = 8;'
            - script.execute: refresh_timer
            - lvgl.page.show: screen_timer
      - if:
          condition:
            lambda: |-
              return id(connection_ready) && id(progress_just_finished) &&
                     id(progress_show_on_finish_switch).state;
          then:
            - script.execute: wake_display
            - lambda: 'id(ui_context) = 9;'
            - script.execute: refresh_progress
            - lvgl.page.show: screen_progress
      - if:
          condition:
            lambda: |-
              return id(connection_ready) && id(notify_just_finished) &&
                     id(notify_show_on_finish_switch).state;
          then:
            - script.execute: wake_display
            - lambda: 'id(ui_context) = 10;'
            - script.execute: refresh_notify
            - lvgl.page.show: screen_notify
      # A finished timer/progress that isn't (or is no longer) being looked
      # at resets itself, so it doesn't linger "finished" forever and doesn't
      # reappear stale (see the Timer Auto-Home / Progress Auto-Home delay
      # below, which needs a fresh finished_at_ms, not this old one).
      - if:
          condition:
            lambda: 'return id(timer_finished) && id(ui_context) != 8;'
          then:
            - text.set: {id: timer_end_time_txt, value: ""}
            - text.set: {id: timer_title_txt, value: ""}
      - if:
          condition:
            lambda: 'return id(progress_finished) && id(ui_context) != 9;'
          then:
            - number.set: {id: progress_value_num, value: 0}
            - text.set: {id: progress_title_txt, value: ""}
      - if:
          condition:
            lambda: 'return id(notify_finished) && id(ui_context) != 10;'
          then:
            - text.set: {id: notify_title_txt, value: ""}
            - text.set: {id: notify_subtext_txt, value: ""}
      - lambda: |-
          bool timer_led_blinking = id(ui_context) == 8 && id(timer_finished) &&
                                     id(timer_finish_blink_switch).state;
          bool progress_led_blinking = id(ui_context) == 9 && id(progress_finished) &&
                                        id(progress_finish_blink_switch).state;
          bool notify_led_blinking = id(ui_context) == 10 && id(notify_finished) &&
                                      id(notify_finish_blink_switch).state;
          id(blink_led_on) = (timer_led_blinking || progress_led_blinking || notify_led_blinking)
                                  ? !id(blink_led_on) : false;

          lv_obj_t *timer_value = id(label_timer_value);
          bool timer_value_blinking = id(ui_context) == 8 && id(timer_finished) &&
                                       id(timer_value_blink_switch).state;
          lv_obj_set_style_text_opa(timer_value,
              (timer_value_blinking && !id(blink_led_on)) ? LV_OPA_TRANSP : LV_OPA_COVER,
              LV_PART_MAIN);

          lv_obj_t *progress_value = id(label_progress_value);
          bool progress_value_blinking = id(ui_context) == 9 && id(progress_finished) &&
                                          id(progress_value_blink_switch).state;
          lv_obj_set_style_text_opa(progress_value,
              (progress_value_blinking && !id(blink_led_on)) ? LV_OPA_TRANSP : LV_OPA_COVER,
              LV_PART_MAIN);

          lv_obj_t *notify_title = id(label_notify_title);
          bool notify_value_blinking = id(ui_context) == 10 && id(notify_finished) &&
                                        id(notify_value_blink_switch).state;
          lv_obj_set_style_text_opa(notify_title,
              (notify_value_blinking && !id(blink_led_on)) ? LV_OPA_TRANSP : LV_OPA_COVER,
              LV_PART_MAIN);
      - script.execute: update_status_led
      - if:
          condition:
            lambda: |-
              int delay = (int) id(timer_auto_home_num).state;
              return id(ui_context) == 8 && id(timer_finished) && delay > 0 &&
                     millis() - id(timer_finished_at_ms) >= (uint32_t) delay * 1000;
          then:
            - script.execute: activate_home_screen
      - if:
          condition:
            lambda: |-
              int delay = (int) id(progress_auto_home_num).state;
              return id(ui_context) == 9 && id(progress_finished) && delay > 0 &&
                     millis() - id(progress_finished_at_ms) >= (uint32_t) delay * 1000;
          then:
            - script.execute: activate_home_screen
      - if:
          condition:
            lambda: |-
              int delay = (int) id(notify_auto_home_num).state;
              return id(ui_context) == 10 && id(notify_finished) && delay > 0 &&
                     millis() - id(notify_finished_at_ms) >= (uint32_t) delay * 1000;
          then:
            - script.execute: activate_home_screen
      # Cancel-confirm dialog: dismiss itself after 5s, or immediately if the
      # user has already swiped away from the Timer screen. While it's up,
      # count down the seconds left in its own text.
      - if:
          condition:
            lambda: 'return id(timer_cancel_confirm_pending);'
          then:
            - if:
                condition:
                  lambda: |-
                    return id(ui_context) != 8 ||
                           millis() - id(timer_cancel_confirm_started_ms) >= 5000;
                then:
                  - lambda: |-
                      id(timer_cancel_confirm_pending) = false;
                      lv_obj_add_flag(id(timer_cancel_backdrop), LV_OBJ_FLAG_HIDDEN);
                      lv_obj_add_flag(id(label_timer_cancel_confirm), LV_OBJ_FLAG_HIDDEN);
                      lv_obj_clear_flag(id(arc_timer_track), LV_OBJ_FLAG_HIDDEN);
                      lv_obj_clear_flag(id(arc_timer_value), LV_OBJ_FLAG_HIDDEN);
                      lv_obj_clear_flag(id(label_timer_value), LV_OBJ_FLAG_HIDDEN);
                      if (!id(timer_title_txt).state.empty())
                        lv_obj_clear_flag(id(label_timer_title), LV_OBJ_FLAG_HIDDEN);
                else:
                  - lambda: |-
                      uint32_t elapsed = millis() - id(timer_cancel_confirm_started_ms);
                      int remaining = 5 - (int) (elapsed / 1000);
                      if (remaining < 0) remaining = 0;
                      char buf[64];
                      snprintf(buf, sizeof(buf), "Cancel timer?\nPress again to confirm (%ds)", remaining);
                      lv_label_set_text(id(label_timer_cancel_confirm), buf);

  - id: toggle_adjust_target
    then:
      - if:
          condition:
            lambda: 'return !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));'
          then:
            # Real dual-setpoint entity (heat_cool): switch between low (TRV)
            # and high (AC).
            - lambda: |-
                id(adjust_target) = 1 - id(adjust_target);
                id(target_temperature) = id(adjust_target) == 1 ? id(target_high_v) : id(target_low_v);
                auto &climate = id(ha_climates).get_mutable(id(climate_index));
                climate.adjust_target = id(adjust_target);
            - script.execute: refresh_temps
            - script.execute: refresh_status
          else:
            # better_thermostat style: one temperature attribute; TRV = heat
            # mode, AC = cool mode, so toggle the mode.
            - if:
                condition:
                  lambda: |-
                    auto v = ha_parse_list(id(hvac_modes_raw));
                    bool h = false, c = false;
                    for (auto &m : v) { if (m == "heat") h = true; if (m == "cool") c = true; }
                    return h && c;
                then:
                  - homeassistant.service:
                      service: climate.set_hvac_mode
                      data:
                        entity_id: !lambda 'return id(ha_climates).get(id(climate_index)).entity_id;'
                        hvac_mode: !lambda |-
                          return id(current_hvac_raw) == "cool" ? std::string("heat") : std::string("cool");

  # Status LED hook. Boards with an LED strip extend this placeholder; boards
  # without one keep it empty.
  - id: update_status_led
    then: []

  # Live preview for LED brightness while rotating in the settings submenu.
  # The 240x240 board overrides this placeholder with `!extend`.
  - id: preview_led_brightness
    then: []

  # All temperature/humidity labels and ring fill level.
  - id: refresh_temps
    then:
      - lvgl.label.update:
          id: label_climate_name
          text: !lambda |-
            const std::string name = id(ha_climates).empty() ? std::string() :
                                     id(ha_climates).get(id(climate_index)).name;
            return ha_text_or_placeholder(id(connection_ready), name, 10);
      - lvgl.label.update:
          id: label_climate_page
          text: !lambda |-
            if (!id(connection_ready))
              return ha_text_or_placeholder(false, std::string(), 5);
            if (id(ha_climates).empty()) return std::string("0 / 0");
            char page[20];
            snprintf(page, sizeof(page), "%d / %d", id(climate_index) + 1,
                     (int) id(ha_climates).size());
            return std::string(page);
      # Icon glyphs from thermostat_helpers.h; keep PUA characters out of YAML.
      - lvgl.label.update:
          id: icon_thermo_current
          text: !lambda 'return std::string(ICON_THERMO_HIGH);'
      - lvgl.widget.update:
          id: icon_thermo_current
          text_color: !lambda 'return lv_color_hex(0xFF5A2D);'
      - lvgl.label.update:
          id: icon_hum_thermo
          text: !lambda 'return std::string(ICON_DROPLET_HALF);'
      - lvgl.widget.update:
          id: icon_hum_thermo
          text_color: !lambda 'return lv_color_hex(0x6EC6FF);'
      # TRV/AC indicator, visible only in dual-setpoint mode.
      - if:
          condition:
            lambda: |-
              return !id(connection_ready) ||
                     (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)));
          then:
            - lvgl.label.update:
                id: label_setpoint_mode
                text: !lambda |-
                  const std::string mode = id(adjust_target) == 1 ? "AC" : "TRV";
                  return ha_text_or_placeholder(id(connection_ready), mode, 3);
            - lvgl.widget.show: label_setpoint_mode
          else:
            - lvgl.widget.hide: label_setpoint_mode
      - lvgl.label.update:
          id: label_target_temperature
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            return ha_text_or_placeholder(id(connection_ready),
                                          to_string((int) display_temp(id(target_temperature), f)), 2);
      - lvgl.label.update:
          id: label_target_decimal
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            float t = display_temp(id(target_temperature), f);
            int frac = (int) roundf((t - (int) t) * 10.0f);
            char buf[8];
            snprintf(buf, sizeof(buf), ".%d", abs(frac));
            return ha_text_or_placeholder(id(connection_ready), std::string(buf), 2);
      - lvgl.label.update:
          id: label_target_unit
          text: !lambda |-
            const std::string unit = id(unit_select).current_option() == "Fahrenheit" ? "°F" : "°C";
            return ha_text_or_placeholder(id(connection_ready), unit, 2);
      - lvgl.label.update:
          id: label_current_temperature
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f°", display_temp(id(pending_current_temperature), f));
            return ha_text_or_placeholder(id(connection_ready), std::string(buf), 5);
      - lvgl.label.update:
          id: label_home_current_temperature
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            return ha_text_or_placeholder(id(connection_ready),
                                          to_string((int) display_temp(id(pending_current_temperature), f)), 2);
      - lvgl.label.update:
          id: label_home_current_decimal
          text: !lambda |-
            bool f = id(unit_select).current_option() == "Fahrenheit";
            float c = display_temp(id(pending_current_temperature), f);
            int frac = (int) roundf((c - (int) c) * 10.0f);
            char buf[8];
            snprintf(buf, sizeof(buf), ".%d", abs(frac));
            return ha_text_or_placeholder(id(connection_ready), std::string(buf), 2);
      - lvgl.label.update:
          id: label_home_current_unit
          text: !lambda |-
            const std::string unit = id(unit_select).current_option() == "Fahrenheit" ? "°F" : "°C";
            return ha_text_or_placeholder(id(connection_ready), unit, 2);
      # Two independent setpoint handles share the same neutral track. Heat
      # fills from the left; cool uses REVERSE mode and fills from the right.
      # Animate the underlying arc value so its indicator and knob move as one.
      # Restarting from the currently rendered value also keeps quick encoder
      # turns fluid instead of snapping between consecutive temperature steps.
      - lambda: |-
          lv_anim_exec_xcb_t set_arc_value = [](void *var, int32_t value) {
            lv_arc_set_value(static_cast<lv_obj_t *>(var), value);
          };
          auto animate_arc_to = [set_arc_value](lv_obj_t *arc, int32_t target) {
            target = clamp(target, (int32_t) 0, (int32_t) 100);
            int32_t current = lv_arc_get_value(arc);
            lv_anim_delete(arc, set_arc_value);
            if (current == target) return;

            lv_anim_t anim;
            lv_anim_init(&anim);
            lv_anim_set_var(&anim, arc);
            lv_anim_set_values(&anim, current, target);
            lv_anim_set_time(&anim, 180);
            lv_anim_set_path_cb(&anim, lv_anim_path_ease_out);
            lv_anim_set_exec_cb(&anim, set_arc_value);
            lv_anim_start(&anim);
          };

          auto normalize_temperature = [](float temperature) {
            return clamp((int32_t) roundf((temperature - ${temperature_min}) /
                                          (${temperature_max} - ${temperature_min}) * 100.0f),
                         (int32_t) 0, (int32_t) 100);
          };

          float heat_target = !std::isnan(id(target_low_v))
                                  ? id(target_low_v) : id(target_temperature);
          float cool_target = !std::isnan(id(target_high_v))
                                  ? id(target_high_v) : id(target_temperature);
          int32_t cool_normalized = normalize_temperature(cool_target);

          animate_arc_to(id(arc_temperature_heat), normalize_temperature(heat_target));
          // REVERSE places internal value 0 at the right-hand end. Inverting
          // the visual value keeps minimum temperature on the left like HA.
          animate_arc_to(id(arc_temperature_cool), 100 - cool_normalized);
          animate_arc_to(id(arc_temperature_current),
                         normalize_temperature(id(pending_current_temperature)));
      - if:
          condition:
            lambda: |-
              if (!std::isnan(id(target_low_v))) return true;
              for (const auto &mode : ha_parse_list(id(hvac_modes_raw)))
                if (mode == "heat" || mode == "heat_cool" || mode == "auto") return true;
              return id(current_hvac_raw) == "heat" || id(current_hvac_raw) == "heat_cool";
          then:
            - lvgl.widget.show: arc_temperature_heat
          else:
            - lvgl.widget.hide: arc_temperature_heat
      - if:
          condition:
            lambda: |-
              if (!std::isnan(id(target_high_v))) return true;
              for (const auto &mode : ha_parse_list(id(hvac_modes_raw)))
                if (mode == "cool" || mode == "heat_cool" || mode == "auto") return true;
              return id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "heat_cool"
                     || id(current_hvac_raw) == "dry"
                     || id(current_hvac_raw) == "fan_only";
          then:
            - lvgl.widget.show: arc_temperature_cool
          else:
            - lvgl.widget.hide: arc_temperature_cool
      # Humidity, only visible when a value exists.
      - if:
          condition:
            lambda: 'return !id(connection_ready) || !std::isnan(id(pending_humidity));'
          then:
            - lvgl.label.update:
                id: label_humidity_thermo
                text: !lambda |-
                  char buf[8];
                  snprintf(buf, sizeof(buf), "%.0f%%", id(pending_humidity));
                  return ha_text_or_placeholder(id(connection_ready), std::string(buf), 3);
            - lvgl.label.update:
                id: label_home_humidity
                text: !lambda |-
                  char buf[8];
                  snprintf(buf, sizeof(buf), "%.0f%%", id(pending_humidity));
                  return ha_text_or_placeholder(id(connection_ready), std::string(buf), 3);
            - lvgl.widget.show: label_humidity_thermo
            - lvgl.widget.show: label_home_humidity
            - if:
                condition:
                  lambda: 'return id(connection_ready);'
                then:
                  - lvgl.widget.show: icon_hum_thermo
                else:
                  - lvgl.widget.hide: icon_hum_thermo
          else:
            - lvgl.widget.hide: label_humidity_thermo
            - lvgl.widget.hide: label_home_humidity
            - lvgl.widget.hide: icon_hum_thermo
      - if:
          condition:
            lambda: 'return id(connection_ready);'
          then:
            - lvgl.widget.show: icon_thermo_current
          else:
            - lvgl.widget.hide: icon_thermo_current

  # Status lines, mode icons, and ring color.
  - id: refresh_status
    then:
      - lvgl.label.update:
          id: label_hvac_mode
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          ha_hvac_mode_label(id(current_hvac_raw), false), 6);
      - lvgl.label.update:
          id: label_home_hvac_mode
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          ha_hvac_mode_label(id(current_hvac_raw), false), 6);
      - lvgl.label.update:
          id: label_preset
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          ha_preset_label(id(current_preset_raw), false), 6);
      - lvgl.label.update:
          id: label_home_preset
          text: !lambda |-
            return ha_text_or_placeholder(id(connection_ready),
                                          ha_preset_label(id(current_preset_raw), false), 6);
      - lvgl.label.update:
          id: icon_mode_thermo
          text: !lambda |-
            if (id(current_hvac_raw) == "off") return std::string(ICON_POWER);
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)))
              return std::string(id(adjust_target) == 1 ? ICON_SNOW : ICON_FIRE);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return std::string(ICON_SNOW);
            return std::string(ICON_FIRE);
      - lvgl.label.update:
          id: icon_mode_home
          text: !lambda |-
            if (id(current_hvac_raw) == "off") return std::string(ICON_POWER);
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)))
              return std::string(id(adjust_target) == 1 ? ICON_SNOW : ICON_FIRE);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return std::string(ICON_SNOW);
            return std::string(ICON_FIRE);
      - lvgl.widget.update:
          id: icon_mode_thermo
          text_color: !lambda |-
            // No active heating/cooling phase (idle/off): use dark gray.
            if (id(current_action_raw) != "heating" && id(current_action_raw) != "cooling")
              return lv_color_hex(0x9A9A9A);
            // Active AC target: snow icon is always blue.
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)) && id(adjust_target) == 1)
              return lv_color_hex(0x6EC6FF);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return lv_color_hex(0x6EC6FF);
            return lv_color_hex(0xFF8A3D);
      - lvgl.widget.update:
          id: icon_mode_home
          text_color: !lambda |-
            // No active heating/cooling phase (idle/off): use dark gray.
            if (id(current_action_raw) != "heating" && id(current_action_raw) != "cooling")
              return lv_color_hex(0x9A9A9A);
            // Active AC target: snow icon is always blue.
            if (!std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v)) && id(adjust_target) == 1)
              return lv_color_hex(0x6EC6FF);
            if (id(current_hvac_raw) == "cool" || id(current_hvac_raw) == "dry"
                || id(current_hvac_raw) == "fan_only") return lv_color_hex(0x6EC6FF);
            return lv_color_hex(0xFF8A3D);
      # Keep both setpoint markers visible at once. Switching TRV/AC still only
      # changes `adjust_target`; it does not hide the other setpoint.
      - lvgl.arc.update:
          id: arc_temperature_heat
          indicator:
            arc_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
          knob:
            bg_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
            border_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
      - lvgl.arc.update:
          id: arc_temperature_cool
          indicator:
            arc_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
          knob:
            bg_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
            border_opa: !lambda |-
              return id(current_hvac_raw) == "off" ? LV_OPA_TRANSP : LV_OPA_COVER;
      - if:
          condition:
            lambda: 'return id(connection_ready);'
          then:
            - lvgl.widget.show: icon_mode_thermo
            - lvgl.widget.show: icon_mode_home
          else:
            - lvgl.widget.hide: icon_mode_thermo
            - lvgl.widget.hide: icon_mode_home
      - script.execute: update_status_led

  # Staged connection diagnostics: WiFi -> HA API -> climate entity.
  - id: refresh_connection
    mode: restart
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: |-
                id(connection_ready) = false;
                if (!id(ha_connected)) {
                  id(connection_message) = millis() < 60000
                      ? "HA connecting..." : "HA unreachable";
                  return;
                }
                if (id(ha_climates).config_error() || id(ha_lights).config_error() ||
                    id(ha_covers).config_error()) {
                  // Only fires if a "covers" attribute exists and is malformed;
                  // installations without one never call apply_config_() for
                  // it, so config_error() stays false here, never blocking.
                  id(connection_message) = "Smart Knob config JSON error";
                  return;
                }
                // Covers are intentionally excluded from this check: unlike
                // climates/lights, an installation that hasn't added a
                // "covers" attribute to its template sensor yet would
                // otherwise never leave this loading state, since HA never
                // pushes a value for an attribute the entity doesn't define.
                if (!id(ha_climates).config_loaded() || !id(ha_lights).config_loaded()) {
                  uint32_t connected_for = millis() - id(ha_connected_since_ms);
                  id(connection_message) = connected_for < 10000
                      ? "Smart Knob config loading..." : "Smart Knob config not found";
                  return;
                }
                if (id(ha_climates).empty()) {
                  id(connection_message) = "No climate configured";
                  return;
                }
                const auto &climate = id(ha_climates).get(id(climate_index));
                bool valid_climate = !climate.state.empty()
                    && climate.state != "unknown"
                    && climate.state != "unavailable";
                if (valid_climate) {
                  id(connection_ready) = true;
                  id(connection_message).clear();
                  return;
                }
                uint32_t connected_for = millis() - id(ha_connected_since_ms);
                id(connection_message) = connected_for < 10000
                    ? "Climate entity loading..." : "Climate entity not found";
          else:
            - lambda: |-
                id(connection_ready) = false;
                id(connection_message) = millis() < 30000
                    ? "WiFi connecting..." : "WiFi error";
      - lvgl.label.update:
          id: label_conn_thermo
          text: !lambda |-
            return ha_connection_label(id(connection_message),
                                       id(language_select).current_option() == "Deutsch");
      - lvgl.label.update:
          id: label_conn_home
          text: !lambda |-
            return ha_connection_label(id(connection_message),
                                       id(language_select).current_option() == "Deutsch");
      - lvgl.label.update:
          id: label_loading_status
          text: !lambda |-
            return ha_connection_label(id(connection_message),
                                       id(language_select).current_option() == "Deutsch");
      - lvgl.label.update:
          id: label_loading_reboot_hint
          text: !lambda |-
            return reboot_hint_label(id(language_select).current_option() == "Deutsch");
      - if:
          condition:
            lambda: 'return id(connection_message) == "Smart Knob config not found";'
          then:
            - lvgl.widget.hide: spinner_ha_connection
            - lvgl.widget.show: icon_loading_config_error
            - lvgl.widget.show: button_loading_reboot_background
            - lvgl.widget.show: label_loading_reboot_hint
          else:
            - lvgl.widget.show: spinner_ha_connection
            - lvgl.widget.hide: icon_loading_config_error
            - lvgl.widget.hide: button_loading_reboot_background
            - lvgl.widget.hide: label_loading_reboot_hint
      - lambda: |-
          static bool previous_ready = false;
          id(connection_state_changed) = previous_ready != id(connection_ready);
          previous_ready = id(connection_ready);
      # Update all HA-backed text exactly once on a ready/not-ready transition.
      # In particular, do not restart the light-name marquee every two seconds.
      - if:
          condition:
            lambda: 'return id(connection_state_changed);'
          then:
            - script.execute: refresh_temps
            - script.execute: refresh_light
            - if:
                condition:
                  lambda: 'return id(connection_ready);'
                then:
                  - lambda: 'id(ui_context) = 0;'
                  - lvgl.page.show:
                      id: screen_home
                      animation: NONE
                else:
                  - lambda: 'id(ui_context) = -1;'
                  - lvgl.page.show:
                      id: screen_loading
                      animation: NONE
      - if:
          condition:
            lambda: 'return id(connection_ready);'
          then:
            - lvgl.widget.hide: label_conn_thermo
            - lvgl.widget.hide: label_conn_home
            - lvgl.widget.show: label_hvac_mode
            - lvgl.widget.show: label_home_hvac_mode
            - lvgl.widget.show: label_preset
            - lvgl.widget.show: label_home_preset
            - script.execute: refresh_status
          else:
            - lvgl.widget.show: label_conn_thermo
            - lvgl.widget.show: label_conn_home
            - lvgl.widget.hide: label_hvac_mode
            - lvgl.widget.hide: label_home_hvac_mode
            - lvgl.widget.hide: label_preset
            - lvgl.widget.hide: label_home_preset
            - lvgl.widget.hide: icon_mode_thermo
            - lvgl.widget.hide: icon_mode_home

