########################################################################
# thermostat_480.yaml
#
# Board variant: CrowPanel 2.1" HMI ESP32-S3 rotary display, 480x480.
# ST7701S RGB panel, local patched CST826 touch component, PCF8574 expander,
# and encoder on GPIO4/GPIO42. Shared behavior comes from thermostat_common.yaml.
########################################################################

packages:
  common: !include thermostat_common.yaml

# Use a board-specific base name so 480x480 and 240x240 builds do not share the
# same PlatformIO build directory. MAC suffixes still keep multiple boards
# unique on the network.
substitutions:
  device_name: thermostat480
  settings_row_gap: "82"
  settings_extra_rows: "true"

esphome:
  on_boot:
    # Run after the PCF8574 I/O expander (900) but before the ST7701S display
    # driver (800). The panel must already be powered and out of reset when the
    # driver sends its initialization sequence.
    - priority: 850
      then:
        - output.turn_on: lcd_power
        - output.turn_off: display_reset
        - delay: 100ms
        - output.turn_on: tp_reset
        - delay: 100ms
        - output.turn_off: tp_reset
        - delay: 120ms
        - output.turn_on: tp_reset
        - delay: 120ms
        - output.turn_on: tp_intr

external_components:
  - source:
      type: local
      path: components
    components: [cst826]

# ------------------------------------------------------------------
# I2C + PCF8574
# ------------------------------------------------------------------
i2c:
  sda: GPIO38
  scl: GPIO39
  id: bus_a
  scan: true

pcf8574:
  - id: pcf
    address: 0x21

output:
  - platform: ledc
    pin: GPIO6
    id: bl_pwm
    frequency: 19531Hz
  - platform: gpio
    id: lcd_power
    pin:
      pcf8574: pcf
      number: 3
      mode:
        output: true
  - platform: gpio
    id: tp_reset
    pin:
      pcf8574: pcf
      number: 0
      mode:
        output: true
  - platform: gpio
    id: display_reset
    pin:
      pcf8574: pcf
      number: 4
      mode:
        output: true
      inverted: true
  - platform: gpio
    id: tp_intr
    pin:
      pcf8574: pcf
      number: 2
      mode:
        output: true

# ------------------------------------------------------------------
# Display / touch, based on the Elecrow reference.
# ------------------------------------------------------------------
spi:
  clk_pin: GPIO2
  mosi_pin: GPIO1

touchscreen:
  platform: cst826
  id: my_touchscreen
  i2c_id: bus_a
  skip_probe: true
  update_interval: 25ms
  address: 0x15
  on_touch:
    - script.execute: wake_display

display:
  - platform: st7701s
    id: my_display
    update_interval: never
    spi_mode: MODE3
    color_order: RGB
    invert_colors: false
    dimensions:
      width: 480
      height: 480
    cs_pin: GPIO16
    de_pin: GPIO40
    hsync_pin: GPIO15
    vsync_pin: GPIO7
    pclk_pin: GPIO41
    data_pins:
      red: [46, 3, 8, 18, 17]
      green: [14, 13, 12, 11, 10, 9]
      blue: [5, 45, 48, 47, 21]
    hsync_front_porch: 20
    hsync_pulse_width: 10
    hsync_back_porch: 10
    vsync_front_porch: 8
    vsync_pulse_width: 10
    vsync_back_porch: 10
    pclk_frequency: 18MHz
    pclk_inverted: true
    init_sequence:
      - [0x01]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCC, 0x10]
      - [0xCD, 0x08]
      - [0xB0, 0x02, 0x13, 0x1B, 0x0D, 0x10, 0x05, 0x08, 0x07, 0x07, 0x24, 0x04, 0x11, 0x0E, 0x2C, 0x33, 0x1D]
      - [0xB1, 0x05, 0x13, 0x1B, 0x0D, 0x11, 0x05, 0x08, 0x07, 0x07, 0x24, 0x04, 0x11, 0x0E, 0x2C, 0x33, 0x1D]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x11]
      - [0xB0, 0x5D]
      - [0xB1, 0x43]
      - [0xB2, 0x81]
      - [0xB3, 0x80]
      - [0xB5, 0x43]
      - [0xB7, 0x85]
      - [0xB8, 0x20]
      - [0xC1, 0x78]
      - [0xC2, 0x78]
      - [0xD0, 0x88]
      - [0xE0, 0x00, 0x00, 0x02]
      - [0xE1, 0x03, 0xA0, 0x00, 0x00, 0x04, 0xA0, 0x00, 0x00, 0x00, 0x20, 0x20]
      - [0xE2, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      - [0xE3, 0x00, 0x00, 0x11, 0x00]
      - [0xE4, 0x22, 0x00]
      - [0xE5, 0x05, 0xEC, 0xA0, 0xA0, 0x07, 0xEE, 0xA0, 0xA0, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      - [0xE6, 0x00, 0x00, 0x11, 0x00]
      - [0xE7, 0x22, 0x00]
      - [0xE8, 0x06, 0xED, 0xA0, 0xA0, 0x08, 0xEF, 0xA0, 0xA0, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      - [0xEB, 0x00, 0x00, 0x40, 0x40, 0x00, 0x00, 0x00]
      - [0xED, 0xFF, 0xFF, 0xFF, 0xBA, 0x0A, 0xBF, 0x45, 0xFF, 0xFF, 0x54, 0xFB, 0xA0, 0xAB, 0xFF, 0xFF, 0xFF]
      - [0xEF, 0x10, 0x0D, 0x04, 0x08, 0x3F, 0x1F]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x13]
      - [0xEF, 0x08]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x00]
      - [0x36, 0x00]
      - [0x3A, 0x60]
      - [0x11]
      - delay 100ms
      - [0x29]
      - delay 50ms

# ------------------------------------------------------------------
# LVGL – 3 Screens
# ------------------------------------------------------------------
lvgl:
  # Keep the draw buffer small enough for fast internal RAM on PSRAM boards.
  # LVGL invalidates and redraws changed regions itself.
  buffer_size: 12%
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  bg_color: "0x000000"
  default_font: rajdhani_medium_24
  scrollable: false
  scrollbar_mode: "OFF"

  on_idle:
    - timeout: !lambda 'return (uint32_t)(id(dim_delay_num).state * 1000.0f);'
      then:
        - lambda: 'id(display_dimmed) = true;'
        - light.turn_on:
            id: display_backlight
            brightness: !lambda 'return id(dim_level_num).state / 100.0f;'
        - script.execute: update_status_led
    - timeout: !lambda 'return (uint32_t)(id(idle_home_num).state * 1000.0f);'
      then:
        - if:
            condition:
              lambda: 'return id(connection_ready);'
            then:
              - lambda: 'id(ui_context) = 0;'
              - script.execute: refresh_temps
              - script.execute: refresh_status
              - lvgl.page.show: screen_home

  pages:
    # ================= Home Assistant loading =================
    - id: screen_loading
      bg_color: "0x000000"
      widgets:
        - button:
            id: button_loading_reboot_background
            align: CENTER
            width: 480
            height: 480
            radius: 0
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            hidden: true
            on_click:
              - button.press: restart_btn
        - spinner:
            id: spinner_ha_connection
            align: CENTER
            width: 132
            height: 132
            spin_time: 900ms
            arc_length: 80deg
            arc_color: 0x444444
            arc_width: 12
            indicator:
              arc_color: 0xFFFFFF
              arc_width: 12
        - label:
            id: icon_loading_config_error
            text: "󰗖"
            text_font: icons_alert_160
            text_color: 0xFFFFFF
            align: CENTER
            hidden: true
        - label:
            id: label_loading_reboot_hint
            text: "Press knob or touch display to reboot"
            text_font: rajdhani_medium_24
            text_color: 0xB0B0B0
            align: CENTER
            y: 135
            width: 340
            text_align: CENTER
            long_mode: SCROLL_CIRCULAR
            hidden: true
        - label:
            id: label_loading_status
            text: "WiFi connecting..."
            text_font: rajdhani_medium_24
            text_color: 0x9A9A9A
            align: CENTER
            y: -130
            width: 350
            text_align: CENTER
            long_mode: SCROLL_CIRCULAR

    # ================= Home-Screen =================
    - id: screen_home
      bg_color: "0x000000"
      widgets:
        - button:
            id: button_home_background
            align: CENTER
            width: 480
            height: 480
            radius: 0
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            on_click:
              - script.execute: wake_display

        - label:
            id: label_home_hvac_mode
            text: "Heat"
            text_font: rajdhani_medium_24
            text_color: 0xEDEDED
            align: TOP_MID
            y: 45
        - label:
            id: label_home_preset
            text: ""
            text_font: rajdhani_medium_24
            text_color: 0x9A9A9A
            align: TOP_MID
            y: 80
        - label:
            id: label_conn_home
            text: "WiFi connecting..."
            text_font: rajdhani_medium_24
            text_color: 0x9A9A9A
            align: CENTER
