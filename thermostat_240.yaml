            text_color: 0xFFFFFF
            align: CENTER
            x: 94
            y: 24
            width: 50
            text_align: LEFT
        - label:
            id: icon_mode_home
            text: ""
            text_font: icons_34
            text_color: 0x9A9A9A
            align: CENTER
            x: -94

        - label:
            id: label_home_humidity
            text: "43%"
            text_font: rajdhani_semibold_26
            text_color: 0x9A9A9A
            align: CENTER
            y: 58
            text_align: CENTER
            hidden: true

        - label:
            id: label_home_time
            text: "21:05"
            text_font: rajdhani_semibold_28
            text_color: 0xE0E0E0
            align: BOTTOM_MID
            x: -30
            y: -20
            width: 70
            text_align: RIGHT
