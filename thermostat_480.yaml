              - script.execute: wake_display

    - id: screen_light_color
      bg_color: "0x000000"
      on_swipe_left:
        - script.execute: open_settings
      on_swipe_right:
        - script.execute: open_entity_overview
      on_swipe_down:
        - script.execute: cycle_light_mode
      on_swipe_up:
        - script.execute: cycle_light_mode
      widgets:
        - button:
            align: CENTER
            width: 480
            height: 480
            radius: 0
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            on_click:
              - script.execute: wake_display
        - label:
            id: label_light_icon_color
            text: "\U000F020A"
            text_font: icons_70
            text_color: 0x555555
            align: CENTER
            y: -110
        # Center preview of the currently selected color preset.
        - obj:
            id: light_color_swatch
            align: CENTER
            y: 8
            width: 96
            height: 96
            radius: 48
            bg_color: 0xFF6655
            bg_opa: COVER
            border_color: 0xD7D7D7
            border_width: 4
        - label:
            id: label_light_mode_color
            text: "Farbe"
            text_font: rajdhani_medium_24
            text_color: 0xB0B0B0
            align: CENTER
            y: 90
            width: 200
            text_align: CENTER

        # Fixed color presets instead of a full hue ring: cycling a 96-segment
        # arc every refresh was too slow on this panel, and a handful of
        # favorite colors covers how the knob is actually used in practice.
        - obj: &light_color_preset_480
            id: light_color_preset_0
            align: CENTER
            x: -120
            y: 140
            width: 44
            height: 44
            radius: 22
            bg_color: 0xFFFFFF
            bg_opa: COVER
            border_width: 0
            shadow_width: 0
        - obj: { <<: *light_color_preset_480, id: light_color_preset_1, x: -60 }
        - obj: { <<: *light_color_preset_480, id: light_color_preset_2, x: 0 }
        - obj: { <<: *light_color_preset_480, id: light_color_preset_3, x: 60 }
        - obj: { <<: *light_color_preset_480, id: light_color_preset_4, x: 120 }

    # ================= Settings menu =================
    - id: screen_navigation
      bg_color: "0x000000"
      on_swipe_right:
        - script.execute: settings_swipe_back
      on_swipe_down:
        - script.execute: cycle_thermostat_quick
      on_swipe_up:
        - script.execute: cycle_thermostat_quick
      widgets:
        - label:
            id: label_settings_title
            text: "Settings"
            text_font: rajdhani_medium_24
            text_color: 0x686868
            align: TOP_MID
            y: 30

        - label:
            id: label_menu_icon_prev2
