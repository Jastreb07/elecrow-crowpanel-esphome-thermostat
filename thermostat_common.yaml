  # Jump straight to the Home/Timer/Progress screen from Home Assistant (an
  # automation, dashboard button, etc.) - same idea as pressing restart_btn
  # remotely, just navigates instead of rebooting.
  - platform: template
    name: "[Standard] Show Home Screen"
    id: show_home_btn
    icon: "mdi:home-outline"
    on_press:
      then:
        - script.execute: activate_home_screen

  - platform: template
    name: "[Standard] Show Timer Screen"
    id: show_timer_btn
