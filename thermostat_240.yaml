########################################################################
# thermostat_240.yaml
#
# Board-Variante: CrowPanel 1.28" HMI ESP32-S3 Rotary Display 240x240,
# GC9A01A SPI-Panel (mipi_spi-Treiber), CST816-Touch, direkte GPIOs (kein
# PCF8574-Expander nötig). Pins/Werte aus dem offiziellen Elecrow-Beispiel
# (example/esphome/esphome1.28.yaml im GitHub-Repo Elecrow-RD/CrowPanel-
# 1.28inch-HMI-ESP32-Rotary-Display-240-240-IPS-Round-Touch-Knob-Screen).
# Alle Software-Logik (Climate, LVGL-Screens, Scripts) kommt aus dem
# gemeinsamen Package thermostat_common.yaml.
########################################################################

packages:
  common: !include thermostat_common.yaml

# Eigener Basisname pro Board-Typ, sonst teilen sich 480er/240er denselben
# PlatformIO-Build-Ordner -> Wechsel zwischen Varianten erzwingt Rebuild.
# MAC-Suffix bleibt aktiv (name_add_mac_suffix in thermostat_common.yaml).
substitutions:
  device_name: thermostat240

esphome:
  on_boot:
    - priority: 800
      then:
        - output.turn_off: power_light
        - output.turn_on: out1
        - output.turn_on: out2

# ------------------------------------------------------------------
# I2C (Touch)
# ------------------------------------------------------------------
i2c:
  sda: GPIO6
  scl: GPIO7
  id: bus_a
  scan: true
  frequency: 400kHz

output:
  - platform: ledc
    pin: GPIO46
    id: bl_pwm
    frequency: 19531Hz
  - platform: gpio
    id: power_light
    pin: GPIO40
  - platform: gpio
    id: out1
    pin: GPIO1
  - platform: gpio
    id: out2
    pin: GPIO2

# ------------------------------------------------------------------
# Display / Touch (Elecrow-Referenz 1.28")
# ------------------------------------------------------------------
spi:
  id: spi_bus
  mosi_pin: GPIO11
  clk_pin: GPIO10

touchscreen:
  platform: cst816
  id: my_touchscreen
  i2c_id: bus_a
  address: 0x15
  interrupt_pin: GPIO5
  reset_pin: GPIO13
  transform:
    mirror_x: false
    mirror_y: true
    swap_xy: true
  on_touch:
    - script.execute: wake_display
    - lambda: |-
        id(swipe_start_x) = touch.x;
        id(swipe_last_x) = touch.x;
  on_update:
    - lambda: |-
        for (auto t : touches)
          if (t.state <= 2) id(swipe_last_x) = t.x;
  on_release:
    - script.execute: handle_swipe_release

display:
  - platform: mipi_spi
    id: my_display
    model: GC9A01A
    update_interval: 50ms
    cs_pin: GPIO9
    dc_pin: GPIO3
    reset_pin: GPIO14
    invert_colors: true

# ------------------------------------------------------------------
# Encoder-Pins + Knopf-Taster: kein PCF8574 auf diesem Board, direkte
# GPIOs -> Basisdefinitionen aus thermostat_common.yaml (480-Pins)
# per !extend überschreiben.
# ------------------------------------------------------------------
binary_sensor:
  # Direkter GPIO-Taster ohne PCF8574-Hardware-Entprellung (anders als
  # 480er) -> zusaetzlicher Debounce-Filter (kommt zum 10ms aus
  # thermostat_common.yaml dazu, ESPHome verkettet filters:-Listen),
  # sonst zerschiesst Taster-Prellen das on_multi_click-Timing-Fenster
  # fuer den Doppelklick (TRV/AC-Wechsel).
  - id: !extend encoder_button
    pin:
      pcf8574: !remove
      number: GPIO41
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on_off: 30ms

sensor:
  - id: !extend temperature_encoder
    pin_a:
      number: GPIO45
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO42
      mode:
        input: true
        pullup: true

# ------------------------------------------------------------------
# LVGL – 3 Screens
# ------------------------------------------------------------------
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  bg_color: "0x000000"
  default_font: rajdhani_medium_16

  on_idle:
    - timeout: !lambda 'return (uint32_t)(id(dim_delay_num).state * 1000.0f);'
      then:
        - lambda: 'id(display_dimmed) = true;'
        - light.turn_on:
            id: display_backlight
            brightness: !lambda 'return id(dim_level_num).state / 100.0f;'
        - script.execute: update_status_led
    - timeout: !lambda 'return (uint32_t)(id(idle_home_num).state * 1000.0f);'
      then:
        - lambda: 'id(ui_context) = 0;'
        - script.execute: refresh_temps
        - script.execute: refresh_status
        - lvgl.page.show: screen_home

  pages:
    # ================= Home-Screen =================
