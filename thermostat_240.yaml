# ------------------------------------------------------------------
# Status-LED (WS2812-Strip, laut Elecrow-Doku: LED_PIN=48, LED_NUM=5).
# Leuchtet blau-weiss ausserhalb des Idle-Modus, aus wenn gedimmt.
# ------------------------------------------------------------------
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: GPIO48
    num_leds: 5
    rgb_order: GRB
    chipset: WS2812
    default_transition_length: 0s

script:
  - id: !extend update_status_led
    then:
      - if:
          # Vor Ende der on_boot(-100)-Sequenz NICHTS anfassen: select:-
          # Komponenten (language_select/design_select) koennen ihren
          # gespeicherten Wert schon waehrend ihres eigenen setup() (also
          # VOR on_boot) restaurieren und dabei refresh_status ausloesen,
          # das noch vor dem RMT/WS2812-Setup abstuerzen wuerde.
          condition:
            lambda: 'return !id(app_booted);'
          then: []
          else:
            - if:
                condition:
                  lambda: 'return id(display_dimmed) || !id(led_enabled).state;'
                then:
                  - light.turn_off: status_led
                else:
                  - light.turn_on:
                      id: status_led
                      brightness: !lambda 'return id(led_brightness_num).state / 100.0f;'
                      red: !lambda |-
                          bool dual = !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));
                          return hvac_led_color(id(current_hvac_raw), dual, id(adjust_target)).r;
                      green: !lambda |-
                          bool dual = !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));
                          return hvac_led_color(id(current_hvac_raw), dual, id(adjust_target)).g;
                      blue: !lambda |-
                          bool dual = !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));
                          return hvac_led_color(id(current_hvac_raw), dual, id(adjust_target)).b;

  - id: !extend preview_led_brightness
    then:
      - if:
          condition:
            lambda: 'return id(app_booted);'
          then:
            - light.turn_on:
                id: status_led
                brightness: !lambda 'return id(num_preview) / 100.0f;'
                red: !lambda |-
                    bool dual = !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));
                    return hvac_led_color(id(current_hvac_raw), dual, id(adjust_target)).r;
                green: !lambda |-
                    bool dual = !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));
                    return hvac_led_color(id(current_hvac_raw), dual, id(adjust_target)).g;
                blue: !lambda |-
                    bool dual = !std::isnan(id(target_low_v)) && !std::isnan(id(target_high_v));
                    return hvac_led_color(id(current_hvac_raw), dual, id(adjust_target)).b;
