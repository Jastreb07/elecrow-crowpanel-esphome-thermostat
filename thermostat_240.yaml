########################################################################
# thermostat_240.yaml
#
# Board variant: CrowPanel 1.28" HMI ESP32-S3 rotary display, 240x240.
# GC9A01A SPI panel with the mipi_spi driver, CST816 touch, and direct GPIOs
# without a PCF8574 expander. Pin values are based on the official Elecrow
# example. Shared behavior comes from thermostat_common.yaml.
########################################################################

packages:
  common: !include thermostat_common.yaml

# Use a board-specific base name so switching variants does not reuse the same
# PlatformIO build directory. MAC suffixes remain enabled in thermostat_common.
substitutions:
  device_name: thermostat240
  settings_row_gap: "48"

esphome:
  on_boot:
    - priority: 800
      then:
        - output.turn_off: power_light
        - output.turn_on: out1
        - output.turn_on: out2

# ------------------------------------------------------------------
# I2C (Touch)
# ------------------------------------------------------------------
i2c:
  sda: GPIO6
  scl: GPIO7
  id: bus_a
  scan: true
  frequency: 400kHz

output:
  - platform: ledc
    pin: GPIO46
    id: bl_pwm
    frequency: 19531Hz
  - platform: gpio
    id: power_light
    pin: GPIO40
  - platform: gpio
    id: out1
    pin: GPIO1
  - platform: gpio
    id: out2
    pin: GPIO2

# ------------------------------------------------------------------
# Display / touch, based on the Elecrow 1.28" reference.
# ------------------------------------------------------------------
spi:
  id: spi_bus
  mosi_pin: GPIO11
  clk_pin: GPIO10

touchscreen:
  platform: cst816
  id: my_touchscreen
  i2c_id: bus_a
  address: 0x15
  interrupt_pin: GPIO5
  reset_pin: GPIO13
  transform:
    mirror_x: false
    mirror_y: true
    swap_xy: true
  on_touch:
    - script.execute: wake_display

display:
  - platform: mipi_spi
    id: my_display
    model: GC9A01A
    update_interval: never
    cs_pin: GPIO9
    dc_pin: GPIO3
    reset_pin: GPIO14
    invert_colors: true

# ------------------------------------------------------------------
# Encoder pins and button: this board uses direct GPIOs instead of the PCF8574.
# Override the defaults from thermostat_common.yaml with !extend.
# ------------------------------------------------------------------
binary_sensor:
  # Direct GPIO button without PCF8574 hardware debounce. Add an extra debounce
  # filter so button bounce does not break the on_multi_click timing window.
  - id: !extend encoder_button
    pin:
      pcf8574: !remove
      number: GPIO41
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on_off: 30ms

sensor:
  - id: !extend temperature_encoder
    pin_a:
      number: GPIO45
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO42
      mode:
        input: true
        pullup: true

# ------------------------------------------------------------------
# LVGL – 3 Screens
# ------------------------------------------------------------------
lvgl:
  # LVGL invalidates and redraws changed regions itself. Periodic full display
  # updates make page transitions noticeably less fluid.
  buffer_size: 12%
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  bg_color: "0x000000"
  default_font: rajdhani_medium_16
  scrollable: false
  scrollbar_mode: "OFF"

  on_idle:
    - timeout: !lambda 'return (uint32_t)(id(dim_delay_num).state * 1000.0f);'
      then:
        - lambda: 'id(display_dimmed) = true;'
        - light.turn_on:
            id: display_backlight
            brightness: !lambda 'return id(dim_level_num).state / 100.0f;'
        - script.execute: update_status_led
    - timeout: !lambda 'return (uint32_t)(id(idle_home_num).state * 1000.0f);'
      then:
        - lambda: 'id(ui_context) = 0;'
        - script.execute: refresh_temps
        - script.execute: refresh_status
        - lvgl.page.show: screen_home

  pages:
    # ================= Home-Screen =================
    - id: screen_home
      bg_color: "0x000000"
      widgets:
        - button:
            id: button_home_background
            align: CENTER
            width: 240
            height: 240
            radius: 0
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            on_click:
              - script.execute: wake_display

        - label:
            id: label_home_hvac_mode
            text: "Heat"
            text_font: rajdhani_medium_16
            text_color: 0xEDEDED
            align: TOP_MID
            y: 25
        - label:
            id: label_home_preset
            text: ""
            text_font: rajdhani_medium_16
            text_color: 0x9A9A9A
            align: TOP_MID
            y: 40
        - label:
            id: label_conn_home
            text: "WiFi connecting..."
            text_font: rajdhani_medium_16
            text_color: 0x9A9A9A
            align: TOP_MID
            y: 40
            width: 210
            text_align: CENTER
            long_mode: SCROLL_CIRCULAR
            hidden: true

        - label:
            id: label_home_current_temperature
            text: "38"
            text_font: rajdhani_bold_130
            text_color: 0xFFFFFF
            align: CENTER
            x: -8
            width: 150
            text_align: RIGHT
        - label:
            id: label_home_current_unit
            text: "°C"
            text_font: rajdhani_semibold_46
            text_color: 0xB0B0B0
            align: CENTER
            x: 86
            y: -22
            width: 50
            text_align: LEFT
        - label:
