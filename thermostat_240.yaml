              - obj:
                  id: light_kelvin_gradient_cool
                  align: RIGHT_MID
                  width: 73
                  height: 32
                  radius: 0
                  bg_color: 0xF2EEE2
                  bg_grad_color: 0x55B5E8
                  bg_grad_dir: HOR
                  border_width: 0
        - obj:
            id: light_slider_knob
            align: CENTER
            y: 55
            width: 5
            height: 28
            radius: 3
            bg_color: 0xFFFFFF
            bg_opa: COVER
            border_width: 0
            shadow_width: 0
        - label:
            id: label_light_kelvin_min
            text: "1800 K"
            text_font: rajdhani_medium_16
            text_color: 0xB0B0B0
            align: CENTER
            x: -52
            y: 82
            hidden: true
        - label:
            id: label_light_kelvin_max
            text: "6500 K"
            text_font: rajdhani_medium_16
            text_color: 0xB0B0B0
