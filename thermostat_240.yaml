            text_font: rajdhani_medium_16
            text_color: 0xEDEDED
            align: TOP_MID
            y: 25
        - label:
            id: label_home_preset
            text: ""
            text_font: rajdhani_medium_16
            text_color: 0x9A9A9A
            align: TOP_MID
