            align: CENTER
            width: 238
            height: 238
            min_value: 0
            max_value: 100
            value: 0
            start_angle: 135
            end_angle: 45
            rotation: 0
            arc_color: 0x1C1C1C
            arc_width: 16
            arc_rounded: true
            adjustable: false
            clickable: false
            x: 0
            y: 0
            indicator:
              arc_opa: TRANSP

        - arc:
            id: arc_temperature_heat
            align: CENTER
            width: 238
            height: 238
            min_value: 0
            max_value: 100
            value: 18
            start_angle: 135
            end_angle: 45
            rotation: 0
            arc_color: 0xDCE3E7
            arc_opa: TRANSP
            arc_width: 16
            arc_rounded: true
            adjustable: true
            clickable: false
            x: 0
            y: 0
