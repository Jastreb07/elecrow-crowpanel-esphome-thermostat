    # ================= Thermostat-Screen =================
    - id: screen_thermostat
      bg_color: "0x000000"
      # CST816 is mounted rotated: physical horizontal gestures are reported
      # by LVGL on the vertical gesture axis.
      on_swipe_down:
        - script.execute: thermostat_next
      on_swipe_up:
        - script.execute: open_entity_overview
      # On the rotated CST816, physical vertical gestures arrive as left/right.
      on_swipe_left:
        - script.execute: open_thermostat_quick
      on_swipe_right:
        - script.execute: open_thermostat_quick
      widgets:
        - button:
            id: button_thermostat_background
            align: CENTER
            width: 238
            height: 238
            radius: 0
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            on_click:
              - script.execute: wake_display

        - arc:
